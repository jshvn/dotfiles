# =============================================================================
# Taskfile.yml -- root taskfile for v2 dotfiles
#
# Purpose:      Single canonical entry (`task install`) plus public operator
#               surface (default banner, setup, test, validate). Wires every
#               included taskfile module under one namespace.
# Depends on:   taskfiles/{audit,manifest,lint,links,shell,identity,packages,
#               refresh,claude,show,test,macos}.yml; install/messages.zsh
#               (sourced via {{.TASKFILE_DIR}}, not DOTFILEDIR).
# Side effects: deferred to subtasks; this file declares no direct mutations.
# =============================================================================

version: '3'

set: [errexit, pipefail]
silent: true

vars:
  HOME: '{{.HOME}}'
  XDG_CONFIG_HOME: '{{.HOME}}/.config'
  XDG_DATA_HOME: '{{.HOME}}/.local/share'
  XDG_STATE_HOME: '{{.HOME}}/.local/state'
  XDG_CACHE_HOME: '{{.HOME}}/.cache'
  ZDOTDIR: '{{.XDG_CONFIG_HOME}}/zsh'

  DOTFILEDIR: '{{.TASKFILE_DIR}}'

  # Homebrew prefix -- detect from arch when brew not yet installed.
  HOMEBREW_PREFIX:
    sh: |
      if command -v brew >/dev/null 2>&1; then brew --prefix
      elif [[ "$(uname -m)" == "arm64" ]]; then echo "/opt/homebrew"
      else echo "/usr/local"
      fi

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # MANIFEST_JSON cats resolved.json or echoes a stub with a stderr warning
  # so taskfiles that ref: MANIFEST never crash on a fresh checkout. The stub
  # includes an empty `features` map so `{{if index .MANIFEST.features "<key>"}}`
  # evaluates to false (nil zero value) instead of erroring out with
  # `index of untyped nil` at parse time. Deeper paths (.identity.git,
  # .packages.brew.*) remain unset so consumers fail loudly when accessed
  # without setup.
  MANIFEST_JSON:
    sh: |
      if [[ -f "{{.RESOLVED_JSON_PATH}}" ]]; then
        cat "{{.RESOLVED_JSON_PATH}}"
      else
        echo "warn: resolved.json not found (run 'task setup -- <machine>')" >&2
        echo '{"features":{}}'
      fi
  MANIFEST:
    ref: 'fromJson .MANIFEST_JSON'

includes:
  audit:    ./taskfiles/audit.yml
  # manifest / identity / packages / test each need the root's DOTFILEDIR
  # forwarded explicitly: their own DOTFILEDIR sh:dirname-twice pattern
  # resolves to the wrong path when invoked as an included taskfile (the
  # DOTFILEDIR-leak Don't-Do in CLAUDE.md applies here).
  manifest:
    taskfile: ./taskfiles/manifest.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      XDG_STATE_HOME: '{{.XDG_STATE_HOME}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  lint:     ./taskfiles/lint.yml
  links:    ./taskfiles/links.yml
  shell:    ./taskfiles/shell.yml
  identity:
    taskfile: ./taskfiles/identity.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      XDG_STATE_HOME: '{{.XDG_STATE_HOME}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  packages:
    taskfile: ./taskfiles/packages.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      XDG_STATE_HOME: '{{.XDG_STATE_HOME}}'
      XDG_CACHE_HOME: '{{.XDG_CACHE_HOME}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  refresh:  ./taskfiles/refresh.yml
  claude:   ./taskfiles/claude.yml
  show:     ./taskfiles/show.yml
  test:
    taskfile: ./taskfiles/test.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  macos:    ./taskfiles/macos.yml

tasks:

  # lint-allow: cmds-without-status
  default:
    desc: "Print curated task surface"
    # status: [false] forces the cmd to run every invocation. status: [true]
    # would consider the task up-to-date and `task` alone would print nothing
    # instead of rendering the banner.
    status: [false]
    cmds:
      - |
        # Source messages.zsh via TASKFILE_DIR (NOT the DOTFILES_MESSAGES var)
        # per the documented DOTFILEDIR pollution workaround -- same pattern
        # as install: and validate: above. Banner stays render-stable
        # regardless of include-merge ordering.
        source '{{.TASKFILE_DIR}}/install/messages.zsh'
        header "Dotfiles -- common tasks"
        echo
        info "  install     Install dotfiles for the active machine"
        info "  setup       Set the active machine: task setup -- <machine-name>"
        info "  validate    Validate full installation state"
        info "  test        Run all smoke tests"
        info "  lint        Run all lint checks"
        echo
        header "Diagnostics"
        info "  task show:*      Inspect current state (manifest, claude)"
        info "  task audit:*     Detect drift (manifest, packages, links)"
        info "  task refresh:*   Manually refresh a layer (claude)"
        echo
        echo "Run 'task --list' for the full task graph."

  # lint-allow: cmds-without-status
  setup:
    desc: "Persist active machine selection: task setup -- <machine-name>"
    # Top-level alias for `manifest:setup`. Every doc and operator-facing
    # error message says `task setup -- <machine-name>` -- without this
    # alias those instructions fail with `Task "setup" does not exist`.
    # Forwarding CLI_ARGS preserves the `-- <name>` calling convention.
    status: [false]
    cmds:
      - task: manifest:setup
        vars: { CLI_ARGS: '{{.CLI_ARGS}}' }

  # lint-allow: cmds-without-status
  test:
    desc: "Run all smoke tests (manifest fixtures + hook fixtures)"
    cmds:
      - task: test:manifest
      - task: test:hooks

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate full installation state (all components; run-all-aggregate)"
    status: [false]
    deps: [manifest:resolve]
    # Each per-component validate is `internal: true` -- it cannot be invoked
    # from a shell command line (`task shell:validate` exits 0 with
    # `task: Task "shell:validate" is internal` and silently no-ops). The
    # aggregator therefore dispatches each validate via go-task's `task:`
    # keyword, which bypasses the CLI-level internal gate. `ignore_error: true`
    # on every dispatch preserves run-all-aggregate semantics: every component
    # runs regardless of prior failures.
    #
    # Per-component pass/fail status is emitted INLINE by each validate via
    # `check`/`cross`/`warn` from messages.zsh; there is no cross-component
    # summary footer because go-task does not surface `task:` dispatch exit
    # codes back to the surrounding shell context.
    cmds:
      - task: manifest:validate
        ignore_error: true
      - task: identity:validate
        ignore_error: true
      - task: links:validate
        ignore_error: true
      - task: macos:validate
        ignore_error: true
      - task: packages:validate
        ignore_error: true
      - task: claude:validate
        ignore_error: true
      - task: shell:validate
        ignore_error: true

  # lint-allow: cmds-without-status
  install:
    desc: "Install dotfiles for active machine (canonical entry)"
    summary: |
      task install IS task update -- there is no separate update pipeline.
      Re-running is a no-op (every subtask has a status: block per LINT-01).
    status: [false]
    deps: [manifest:resolve]
    cmds:
      - task: links:install
      - task: packages:install
      - task: claude:install
      - task: macos:install
      # packages:verify is the LAST FATAL task-call in the install pipeline.
      # A missing bin or missing /Applications/<App>.app fails the entire
      # `task install` with exit 1 -- no `success "install complete"` line
      # is printed when verify trips.
      - task: packages:verify
      # install-time orphan warning -- non-fatal. links:reconcile in
      # --warn-only mode emits orphans via warn() to stderr and ALWAYS
      # exits 0 (internal to the task body), so install exits 0 even when
      # an orphan is detected. The standalone `task links:reconcile`
      # (default mode) keeps the non-zero-exit-on-orphans contract for CI.
      - task: audit:links
        vars: { CLI_ARGS: "--warn-only" }
      - |
        # Source messages.zsh via TASKFILE_DIR (NOT DOTFILES_MESSAGES):
        # root DOTFILEDIR var gets polluted to dirname(TASKFILE_DIR) after
        # include-merge because some included taskfiles (lint.yml:59,
        # links.yml:61) define DOTFILEDIR via sh-dirname of TASKFILE_DIR
        # and that definition leaks back to root scope. TASKFILE_DIR is
        # per-task and not subject to that pollution. Same pattern as
        # validate: above.
        source '{{.TASKFILE_DIR}}/install/messages.zsh'
        success "install complete"
