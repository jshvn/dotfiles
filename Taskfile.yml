# =============================================================================
# Taskfile.yml -- root taskfile for v2 dotfiles.
#
# Single canonical entry: `task install`. There is no separate `task update`
# (D-10 -- install IS update; re-run idempotent by every subtask having a
# status: block per LINT-01 / LINT-03a).
#
# Includes:
#   - manifest (P1, real)
#   - lint     (P2, real)
#   - links    (P3, real)
#   - identity (P4, real)
#   - packages (P5, real)
#   - claude   (P7, real)
#   - macos    (P6, real)
# =============================================================================

version: '3'

set: [errexit, pipefail]
silent: true

vars:
  HOME: '{{.HOME}}'
  XDG_CONFIG_HOME: '{{.HOME}}/.config'
  XDG_DATA_HOME: '{{.HOME}}/.local/share'
  XDG_STATE_HOME: '{{.HOME}}/.local/state'
  XDG_CACHE_HOME: '{{.HOME}}/.cache'
  ZDOTDIR: '{{.XDG_CONFIG_HOME}}/zsh'

  # Resolve DOTFILEDIR from this taskfile's parent directory.
  # go-task 3.37+ provides {{.TASKFILE_DIR}} as the directory containing the
  # invoked taskfile (root Taskfile.yml -> repo root).
  DOTFILEDIR: '{{.TASKFILE_DIR}}'

  # Homebrew prefix -- detect from arch when brew not yet installed.
  HOMEBREW_PREFIX:
    sh: |
      if command -v brew >/dev/null 2>&1; then brew --prefix
      elif [[ "$(uname -m)" == "arm64" ]]; then echo "/opt/homebrew"
      else echo "/usr/local"
      fi

  # Consistent messages sourcing for taskfile cmd blocks.
  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # Path to compiled manifest (P1 resolver writes here).
  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # MANIFEST_JSON cats the resolved.json or echoes a stub with a stderr
  # warning so taskfiles that ref: MANIFEST never crash on a fresh checkout.
  # The stub includes an empty `features` map so template expressions like
  # `{{if index .MANIFEST.features "<key>"}}` evaluate to false (nil zero
  # value) instead of erroring out with `index of untyped nil` at parse
  # time. Deeper paths (.identity.git, .packages.brew.*) intentionally
  # remain unset so consumers fail loudly when accessed without setup.
  MANIFEST_JSON:
    sh: |
      if [[ -f "{{.RESOLVED_JSON_PATH}}" ]]; then
        cat "{{.RESOLVED_JSON_PATH}}"
      else
        echo "warn: resolved.json not found (run 'task setup -- <machine>')" >&2
        echo '{"features":{}}'
      fi
  MANIFEST:
    ref: 'fromJson .MANIFEST_JSON'

includes:
  # manifest needs the root's DOTFILEDIR + XDG_STATE_HOME explicitly forwarded;
  # its DOTFILEDIR sh:dirname-twice pattern resolves to the wrong path when
  # invoked as an included taskfile.
  manifest:
    taskfile: ./taskfiles/manifest.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      XDG_STATE_HOME: '{{.XDG_STATE_HOME}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  lint:     ./taskfiles/lint.yml
  links:    ./taskfiles/links.yml
  shell:    ./taskfiles/shell.yml   # Phase-3 shell layer (startup-time gate + validate)
  # identity needs the root's DOTFILEDIR + XDG_STATE_HOME explicitly forwarded
  # since it also reads resolved.json via fromJson (mirrors manifest:).
  identity:
    taskfile: ./taskfiles/identity.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      XDG_STATE_HOME: '{{.XDG_STATE_HOME}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  # packages needs the root's DOTFILEDIR + XDG_STATE_HOME + XDG_CACHE_HOME
  # explicitly forwarded -- it reads resolved.json (manifest), writes the
  # composed Brewfile under XDG_CACHE_HOME (D-08), and verifies post-install
  # state. XDG_CACHE_HOME is new in Phase 5; the root already declares it
  # in the vars: block above.
  packages:
    taskfile: ./taskfiles/packages.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      XDG_STATE_HOME: '{{.XDG_STATE_HOME}}'
      XDG_CACHE_HOME: '{{.XDG_CACHE_HOME}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  claude:   ./taskfiles/claude.yml           # P7 real bodies
  # test needs the root's DOTFILEDIR + DOTFILES_MESSAGES explicitly forwarded;
  # its DOTFILEDIR sh:dirname pattern resolves to the wrong path when
  # invoked as an included taskfile (same issue as manifest: and identity:).
  test:
    taskfile: ./taskfiles/test.yml
    vars:
      DOTFILEDIR: '{{.DOTFILEDIR}}'
      DOTFILES_MESSAGES: '{{.DOTFILES_MESSAGES}}'
  macos:    ./taskfiles/macos.yml           # P6 ships real bodies

# Note: task install IS task update -- D-10 dropped the update: block.
# Phase 3 ships shell alias `update='task install'` for muscle memory.
tasks:

  # lint-allow: cmds-without-status
  default:
    desc: "List available tasks"
    # status: [false] forces the cmd to run every invocation. With status:
    # [true] the task is considered up-to-date and skipped, so `task` alone
    # would print nothing instead of listing tasks.
    status: [false]
    cmds:
      - task --list

  # lint-allow: cmds-without-status
  # Top-level alias for `manifest:setup`. Every doc and operator-facing
  # error message says `task setup -- <machine-name>` (bootstrap.zsh,
  # README.md, CLAUDE.md, manifest:resolve's own precondition msg).
  # Without this alias those instructions fail with
  # `Task "setup" does not exist`. Forwarding CLI_ARGS preserves the
  # `-- <name>` calling convention.
  setup:
    desc: "Persist active machine selection: task setup -- <machine-name>"
    status: [false]
    cmds:
      - task: manifest:setup
        vars: { CLI_ARGS: '{{.CLI_ARGS}}' }

  # lint-allow: cmds-without-status
  test:
    desc: "Run all smoke tests (manifest fixtures + hook fixtures)"
    cmds:
      - task: manifest:test
      - task: test:hooks

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate full installation state (all components; run-all-aggregate)"
    status: [false]
    deps: [manifest:resolve]
    # WR-04: single-pass design. Each per-component validate runs once,
    # output teed via `tee` to terminal + per-component cache file, exit
    # code captured via $PIPESTATUS into a per-component shell variable
    # (rc_manifest, rc_identity, ...). The summary block reads back the
    # cache file (sentinel detection) and the exit-code variable to render
    # one row per component. Replaces the prior two-phase design where
    # each validate ran TWICE: once via `task: <component>:validate` with
    # ignore_error: true for visible output, once via `$(task ...)` for
    # capture. Eliminates the implicit "validates are pure read-only"
    # architectural assumption.
    #
    # D-04 run-all-aggregate: every component runs regardless of prior
    # failures. Order: manifest first (keystone), remaining alphabetical
    # (identity, links, macos, packages, claude) per 08-CONTEXT.md
    # Claude's Discretion.
    cmds:
      - |
        # WR-04: single-pass design. Each per-component validate runs ONCE;
        # stdout/stderr is teed to the terminal (visible to the operator)
        # AND captured to a tempfile so the summary block can detect the
        # `feature disabled -- skipped` sentinel and render `n/a` rows. The
        # previous two-phase design invoked each validate twice (once via
        # `task:` for visible output, once via `$(...)` for capture) on the
        # assumption that validates are pure read-only -- an unenforced
        # architectural property. Single-pass eliminates that footgun.
        #
        # Order: manifest first (keystone), remaining alphabetical
        # (identity, links, macos, packages, claude) per 08-CONTEXT.md
        # Claude's Discretion. D-04 run-all-aggregate: every component
        # runs regardless of prior failures.
        #
        # Source messages.zsh via TASKFILE_DIR (NOT DOTFILES_MESSAGES):
        # root DOTFILEDIR var gets polluted to dirname(TASKFILE_DIR)
        # after include-merge because some included taskfiles
        # (lint.yml:59, links.yml:61) define DOTFILEDIR via sh-dirname
        # of TASKFILE_DIR and that definition leaks back to root scope,
        # stripping the worktree agent segment. TASKFILE_DIR is per-task
        # and not subject to that pollution.
        source '{{.TASKFILE_DIR}}/install/messages.zsh'
        # Disable errexit + pipefail locally: the for-loop captures each
        # per-component validate exit code into $rc and decides how to
        # render that row. With root-level `errexit` (Taskfile.yml line
        # 31) active, a non-zero exit from `task <component>:validate`
        # would abort the loop before $rc is captured.
        set +e +o pipefail
        failures=0
        # Per-component output cache: tempfile per component, cleaned on
        # exit. Using a directory is simpler than tracking N tempfiles and
        # `trap` ensures cleanup even if a validate explodes catastrophically.
        cache_dir=$(mktemp -d "${TMPDIR:-/tmp}/dotfiles-validate-XXXXXX")
        trap 'rm -rf "$cache_dir"' EXIT
        for component in manifest identity links macos packages claude shell; do
          # `tee` writes the validate output to terminal AND tempfile in
          # one pass. PIPESTATUS[0] is the `task` exit code, not tee's.
          task "${component}:validate" 2>&1 | tee "${cache_dir}/${component}"
          eval "rc_${component}=\${PIPESTATUS[0]}"
        done
        header "Validation Summary"
        for component in manifest identity links macos packages claude shell; do
          eval "rc=\$rc_${component}"
          if grep -q "feature disabled -- skipped" "${cache_dir}/${component}"; then
            info "n/a   ${component}"
          elif [ "$rc" -eq 0 ]; then
            check "${component}"
          else
            cross "${component}"
            failures=$(( failures + 1 ))
          fi
        done
        exit "$failures"

  # lint-allow: cmds-without-status
  install:
    desc: "Install dotfiles for active machine (canonical entry)"
    summary: |
      task install IS task update -- there is no separate update pipeline.
      Re-running is a no-op (every subtask has a status: block per LINT-01).
    status: [false]
    deps: [manifest:resolve]
    cmds:
      - task: links:all
      - task: packages:install
      - task: claude:install
      - task: macos:defaults
      - task: macos:shell
      # VRFY-04 + D-10 + ROADMAP P5 success criterion #6:
      # packages:verify is the LAST FATAL task-call in the install pipeline.
      # A missing bin or missing /Applications/<App>.app fails the entire
      # `task install` with exit 1 -- no `success "install complete"` line
      # is printed when verify trips.
      - task: packages:verify
      # CUTV-08 / D-11: install-time orphan warning -- non-fatal.
      # links:reconcile in --warn-only mode emits orphans via warn() to
      # stderr and ALWAYS exits 0 (internal to the task body), so install
      # exits 0 even when an orphan is detected. The standalone
      # `task links:reconcile` (default mode) keeps the non-zero-exit-on-
      # orphans contract for CI use; this entry only invokes warn-only.
      # No `ignore_error: true` needed here -- the task's mode dispatch
      # swallows the non-zero exit internally.
      - task: links:reconcile
        vars: { CLI_ARGS: "--warn-only" }
      - |
        # Source messages.zsh via TASKFILE_DIR (NOT DOTFILES_MESSAGES):
        # root DOTFILEDIR var gets polluted to dirname(TASKFILE_DIR) after
        # include-merge because some included taskfiles (lint.yml:59,
        # links.yml:61) define DOTFILEDIR via sh-dirname of TASKFILE_DIR
        # and that definition leaks back to root scope. TASKFILE_DIR is
        # per-task and not subject to that pollution. Same pattern as
        # validate: above.
        source '{{.TASKFILE_DIR}}/install/messages.zsh'
        success "install complete"
