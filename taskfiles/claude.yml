version: '3'

# =============================================================================
# Claude Code Plugin Management
# =============================================================================
#
# Centralizes install/update/validate for Claude Code plugins, marketplaces,
# and the get-shit-done-cc global installer. All operations are idempotent
# and safe to run on a fresh box (`claude plugin update` would otherwise
# error on uninstalled plugins).
#
# Config symlinks for ~/.config/claude/{CLAUDE.md,settings.json,agents,
# commands,hooks,skills} are owned by taskfiles/links.yml and not touched here.
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  # Marketplaces to keep registered. One per line: `<name> <source>`.
  # Source can be a URL, GitHub repo (owner/repo), or filesystem path.
  CLAUDE_MARKETPLACES: |
    ecc https://github.com/affaan-m/everything-claude-code.git

  # Plugins to keep installed. One per line: `<plugin-name>@<marketplace-name>`.
  CLAUDE_PLUGINS: |
    ecc@ecc

tasks:
  # ===========================================================================
  # Public tasks
  # ===========================================================================

  install:
    desc: "Install Claude Code marketplaces, plugins, and get-shit-done-cc"
    cmds:
      - task: ensure-cli
      - task: marketplaces-add
      - task: plugins-install
      - task: gsd-install
      - |
        {{.DOTFILES_MESSAGES}}
        success "Claude plugins installed"

  update:
    desc: "Update Claude Code marketplaces and plugins"
    cmds:
      - task: ensure-cli
      - task: marketplaces-update
      - task: plugins-install
      - task: plugins-update
      - |
        {{.DOTFILES_MESSAGES}}
        success "Claude plugins updated"

  validate:
    desc: "Validate Claude Code install state"
    vars:
      MARKETPLACES_JSON:
        sh: claude plugin marketplace list --json 2>/dev/null || echo '[]'
      PLUGINS_JSON:
        sh: claude plugin list --json 2>/dev/null || echo '[]'
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        {{.BREW_SHELLENV}}
        if command -v claude >/dev/null 2>&1; then
          check "claude CLI installed"
        else
          cross "claude CLI missing (brew install claude)"
          exit 0
        fi
        if command -v jq >/dev/null 2>&1; then
          check "jq installed"
        else
          cross "jq missing (brew install jq)"
        fi
      - for:
          var: CLAUDE_MARKETPLACES
          split: "\n"
          as: ENTRY
        cmd: |
          [[ -z "{{.ENTRY}}" ]] && exit 0
          read -r name _source <<< "{{.ENTRY}}"
          {{.DOTFILES_MESSAGES}}
          if echo '{{.MARKETPLACES_JSON}}' | jq -e --arg n "$name" '.[] | select(.name == $n)' >/dev/null; then
            check "marketplace $name registered"
          else
            cross "marketplace $name missing"
          fi
      - for:
          var: CLAUDE_PLUGINS
          split: "\n"
          as: ID
        cmd: |
          [[ -z "{{.ID}}" ]] && exit 0
          {{.DOTFILES_MESSAGES}}
          if echo '{{.PLUGINS_JSON}}' | jq -e --arg i "{{.ID}}" '.[] | select(.id == $i)' >/dev/null; then
            check "plugin {{.ID}} installed"
          else
            cross "plugin {{.ID}} missing"
          fi

  status:
    desc: "Show installed Claude plugins and registered marketplaces"
    cmds:
      - |
        {{.BREW_SHELLENV}}
        if ! command -v claude >/dev/null 2>&1; then
          echo "claude CLI not installed" >&2
          exit 1
        fi
        claude plugin marketplace list
        echo
        claude plugin list

  # ===========================================================================
  # Internal helpers
  # ===========================================================================

  ensure-cli:
    internal: true
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        {{.BREW_SHELLENV}}
        missing=0
        if ! command -v claude >/dev/null 2>&1; then
          cross "claude CLI not found -- install via 'brew install claude'"
          missing=1
        fi
        if ! command -v jq >/dev/null 2>&1; then
          cross "jq not found -- install via 'brew install jq'"
          missing=1
        fi
        [[ $missing -eq 0 ]]

  marketplaces-add:
    internal: true
    vars:
      MARKETPLACES_JSON:
        sh: claude plugin marketplace list --json 2>/dev/null || echo '[]'
    cmds:
      - for:
          var: CLAUDE_MARKETPLACES
          split: "\n"
          as: ENTRY
        cmd: |
          [[ -z "{{.ENTRY}}" ]] && exit 0
          read -r name source <<< "{{.ENTRY}}"
          {{.DOTFILES_MESSAGES}}
          {{.BREW_SHELLENV}}
          if echo '{{.MARKETPLACES_JSON}}' | jq -e --arg n "$name" '.[] | select(.name == $n)' >/dev/null; then
            check "marketplace $name already registered"
          else
            info "registering marketplace $name from $source"
            claude plugin marketplace add "$source"
          fi

  marketplaces-update:
    internal: true
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        {{.BREW_SHELLENV}}
        info "updating all marketplaces"
        claude plugin marketplace update

  plugins-install:
    internal: true
    vars:
      PLUGINS_JSON:
        sh: claude plugin list --json 2>/dev/null || echo '[]'
    cmds:
      - for:
          var: CLAUDE_PLUGINS
          split: "\n"
          as: ID
        cmd: |
          [[ -z "{{.ID}}" ]] && exit 0
          {{.DOTFILES_MESSAGES}}
          {{.BREW_SHELLENV}}
          if echo '{{.PLUGINS_JSON}}' | jq -e --arg i "{{.ID}}" '.[] | select(.id == $i)' >/dev/null; then
            check "plugin {{.ID}} already installed"
          else
            info "installing plugin {{.ID}}"
            claude plugin install "{{.ID}}"
          fi

  plugins-update:
    internal: true
    vars:
      PLUGINS_JSON:
        sh: claude plugin list --json 2>/dev/null || echo '[]'
    cmds:
      - for:
          var: CLAUDE_PLUGINS
          split: "\n"
          as: ID
        cmd: |
          [[ -z "{{.ID}}" ]] && exit 0
          {{.DOTFILES_MESSAGES}}
          {{.BREW_SHELLENV}}
          if echo '{{.PLUGINS_JSON}}' | jq -e --arg i "{{.ID}}" '.[] | select(.id == $i)' >/dev/null; then
            info "updating plugin {{.ID}}"
            claude plugin update "{{.ID}}"
          else
            warn "plugin {{.ID}} not installed -- skipping update"
          fi

  gsd-install:
    desc: "Install/update get-shit-done-cc global"
    internal: true
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        {{.BREW_SHELLENV}}
        info "installing get-shit-done-cc (global)"
        npx -y get-shit-done-cc@latest --claude --global
