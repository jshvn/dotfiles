version: '3'

# =============================================================================
# taskfiles/claude.yml -- Claude Code CLI + settings.json composition
#
# Purpose:      Ensure the claude CLI is installed, expose a show diagnostic,
#               and own the settings.d -> settings.json composition pipeline.
#               Marketplace/plugin lifecycle lives in taskfiles/claude-addons.yml
#               (one addon per manifests/claude-addons/<name>.toml).
# Depends on:   taskfiles/helpers.yml; install/messages.zsh;
#               :manifest:resolve (deps); claude + jq CLIs (ensure-cli gate).
# Side effects: writes claude/settings.json atomically from
#               claude/settings.d/*.json fragments + preserved CLI-managed keys.
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  SETTINGS_PATH: '{{.ROOT_DIR}}/claude/settings.json'
  SETTINGS_D:    '{{.ROOT_DIR}}/claude/settings.d'

tasks:

  install:
    desc: "Ensure claude CLI present + recompose settings.json"
    internal: true
    deps: [":manifest:resolve"]
    # Feature gate via status: block (not split-cmd {{if}}/{{end}} -- go-task
    # parses each cmds entry as an independent template).
    status:
      - '{{if index .MANIFEST.features "claude-marketplace"}}false{{else}}true{{end}}'
    cmds:
      - task: ensure-cli
      - task: settings-compose
      - |
        {{.DOTFILES_MESSAGES}}
        success "claude: CLI + settings.json ready"

  # lint-allow: cmds-without-status
  show:
    desc: "Show installed marketplaces + plugins (diagnostic)"
    status: [false]
    cmds:
      - claude plugin marketplace list
      - echo
      - claude plugin list

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate Claude install state (CLI presence + settings.json drift check)"
    internal: true
    deps: [":manifest:resolve"]
    status: [false]
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        # Emit sentinel + exit 0 when claude-marketplace is off so the root
        # `task validate` aggregator can render this row as `n/a`. Sentinel
        # substring "feature disabled -- skipped" is contract-bound across all
        # feature-disabled emitters and matched verbatim by the aggregator
        # summary block.
        {{if not (index .MANIFEST.features "claude-marketplace")}}
        info "claude: feature disabled -- skipped"
        exit 0
        {{end}}
        # Missing CLIs are hard failures. Track via $rc and exit non-zero at
        # the end of this block so the root validate aggregator renders the
        # row as `cross`.
        rc=0
        if command -v claude >/dev/null 2>&1; then
          check "claude CLI installed"
        else
          cross "claude CLI missing -- run 'task packages:install' first"
          rc=1
        fi
        if command -v jq >/dev/null 2>&1; then
          check "jq installed"
        else
          cross "jq missing -- run 'task packages:install' first"
          rc=1
        fi
        exit "$rc"
      - task: audit

  ensure-cli:
    internal: true
    desc: "Hard-fail if claude or jq missing"
    # Explicit `[[ $missing -eq 0 ]]` as final expression so the task exits
    # non-zero regardless of shell flags.
    status:
      - command -v claude >/dev/null 2>&1
      - command -v jq >/dev/null 2>&1
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        missing=0
        if ! command -v claude >/dev/null 2>&1; then
          cross "claude CLI not found -- run 'task packages:install' first"
          missing=1
        fi
        if ! command -v jq >/dev/null 2>&1; then
          cross "jq not found -- run 'task packages:install' first"
          missing=1
        fi
        [[ $missing -eq 0 ]]

  # lint-allow: cmds-without-status
  settings-compose:
    desc: "Compose claude/settings.json from settings.d/*.json + preserved CLI keys"
    internal: true
    summary: |
      Algorithm:
        1. Read existing claude/settings.json and extract enabledPlugins +
           extraKnownMarketplaces (CLI-managed -- compose preserves them
           rather than overwriting).
        2. jq deep-merge every claude/settings.d/*.json in numeric sort order
           (later fragments override earlier ones on key conflict; array-
           typed values are replaced, not concatenated -- matches the resolver
           pass-1 semantics).
        3. Layer preserved CLI-managed keys over the composed object.
        4. Atomic write (mktemp + mv) into claude/settings.json.
    # Always-runs by design -- the compose pipeline is fast (<100ms typical)
    # and idempotent: same fragments + same preserved keys produce a
    # byte-identical settings.json.
    status: [false]
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        set -euo pipefail
        target='{{.SETTINGS_PATH}}'
        settings_d='{{.SETTINGS_D}}'

        # Phase 1: preserve CLI-managed keys from the existing file.
        if [[ -f "$target" ]]; then
          preserved=$(jq -c '{enabledPlugins: (.enabledPlugins // {}), extraKnownMarketplaces: (.extraKnownMarketplaces // {})}' "$target")
        else
          preserved='{"enabledPlugins": {}, "extraKnownMarketplaces": {}}'
        fi

        # Phase 2: glob-guard. compgen returns non-zero when no matches; without
        # this check a literal "$settings_d/*.json" would reach jq and fail.
        if ! ls "$settings_d"/*.json >/dev/null 2>&1; then
          cross "claude:settings-compose: no fragments at ${settings_d}/*.json"
          exit 1
        fi

        # Phase 3: deep-merge fragments + layer preserved CLI keys. jq -s
        # reads all input files into an array; reduce merges them in argv
        # order (numeric filename prefix = merge priority); final * applies
        # the preserved keys on top.
        tmp=$(mktemp)
        trap 'rm -f "$tmp"' EXIT
        if ! jq -s --argjson preserved "$preserved" \
             'reduce .[] as $f ({}; . * $f) | . * $preserved' \
             "$settings_d"/*.json > "$tmp"; then
          cross "claude:settings-compose: jq deep-merge failed"
          exit 1
        fi

        # Sanity check: composed output must be valid JSON with at least the
        # repo's own permissions/hooks keys. Empty or malformed output bricks
        # the live config.
        if ! jq -e '.permissions and .hooks' "$tmp" >/dev/null 2>&1; then
          cross "claude:settings-compose: composed output missing required keys (.permissions, .hooks)"
          exit 1
        fi

        mv "$tmp" "$target"
        trap - EXIT
        fragment_count=$(ls "$settings_d"/*.json 2>/dev/null | wc -l | tr -d ' ')
        check "claude/settings.json composed from ${fragment_count} fragment(s)"

  # lint-allow: cmds-without-status
  audit:
    desc: "Check claude/settings.json for drift vs composed settings.d fragments"
    status: [false]
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        set -euo pipefail
        target='{{.SETTINGS_PATH}}'
        settings_d='{{.SETTINGS_D}}'

        if [[ ! -f "$target" ]]; then
          cross "claude:audit: $target does not exist"
          exit 1
        fi

        if ! ls "$settings_d"/*.json >/dev/null 2>&1; then
          cross "claude:audit: no fragments at ${settings_d}/*.json"
          exit 1
        fi

        # Same compose algorithm as settings-compose, but writes to /tmp for diff.
        preserved=$(jq -c '{enabledPlugins: (.enabledPlugins // {}), extraKnownMarketplaces: (.extraKnownMarketplaces // {})}' "$target")
        expected=$(mktemp)
        actual=$(mktemp)
        trap 'rm -f "$expected" "$actual"' EXIT

        jq -s --argjson preserved "$preserved" -S \
          'reduce .[] as $f ({}; . * $f) | . * $preserved' \
          "$settings_d"/*.json > "$expected"
        jq -S . "$target" > "$actual"

        if diff -q "$expected" "$actual" >/dev/null; then
          check "claude/settings.json matches composed fragments (no drift)"
        else
          cross "claude/settings.json DRIFT detected vs composed fragments"
          echo "--- expected (composed) ---" >&2
          diff "$actual" "$expected" >&2 || true
          echo "--- run 'task claude:settings-compose' to fix ---" >&2
          exit 1
        fi
