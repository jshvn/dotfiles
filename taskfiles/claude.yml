version: '3'

# =============================================================================
# taskfiles/claude.yml -- Claude Code plugin management
#
# Purpose:      Install, upgrade, and validate Claude Code marketplaces,
#               plugins, and the get-shit-done-cc (GSD) global installer.
#               `claude:install` ensures presence (status-gated) AND pulls
#               latest on every run via the internal `upgrade` step; there
#               is no separate operator-facing update command.
# Depends on:   taskfiles/helpers.yml; install/messages.zsh;
#               :manifest:resolve (deps); claude + jq CLIs (ensure-cli gate).
# Side effects: registers marketplaces; installs plugins; runs
#               `npx -y get-shit-done-cc@latest --claude --global`; writes
#               GSD presence sentinel to $XDG_STATE_HOME/dotfiles/gsd-installed.
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  # Marketplaces to keep registered. One per line: `<name> <source>`.
  CLAUDE_MARKETPLACES: |
    ecc https://github.com/affaan-m/everything-claude-code.git

  # Plugins to keep installed. One per line: `<plugin-name>@<marketplace-name>`.
  CLAUDE_PLUGINS: |
    ecc@ecc

  # Presence sentinel for get-shit-done-cc. Touched after successful
  # `npx -y get-shit-done-cc@latest --claude --global`. Delete to force re-run.
  GSD_SENTINEL: '{{.XDG_STATE_HOME}}/dotfiles/gsd-installed'

tasks:

  install:
    desc: "Install + upgrade Claude Code marketplaces, plugins, and get-shit-done-cc"
    internal: true
    deps: [":manifest:resolve"]
    # Feature gate via status: block, NOT split-cmd {{if}}/{{end}}. go-task
    # parses each cmds entry as an independent template, so an opening {{if}}
    # in cmds[0] without its matching {{end}} in the same scalar raises
    # `template: :1: unexpected EOF` on every install run regardless of
    # feature state. Idempotency for the feature-on path lives inside each
    # sub-task; this status block is purely a feature gate.
    #
    # Sequence:
    #   1. marketplace -- status-gated; ensures marketplace+plugin are present
    #      (first-time install, or repairs missing items).
    #   2. upgrade     -- always-run; pulls latest marketplace index, updates
    #      plugins to latest, and busts the GSD sentinel so step 3 re-fetches.
    #   3. gsd         -- sentinel-gated; runs `npx -y get-shit-done-cc@latest`
    #      iff sentinel missing (upgrade just removed it, so this re-runs).
    # Net effect: `task install` ALWAYS pulls latest claude artifacts.
    status:
      - '{{if index .MANIFEST.features "claude-marketplace"}}false{{else}}true{{end}}'
    cmds:
      - task: ensure-cli
      - task: marketplace
      - task: upgrade
      - task: gsd
      - |
        {{.DOTFILES_MESSAGES}}
        success "Claude plugins installed + upgraded"

  marketplace:
    internal: true
    desc: "Register marketplaces + install plugins"
    deps: ["ensure-cli", ":manifest:resolve"]
    # MARKETPLACES_JSON / PLUGINS_JSON are task-scoped so they evaluate only
    # when this task is actually invoked (not at `task --list` or `task lint`
    # time). status: block uses go-template-rendered literal names only --
    # no shell-var references anywhere.
    vars:
      MARKETPLACES_JSON:
        sh: claude plugin marketplace list --json 2>/dev/null || echo '[]'
      PLUGINS_JSON:
        sh: claude plugin list --json 2>/dev/null || echo '[]'
    status:
      - jq -e '.[] | select(.name == "ecc")' <(claude plugin marketplace list --json 2>/dev/null || echo '[]') >/dev/null
      # CRITICAL: selector field MUST match the install body and validate body,
      # both of which select on the `.id` field. Plugin objects expose `.id`
      # as the fully-qualified `<name>@<marketplace>` token (the same string
      # declared in CLAUDE_PLUGINS). Mismatching the field here breaks
      # two-condition idempotency.
      - jq -e '.[] | select(.id == "ecc@ecc")' <(claude plugin list --json 2>/dev/null || echo '[]') >/dev/null
    cmds:
      - for:
          var: CLAUDE_MARKETPLACES
          split: "\n"
          as: ENTRY
        cmd: |
          [[ -z "{{.ENTRY}}" ]] && exit 0
          read -r name source <<< "{{.ENTRY}}"
          {{.DOTFILES_MESSAGES}}
          if echo '{{.MARKETPLACES_JSON}}' | jq -e --arg n "$name" '.[] | select(.name == $n)' >/dev/null; then
            check "marketplace $name already registered"
          else
            info "registering marketplace $name from $source"
            claude plugin marketplace add "$source"
          fi
      - for:
          var: CLAUDE_PLUGINS
          split: "\n"
          as: ID
        cmd: |
          [[ -z "{{.ID}}" ]] && exit 0
          {{.DOTFILES_MESSAGES}}
          if echo '{{.PLUGINS_JSON}}' | jq -e --arg i "{{.ID}}" '.[] | select(.id == $i)' >/dev/null; then
            check "plugin {{.ID}} already installed"
          else
            info "installing plugin {{.ID}}"
            claude plugin install "{{.ID}}"
          fi

  # lint-allow: cmds-without-status
  upgrade:
    internal: true
    desc: "Pull latest marketplace + plugins + bust GSD sentinel (always-run; called by install)"
    deps: ["ensure-cli", ":manifest:resolve"]
    # Always-runs by design -- this is the step that makes `task install`
    # equivalent to `task update`. `claude plugin marketplace update` and
    # `claude plugin update <id>` are upstream-no-op when already at latest,
    # so cost on the happy path is two HTTP HEAD-ish checks. Removing the
    # GSD sentinel last lets the subsequent `gsd` task re-fetch via npx.
    status: [false]
    cmds:
      - claude plugin marketplace update
      - for:
          var: CLAUDE_PLUGINS
          split: "\n"
          as: ID
        cmd: |
          [[ -z "{{.ID}}" ]] && exit 0
          claude plugin update "{{.ID}}"
      - rm -f {{.GSD_SENTINEL}}

  gsd:
    internal: true
    desc: "Install get-shit-done-cc (presence-sentinel idempotent)"
    deps: [ensure-cli]
    # Sentinel idempotency: touch AFTER npx so bash errexit propagates a
    # failed npx and the sentinel is never written for a broken install.
    status:
      - test -f {{.GSD_SENTINEL}}
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        info "installing get-shit-done-cc (global)"
        npx -y get-shit-done-cc@latest --claude --global
        mkdir -p "$(dirname {{.GSD_SENTINEL}})"
        touch {{.GSD_SENTINEL}}
        success "GSD installed; sentinel touched at {{.GSD_SENTINEL}}"

  # lint-allow: cmds-without-status
  status:
    desc: "Show installed marketplaces + plugins (diagnostic)"
    internal: true
    status: [false]
    cmds:
      - claude plugin marketplace list
      - echo
      - claude plugin list

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate Claude install state"
    internal: true
    deps: [":manifest:resolve"]
    status: [false]
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        # Emit sentinel + exit 0 when claude-marketplace is off so the root
        # `task validate` aggregator can render this row as `n/a`. Sentinel
        # substring "feature disabled -- skipped" is contract-bound across all
        # feature-disabled emitters and matched verbatim by the aggregator
        # summary block.
        {{if not (index .MANIFEST.features "claude-marketplace")}}
        info "claude: feature disabled -- skipped"
        exit 0
        {{end}}
        # Missing CLIs are hard failures. Track via $rc and exit non-zero at
        # the end of this block so the root validate aggregator renders the
        # row as `cross`. Without $rc, the block would exit 0 on missing
        # claude, silently passing a known-broken state.
        rc=0
        if command -v claude >/dev/null 2>&1; then
          check "claude CLI installed"
        else
          cross "claude CLI missing -- run 'task packages:install' first"
          rc=1
        fi
        if command -v jq >/dev/null 2>&1; then
          check "jq installed"
        else
          cross "jq missing -- run 'task packages:install' first"
          rc=1
        fi
        exit "$rc"
      - for:
          var: CLAUDE_MARKETPLACES
          split: "\n"
          as: ENTRY
        cmd: |
          # Short-circuit feature-off.
          {{if not (index .MANIFEST.features "claude-marketplace")}}exit 0{{end}}
          [[ -z "{{.ENTRY}}" ]] && exit 0
          read -r name _source <<< "{{.ENTRY}}"
          {{.DOTFILES_MESSAGES}}
          marketplaces_json=$(claude plugin marketplace list --json 2>/dev/null || echo '[]')
          if echo "$marketplaces_json" | jq -e --arg n "$name" '.[] | select(.name == $n)' >/dev/null; then
            check "marketplace $name registered"
          else
            cross "marketplace $name missing -- run 'task claude:install'"
          fi
      - for:
          var: CLAUDE_PLUGINS
          split: "\n"
          as: ID
        cmd: |
          {{if not (index .MANIFEST.features "claude-marketplace")}}exit 0{{end}}
          [[ -z "{{.ID}}" ]] && exit 0
          {{.DOTFILES_MESSAGES}}
          plugins_json=$(claude plugin list --json 2>/dev/null || echo '[]')
          if echo "$plugins_json" | jq -e --arg i "{{.ID}}" '.[] | select(.id == $i)' >/dev/null; then
            check "plugin {{.ID}} installed"
          else
            cross "plugin {{.ID}} missing -- run 'task claude:install'"
          fi
      - |
        {{if not (index .MANIFEST.features "claude-marketplace")}}exit 0{{end}}
        {{.DOTFILES_MESSAGES}}
        if test -f {{.GSD_SENTINEL}}; then
          check "GSD installed (sentinel present at {{.GSD_SENTINEL}})"
        else
          cross "GSD missing -- run 'task claude:install'"
        fi

  ensure-cli:
    internal: true
    desc: "Hard-fail if claude or jq missing"
    # Explicit `[[ $missing -eq 0 ]]` as final expression so the task exits
    # non-zero regardless of shell flags.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        missing=0
        if ! command -v claude >/dev/null 2>&1; then
          cross "claude CLI not found -- run 'task packages:install' first"
          missing=1
        fi
        if ! command -v jq >/dev/null 2>&1; then
          cross "jq not found -- run 'task packages:install' first"
          missing=1
        fi
        [[ $missing -eq 0 ]]
