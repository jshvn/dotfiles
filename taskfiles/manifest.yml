version: '3'

# =============================================================================
# taskfiles/manifest.yml -- go-task module: manifest engine orchestration
#
# Exposes the manifest engine (install/resolver.zsh) to humans and downstream
# taskfiles. Wires Plan 02's resolver against Plan 01's fixtures.
#
# Included by the root Taskfile.yml. The root's exported vars (DOTFILEDIR,
# XDG_STATE_HOME, DOTFILES_MESSAGES) override the local fallbacks below via
# go-task vars-merge. For standalone invocation:
#   task -t taskfiles/manifest.yml <task> [-- <args>]
#
# Phase 12 Plan 07: the `manifest:test` + `manifest:test:add-machine` task
# bodies were moved to `taskfiles/test.yml` as `test:manifest` +
# `test:add-machine` (D-04 + Claude's-Discretion item 7). Consult test.yml
# for the implementation.
#
# Depends on: install/resolver.zsh (Plan 02), yq >= 4.52.1, jq >= 1.7
# =============================================================================

includes:
  _: ./helpers.yml

# =============================================================================
# Vars block -- self-contained so `task -t taskfiles/manifest.yml ...` works
# without the root Taskfile.yml being loaded.
#
# DOTFILEDIR: resolved relative to this file's parent directory.
# XDG_STATE_HOME: falls back to $HOME/.local/state if not exported.
# DOTFILES_MESSAGES: inline source command; sourced in every cmd block.
#
# When the root Taskfile.yml includes this module (Phase 2+), its own
# DOTFILEDIR / XDG_STATE_HOME / DOTFILES_MESSAGES vars take precedence.
# =============================================================================

vars:
  HOME: '{{.HOME}}'

  XDG_STATE_HOME:
    sh: echo "${XDG_STATE_HOME:-$HOME/.local/state}"

  # Resolve DOTFILEDIR from this taskfile's parent directory.
  # go-task 3.37+ provides {{.TASKFILE_DIR}} as the directory containing
  # the invoked taskfile. For taskfiles/manifest.yml, dirname once goes
  # from <repo>/taskfiles to <repo>.
  # NOTE: the prior `dirname dirname realpath ${TASKFILE:-$0}` pattern
  # silently fell back to cwd when $TASKFILE is not exported (it is not
  # exported by go-task; only the {{.TASKFILE}} template var is). The
  # double-dirname of cwd produced a path one segment above the repo
  # root, which broke resolver.zsh invocation on fresh machines that had
  # no XDG_STATE/resolved.json cache to short-circuit the task. This sh:
  # pattern matches lint.yml:59 and links.yml:61.
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # --- State paths ---
  STATE_DIR: '{{.XDG_STATE_HOME}}/dotfiles'
  STATE_FILE: '{{.STATE_DIR}}/machine'
  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # --- Manifest source paths ---
  DEFAULTS_TOML: '{{.DOTFILEDIR}}/manifests/defaults.toml'
  MACHINES_DIR: '{{.DOTFILEDIR}}/manifests/machines'
  FIXTURES_DIR: '{{.DOTFILEDIR}}/manifests/test/fixtures'

  # --- Active machine (read from state file) ---
  # RESEARCH §6.1: sh: block evaluated at task invocation time.
  # WR-08 / IN-02 fix: previous `cat | tr -d '[:space:]'` would silently
  # rewrite "bad name\n" -> "badname" by stripping ALL whitespace, not
  # just edges. Read just the first line of the state file (it is
  # single-line by contract) and trim leading/trailing whitespace via
  # sed; this preserves any embedded whitespace so the downstream
  # MACHINE_NAME_RE check rejects malformed values cleanly.
  MACHINE:
    sh: head -n1 '{{.STATE_FILE}}' 2>/dev/null | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'

  MACHINE_TOML: '{{.MACHINES_DIR}}/{{.MACHINE}}.toml'

  # --- Resolved manifest JSON (used for fromJson consumption, MFST-06) ---
  # WR-03 fix: emit a stderr warning when the resolved.json file is
  # missing or empty so Phase 2+ tasks that rely on
  # {{.MANIFEST.identity.git}} fail loudly instead of silently
  # evaluating to <no value> against an empty {} fallback. The
  # fromJson ref still needs valid JSON so the {} fallback is kept,
  # but the warning surfaces the misconfiguration to the user.
  # The fallback stub includes an empty `features` map so
  # `{{if index .MANIFEST.features "<key>"}}` evaluates to false (nil zero
  # value) instead of erroring out with `index of untyped nil` at
  # template-parse time on a fresh machine where resolved.json has not yet
  # been written. Deeper paths (.identity.git, .packages.brew.*) remain
  # unset so consumers still fail loudly if accessed before setup.
  MANIFEST_JSON:
    sh: |
      if [[ -s '{{.RESOLVED_JSON_PATH}}' ]]; then
        cat '{{.RESOLVED_JSON_PATH}}'
      else
        echo "warning: {{.RESOLVED_JSON_PATH}} missing or empty -- run 'task setup -- <machine>' first" >&2
        echo '{"features":{}}'
      fi

  # fromJson ref: verified syntax (RESEARCH §6.1, PATTERNS Pattern 2).
  # Downstream: {{.MANIFEST.identity.git}}
  # Kebab keys: {{index .MANIFEST.features "one-password-ssh"}}
  MANIFEST:
    ref: 'fromJson .MANIFEST_JSON'

  # Human-readable list of available machines for error messages.
  AVAILABLE_MACHINES:
    sh: ls '{{.MACHINES_DIR}}'/*.toml 2>/dev/null | xargs -n1 basename | sed 's/\.toml$//' | tr '\n' ' '

# =============================================================================
# Tasks: Setup
# =============================================================================

tasks:

  setup:
    desc: "Persist active machine selection: task setup -- <machine-name>"
    internal: true
    # requires: is a hard-fail when the var is absent (no arg passed).
    requires:
      vars: [CLI_ARGS]
    # CR-03 fix: pass CLI_ARGS via the environment instead of templating
    # it into shell-quoted text. Go-task substitutes {{.CLI_ARGS}} into
    # the rendered shell *before* the shell parses it, so any apostrophe
    # in user input would unterminate the surrounding single-quoted
    # string and produce a confusing parse error rather than the
    # "invalid machine" precondition message. Reading $CLI_ARGS_ENV from
    # the environment moves the value past the parser intact, where the
    # regex check can reject it cleanly.
    env:
      CLI_ARGS_ENV: '{{.CLI_ARGS}}'
    # preconditions: enforces T-MAN-02 (path-traversal guard) and manifest
    # file existence. Both checks run before any state-file write.
    # RESEARCH §12 security hardening: kebab-case regex then file-existence.
    # NOTE: the setup task allows underscore-prefixed names (e.g. _addmachine-test)
    # so the regex is slightly wider than pure kebab-case, matching the resolver's
    # MACHINE_NAME_RE = '^[a-z0-9_][a-z0-9_-]*$'.
    preconditions:
      - sh: |
          name="${CLI_ARGS_ENV}"
          [[ "$name" =~ ^[a-z0-9_][a-z0-9_-]*$ ]] || exit 1
          test -f "{{.MACHINES_DIR}}/${name}.toml"
        msg: |
          invalid or unknown machine: "{{.CLI_ARGS}}"
            available: {{.AVAILABLE_MACHINES}}
    cmds:
      - mkdir -p "{{.STATE_DIR}}"
      - printf '%s' "${CLI_ARGS_ENV}" > "{{.STATE_FILE}}"
      - |
        {{.DOTFILES_MESSAGES}}
        success "Machine set to: ${CLI_ARGS_ENV}"
      - task: validate
        vars: { CLI_ARGS: '' }
      - task: resolve

# =============================================================================
# Tasks: Resolve
# =============================================================================

  resolve:
    desc: "Compile defaults + active machine TOML to resolved.json (idempotent)"
    internal: true
    # D-16: missing-state = hard fail with actionable error (PATTERNS Pattern 5).
    preconditions:
      - sh: test -f "{{.STATE_FILE}}"
        msg: |
          no machine selected
            run: task setup -- <machine-name>
            available: {{.AVAILABLE_MACHINES}}
    cmds:
      - mkdir -p "{{.STATE_DIR}}"
      - |
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh"
    # Idempotency via BSD-find mtime check (RESEARCH §7, PATTERNS Pattern 4).
    # S4: status blocks use {{.X}} template vars only -- never $X shell vars.
    status:
      - test -f "{{.RESOLVED_JSON_PATH}}"
      - |
        out=$(find "{{.DOTFILEDIR}}/manifests" \( -name 'defaults.toml' -o -path '*/machines/*.toml' \) -newer "{{.RESOLVED_JSON_PATH}}" -print -quit 2>/dev/null)
        [ -z "$out" ]

# =============================================================================
# Tasks: Show
# =============================================================================

  show:
    desc: "Print resolved manifest (default: active machine; -- [--machine] NAME for any machine)"
    internal: true
    # No preconditions -- resolver hard-fails with actionable error if no state.
    # No status -- this is a read/print task; always re-run.
    # CR-03 fix: pass CLI_ARGS via env so apostrophes / shell metacharacters
    # in user input cannot break the rendered shell parse.
    env:
      CLI_ARGS_ENV: '{{.CLI_ARGS}}'
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        # Parse --machine NAME from CLI_ARGS if present (D-17).
        # Use sed for extraction -- portable across gosh/sh/zsh (no zsh match[]).
        machine_name=""
        cli_args="${CLI_ARGS_ENV}"
        machine_name=$(printf '%s' "$cli_args" | sed -n 's/.*--machine[[:space:]]\{1,\}\([a-z0-9_][a-z0-9_-]*\).*/\1/p')
        # WR-06 fix: also accept a bare machine name (e.g.
        # `task manifest:show -- personal-laptop`) so usage matches the
        # `task setup -- <name>` form. Only accepted when --machine was
        # not seen and the entire CLI_ARGS payload (whitespace-trimmed)
        # is a valid machine name.
        if [[ -z "$machine_name" ]]; then
          candidate=$(printf '%s' "$cli_args" | tr -d '[:space:]')
          if [[ "$candidate" =~ ^[a-z0-9_][a-z0-9_-]*$ ]]; then
            machine_name="$candidate"
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          # WR-08 fix: read first line + trim edges only (do not strip
          # embedded whitespace, which would silently mangle malformed
          # state-file contents into a wrong-but-valid name).
          if [[ -f "{{.STATE_FILE}}" ]]; then
            machine_name=$(head -n1 "{{.STATE_FILE}}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          error "no machine selected and --machine not specified"
          error "  run: task setup -- <machine-name>"
          exit 1
        fi
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" --machine "$machine_name" --stdout \
          | jq .

# =============================================================================
# Tasks: Validate
# =============================================================================

  validate:
    desc: "Validate active (or -- [--machine] NAME) manifest schema"
    internal: true
    # CR-03 fix: pass CLI_ARGS via env so apostrophes / shell metacharacters
    # in user input cannot break the rendered shell parse.
    env:
      CLI_ARGS_ENV: '{{.CLI_ARGS}}'
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        # Parse --machine NAME from CLI_ARGS if present.
        # Use sed for extraction -- portable across gosh/sh/zsh (no zsh match[]).
        machine_name=""
        cli_args="${CLI_ARGS_ENV}"
        machine_name=$(printf '%s' "$cli_args" | sed -n 's/.*--machine[[:space:]]\{1,\}\([a-z0-9_][a-z0-9_-]*\).*/\1/p')
        # WR-06 fix: accept bare machine name as a friendly alternative.
        if [[ -z "$machine_name" ]]; then
          candidate=$(printf '%s' "$cli_args" | tr -d '[:space:]')
          if [[ "$candidate" =~ ^[a-z0-9_][a-z0-9_-]*$ ]]; then
            machine_name="$candidate"
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          # WR-08 fix: read first line + trim edges only (do not strip
          # embedded whitespace, which would silently mangle malformed
          # state-file contents into a wrong-but-valid name).
          if [[ -f "{{.STATE_FILE}}" ]]; then
            machine_name=$(head -n1 "{{.STATE_FILE}}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          error "no machine selected and --machine not specified"
          error "  run: task setup -- <machine-name>"
          exit 1
        fi
        # Verify defaults.toml and machine TOML exist before invoking resolver.
        if [[ ! -f "{{.DEFAULTS_TOML}}" ]]; then
          cross "manifests/defaults.toml not found"
          exit 1
        fi
        check "manifests/defaults.toml exists"
        machine_toml="{{.MACHINES_DIR}}/${machine_name}.toml"
        if [[ ! -f "$machine_toml" ]]; then
          cross "manifests/machines/${machine_name}.toml not found"
          exit 1
        fi
        check "manifests/machines/${machine_name}.toml exists"
        # Delegate schema validation to resolver (D-03, D-04, T-MAN-01).
        # Resolver's non-zero exit propagates the failure through go-task.
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" --validate-only --machine "$machine_name"
