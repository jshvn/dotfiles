version: '3'

# =============================================================================
# taskfiles/manifest.yml -- go-task module: manifest engine orchestration
#
# Exposes the manifest engine (install/resolver.zsh) to humans and downstream
# taskfiles. Wires Plan 02's resolver against Plan 01's fixtures.
#
# NOT yet included from the root Taskfile.yml (Phase 1 constraint).
# Invoke standalone via:
#   task -t taskfiles/manifest.yml <task> [-- <args>]
#
# Phase 2 will add `manifest: ./taskfiles/manifest.yml` to the root includes
# block. When included, the root's exported vars (DOTFILEDIR, XDG_STATE_HOME,
# DOTFILES_MESSAGES) override the local fallbacks below via go-task vars-merge.
#
# Depends on: install/resolver.zsh (Plan 02), yq >= 4.52.1, jq >= 1.7
# =============================================================================

includes:
  _: ./helpers.yml

# =============================================================================
# Vars block -- self-contained so `task -t taskfiles/manifest.yml ...` works
# without the root Taskfile.yml being loaded.
#
# DOTFILEDIR: resolved relative to this file's parent directory.
# XDG_STATE_HOME: falls back to $HOME/.local/state if not exported.
# DOTFILES_MESSAGES: inline source command; sourced in every cmd block.
#
# When the root Taskfile.yml includes this module (Phase 2+), its own
# DOTFILEDIR / XDG_STATE_HOME / DOTFILES_MESSAGES vars take precedence.
# =============================================================================

vars:
  HOME: '{{.HOME}}'

  XDG_STATE_HOME:
    sh: echo "${XDG_STATE_HOME:-$HOME/.local/state}"

  # Resolve DOTFILEDIR from this taskfile's parent directory.
  # go-task 3.37+ provides {{.TASKFILE_DIR}} as the directory containing
  # the invoked taskfile. For taskfiles/manifest.yml, dirname once goes
  # from <repo>/taskfiles to <repo>.
  # NOTE: the prior `dirname dirname realpath ${TASKFILE:-$0}` pattern
  # silently fell back to cwd when $TASKFILE is not exported (it is not
  # exported by go-task; only the {{.TASKFILE}} template var is). The
  # double-dirname of cwd produced a path one segment above the repo
  # root, which broke resolver.zsh invocation on fresh machines that had
  # no XDG_STATE/resolved.json cache to short-circuit the task. This sh:
  # pattern matches lint.yml:59 and links.yml:61.
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # --- State paths ---
  STATE_DIR: '{{.XDG_STATE_HOME}}/dotfiles'
  STATE_FILE: '{{.STATE_DIR}}/machine'
  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # --- Manifest source paths ---
  DEFAULTS_TOML: '{{.DOTFILEDIR}}/manifests/defaults.toml'
  MACHINES_DIR: '{{.DOTFILEDIR}}/manifests/machines'
  FIXTURES_DIR: '{{.DOTFILEDIR}}/manifests/test/fixtures'

  # --- Active machine (read from state file) ---
  # RESEARCH §6.1: sh: block evaluated at task invocation time.
  # WR-08 / IN-02 fix: previous `cat | tr -d '[:space:]'` would silently
  # rewrite "bad name\n" -> "badname" by stripping ALL whitespace, not
  # just edges. Read just the first line of the state file (it is
  # single-line by contract) and trim leading/trailing whitespace via
  # sed; this preserves any embedded whitespace so the downstream
  # MACHINE_NAME_RE check rejects malformed values cleanly.
  MACHINE:
    sh: head -n1 '{{.STATE_FILE}}' 2>/dev/null | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'

  MACHINE_TOML: '{{.MACHINES_DIR}}/{{.MACHINE}}.toml'

  # --- Resolved manifest JSON (used for fromJson consumption, MFST-06) ---
  # WR-03 fix: emit a stderr warning when the resolved.json file is
  # missing or empty so Phase 2+ tasks that rely on
  # {{.MANIFEST.identity.git}} fail loudly instead of silently
  # evaluating to <no value> against an empty {} fallback. The
  # fromJson ref still needs valid JSON so the {} fallback is kept,
  # but the warning surfaces the misconfiguration to the user.
  # The fallback stub includes an empty `features` map so
  # `{{if index .MANIFEST.features "<key>"}}` evaluates to false (nil zero
  # value) instead of erroring out with `index of untyped nil` at
  # template-parse time on a fresh machine where resolved.json has not yet
  # been written. Deeper paths (.identity.git, .packages.brew.*) remain
  # unset so consumers still fail loudly if accessed before setup.
  MANIFEST_JSON:
    sh: |
      if [[ -s '{{.RESOLVED_JSON_PATH}}' ]]; then
        cat '{{.RESOLVED_JSON_PATH}}'
      else
        echo "warning: {{.RESOLVED_JSON_PATH}} missing or empty -- run 'task setup -- <machine>' first" >&2
        echo '{"features":{}}'
      fi

  # fromJson ref: verified syntax (RESEARCH §6.1, PATTERNS Pattern 2).
  # Downstream: {{.MANIFEST.identity.git}}
  # Kebab keys: {{index .MANIFEST.features "one-password-ssh"}}
  MANIFEST:
    ref: 'fromJson .MANIFEST_JSON'

  # Human-readable list of available machines for error messages.
  AVAILABLE_MACHINES:
    sh: ls '{{.MACHINES_DIR}}'/*.toml 2>/dev/null | xargs -n1 basename | sed 's/\.toml$//' | tr '\n' ' '

# =============================================================================
# Tasks: Setup
# =============================================================================

tasks:

  setup:
    desc: "Persist active machine selection: task setup -- <machine-name>"
    # requires: is a hard-fail when the var is absent (no arg passed).
    requires:
      vars: [CLI_ARGS]
    # CR-03 fix: pass CLI_ARGS via the environment instead of templating
    # it into shell-quoted text. Go-task substitutes {{.CLI_ARGS}} into
    # the rendered shell *before* the shell parses it, so any apostrophe
    # in user input would unterminate the surrounding single-quoted
    # string and produce a confusing parse error rather than the
    # "invalid machine" precondition message. Reading $CLI_ARGS_ENV from
    # the environment moves the value past the parser intact, where the
    # regex check can reject it cleanly.
    env:
      CLI_ARGS_ENV: '{{.CLI_ARGS}}'
    # preconditions: enforces T-MAN-02 (path-traversal guard) and manifest
    # file existence. Both checks run before any state-file write.
    # RESEARCH §12 security hardening: kebab-case regex then file-existence.
    # NOTE: the setup task allows underscore-prefixed names (e.g. _addmachine-test)
    # so the regex is slightly wider than pure kebab-case, matching the resolver's
    # MACHINE_NAME_RE = '^[a-z0-9_][a-z0-9_-]*$'.
    preconditions:
      - sh: |
          name="${CLI_ARGS_ENV}"
          [[ "$name" =~ ^[a-z0-9_][a-z0-9_-]*$ ]] || exit 1
          test -f "{{.MACHINES_DIR}}/${name}.toml"
        msg: |
          invalid or unknown machine: "{{.CLI_ARGS}}"
            available: {{.AVAILABLE_MACHINES}}
    cmds:
      - mkdir -p "{{.STATE_DIR}}"
      - printf '%s' "${CLI_ARGS_ENV}" > "{{.STATE_FILE}}"
      - |
        {{.DOTFILES_MESSAGES}}
        success "Machine set to: ${CLI_ARGS_ENV}"
      - task: validate
        vars: { CLI_ARGS: '' }
      - task: resolve

# =============================================================================
# Tasks: Resolve
# =============================================================================

  resolve:
    desc: "Compile defaults + active machine TOML to resolved.json (idempotent)"
    # D-16: missing-state = hard fail with actionable error (PATTERNS Pattern 5).
    preconditions:
      - sh: test -f "{{.STATE_FILE}}"
        msg: |
          no machine selected
            run: task setup -- <machine-name>
            available: {{.AVAILABLE_MACHINES}}
    cmds:
      - mkdir -p "{{.STATE_DIR}}"
      - |
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh"
    # Idempotency via BSD-find mtime check (RESEARCH §7, PATTERNS Pattern 4).
    # S4: status blocks use {{.X}} template vars only -- never $X shell vars.
    status:
      - test -f "{{.RESOLVED_JSON_PATH}}"
      - |
        out=$(find "{{.DOTFILEDIR}}/manifests" \( -name 'defaults.toml' -o -path '*/machines/*.toml' \) -newer "{{.RESOLVED_JSON_PATH}}" -print -quit 2>/dev/null)
        [ -z "$out" ]

# =============================================================================
# Tasks: Show
# =============================================================================

  show:
    desc: "Print resolved manifest (default: active machine; -- [--machine] NAME for any machine)"
    # No preconditions -- resolver hard-fails with actionable error if no state.
    # No status -- this is a read/print task; always re-run.
    # CR-03 fix: pass CLI_ARGS via env so apostrophes / shell metacharacters
    # in user input cannot break the rendered shell parse.
    env:
      CLI_ARGS_ENV: '{{.CLI_ARGS}}'
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        # Parse --machine NAME from CLI_ARGS if present (D-17).
        # Use sed for extraction -- portable across gosh/sh/zsh (no zsh match[]).
        machine_name=""
        cli_args="${CLI_ARGS_ENV}"
        machine_name=$(printf '%s' "$cli_args" | sed -n 's/.*--machine[[:space:]]\{1,\}\([a-z0-9_][a-z0-9_-]*\).*/\1/p')
        # WR-06 fix: also accept a bare machine name (e.g.
        # `task manifest:show -- personal-laptop`) so usage matches the
        # `task setup -- <name>` form. Only accepted when --machine was
        # not seen and the entire CLI_ARGS payload (whitespace-trimmed)
        # is a valid machine name.
        if [[ -z "$machine_name" ]]; then
          candidate=$(printf '%s' "$cli_args" | tr -d '[:space:]')
          if [[ "$candidate" =~ ^[a-z0-9_][a-z0-9_-]*$ ]]; then
            machine_name="$candidate"
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          # WR-08 fix: read first line + trim edges only (do not strip
          # embedded whitespace, which would silently mangle malformed
          # state-file contents into a wrong-but-valid name).
          if [[ -f "{{.STATE_FILE}}" ]]; then
            machine_name=$(head -n1 "{{.STATE_FILE}}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          error "no machine selected and --machine not specified"
          error "  run: task setup -- <machine-name>"
          exit 1
        fi
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" --machine "$machine_name" --stdout \
          | jq .

# =============================================================================
# Tasks: Validate
# =============================================================================

  validate:
    desc: "Validate active (or -- [--machine] NAME) manifest schema"
    # CR-03 fix: pass CLI_ARGS via env so apostrophes / shell metacharacters
    # in user input cannot break the rendered shell parse.
    env:
      CLI_ARGS_ENV: '{{.CLI_ARGS}}'
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        # Parse --machine NAME from CLI_ARGS if present.
        # Use sed for extraction -- portable across gosh/sh/zsh (no zsh match[]).
        machine_name=""
        cli_args="${CLI_ARGS_ENV}"
        machine_name=$(printf '%s' "$cli_args" | sed -n 's/.*--machine[[:space:]]\{1,\}\([a-z0-9_][a-z0-9_-]*\).*/\1/p')
        # WR-06 fix: accept bare machine name as a friendly alternative.
        if [[ -z "$machine_name" ]]; then
          candidate=$(printf '%s' "$cli_args" | tr -d '[:space:]')
          if [[ "$candidate" =~ ^[a-z0-9_][a-z0-9_-]*$ ]]; then
            machine_name="$candidate"
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          # WR-08 fix: read first line + trim edges only (do not strip
          # embedded whitespace, which would silently mangle malformed
          # state-file contents into a wrong-but-valid name).
          if [[ -f "{{.STATE_FILE}}" ]]; then
            machine_name=$(head -n1 "{{.STATE_FILE}}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          fi
        fi
        if [[ -z "$machine_name" ]]; then
          error "no machine selected and --machine not specified"
          error "  run: task setup -- <machine-name>"
          exit 1
        fi
        # Verify defaults.toml and machine TOML exist before invoking resolver.
        if [[ ! -f "{{.DEFAULTS_TOML}}" ]]; then
          cross "manifests/defaults.toml not found"
          exit 1
        fi
        check "manifests/defaults.toml exists"
        machine_toml="{{.MACHINES_DIR}}/${machine_name}.toml"
        if [[ ! -f "$machine_toml" ]]; then
          cross "manifests/machines/${machine_name}.toml not found"
          exit 1
        fi
        check "manifests/machines/${machine_name}.toml exists"
        # Delegate schema validation to resolver (D-03, D-04, T-MAN-01).
        # Resolver's non-zero exit propagates the failure through go-task.
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" --validate-only --machine "$machine_name"

# =============================================================================
# Tasks: Test
# =============================================================================

  test:
    desc: "Run deep-merge fixtures (positive + negative) — MFST-05"
    # No status -- always re-run; this is a test runner.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        failures=0
        fix_dir="{{.FIXTURES_DIR}}"

        # Cleanup tracker for negative-fixture copies in MACHINES_DIR.
        # CR-01 fix: any failure between cp and rm -f (yq crash, SIGINT,
        # validator coredump) would otherwise leak _invalid-* files into
        # manifests/machines/, polluting AVAILABLE_MACHINES and breaking
        # `task setup` autocomplete UX. go-task's mvdan/sh interpreter only
        # supports EXIT in trap (not INT/TERM by name); go-task forwards
        # received signals to its child shell, which then runs the EXIT
        # trap on its way out, so EXIT alone covers Ctrl-C correctly.
        neg_copies=()
        cleanup_neg() {
          local f
          for f in "${neg_copies[@]}"; do
            rm -f "$f"
          done
        }
        trap cleanup_neg EXIT

        # ---------------------------------------------------------------
        # Positive fixtures 01-06: run inline merge pipeline + diff
        # ---------------------------------------------------------------
        for fix in "${fix_dir}"/[0-9][0-9]-*; do
          fix_name=$(basename "$fix")

          # Pass 1: deep-merge defaults + machine via yq (RESEARCH §4.2, D-07).
          merged=$(yq eval-all '. as $i ireduce ({}; . * $i)' \
            "$fix/defaults.toml" "$fix/machine.toml" -o json 2>/dev/null) || {
            cross "fixture: ${fix_name} -- yq merge failed"
            failures=$(( failures + 1 ))
            continue
          }

          # Pass 2 (conditional): union extra_packages only when either side declares it.
          # Avoids incorrectly adding the key to fixtures that omit extra_packages.
          has_extras_def=false
          has_extras_mach=false
          if yq 'has("packages") and (.packages | has("brew")) and (.packages.brew | has("extra_packages"))' \
              "$fix/defaults.toml" 2>/dev/null | grep -q true; then
            has_extras_def=true
          fi
          if yq 'has("packages") and (.packages | has("brew")) and (.packages.brew | has("extra_packages"))' \
              "$fix/machine.toml" 2>/dev/null | grep -q true; then
            has_extras_mach=true
          fi

          if [[ "$has_extras_def" == "true" ]] || [[ "$has_extras_mach" == "true" ]]; then
            extras_def=$(yq -o=json '.packages.brew.extra_packages // []' "$fix/defaults.toml")
            extras_mach=$(yq -o=json '.packages.brew.extra_packages // []' "$fix/machine.toml")
            union_extras=$(printf '%s %s' "$extras_def" "$extras_mach" | jq -s 'add | unique')
            actual=$(printf '%s' "$merged" \
              | jq --argjson extras "$union_extras" '.packages.brew.extra_packages = $extras')
          else
            actual="$merged"
          fi

          # Diff actual vs expected (normalized via jq -S for key-sorted comparison).
          if diff <(printf '%s' "$actual" | jq -S .) <(jq -S . "$fix/expected.json") > /dev/null 2>&1; then
            check "fixture: ${fix_name} -- pass"
          else
            cross "fixture: ${fix_name} -- FAIL (diff: actual vs expected)"
            diff <(printf '%s' "$actual" | jq -S .) <(jq -S . "$fix/expected.json") || true
            failures=$(( failures + 1 ))
          fi
        done

        # ---------------------------------------------------------------
        # Negative fixtures: validate-only; assert non-zero exit + stderr
        # fragment.
        # ---------------------------------------------------------------
        # _invalid-missing-desc: validator must reject; stderr must contain
        # "meta.description".
        # CR-01 fix: register copy in neg_copies BEFORE cp so the EXIT trap
        # can clean it up even if cp itself fails or is interrupted. Drop
        # the silenced `2>/dev/null || true` -- let cp errors fail loudly
        # rather than silently running the test against stale or absent
        # files (which would mask real bugs as "test passed").
        neg_dir="${fix_dir}/_invalid-missing-desc"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-missing-desc.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-missing-desc 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'meta.description'; then
          check "fixture: _invalid-missing-desc -- correctly rejected (meta.description in stderr)"
        else
          cross "fixture: _invalid-missing-desc -- expected rejection with 'meta.description' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-bad-os: validator must reject; stderr must contain "darwin".
        # CR-01 fix: same pattern as _invalid-missing-desc above.
        neg_dir="${fix_dir}/_invalid-bad-os"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-bad-os.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-bad-os 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'darwin'; then
          check "fixture: _invalid-bad-os -- correctly rejected (darwin in stderr)"
        else
          cross "fixture: _invalid-bad-os -- expected rejection with 'darwin' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-identity-without-opssh: cross-field rule (D-16); stderr must contain "one-password-ssh".
        neg_dir="${fix_dir}/_invalid-identity-without-opssh"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-identity-without-opssh.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-identity-without-opssh 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'one-password-ssh'; then
          check "fixture: _invalid-identity-without-opssh -- correctly rejected (one-password-ssh in stderr)"
        else
          cross "fixture: _invalid-identity-without-opssh -- expected rejection with 'one-password-ssh' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-identity-without-opsign: cross-field rule (D-16); stderr must contain "one-password-signing".
        neg_dir="${fix_dir}/_invalid-identity-without-opsign"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-identity-without-opsign.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-identity-without-opsign 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'one-password-signing'; then
          check "fixture: _invalid-identity-without-opsign -- correctly rejected (one-password-signing in stderr)"
        else
          cross "fixture: _invalid-identity-without-opsign -- expected rejection with 'one-password-signing' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-bad-identity: expanded enum (D-05); stderr must contain "server-1|server-2|none".
        neg_dir="${fix_dir}/_invalid-bad-identity"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-bad-identity.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-bad-identity 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'server-1|server-2|none'; then
          check "fixture: _invalid-bad-identity -- correctly rejected (expanded enum in stderr)"
        else
          cross "fixture: _invalid-bad-identity -- expected rejection with 'server-1|server-2|none' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # ---------------------------------------------------------------
        # Summary
        # ---------------------------------------------------------------
        # WR-05 fix: derive totals from actual fixture counts so adding a
        # 7th positive fixture does not require editing this constant.
        positive_count=0
        for fix in "${fix_dir}"/[0-9][0-9]-*; do
          positive_count=$(( positive_count + 1 ))
        done
        negative_count=5
        total=$(( positive_count + negative_count ))
        passed=$(( total - failures ))
        if (( failures == 0 )); then
          info "fixtures: ${total} total, ${passed} passed, ${failures} failed"
        else
          error "fixtures: ${total} total, ${passed} passed, ${failures} failed"
        fi
        exit "$failures"

# =============================================================================
# Tasks: MFST-09 Smoke
# =============================================================================

  test:add-machine:
    desc: "Smoke test: adding a new machine is one TOML + task setup (MFST-09)"
    # No status -- always re-run; this is a smoke test.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        state_file="{{.STATE_FILE}}"
        resolved_file="{{.RESOLVED_JSON_PATH}}"
        machines_dir="{{.MACHINES_DIR}}"
        throwaway="${machines_dir}/_addmachine-test.toml"

        # Save current state for restoration. CR-02 fix: distinguish
        # "no prior state existed" from "prior state was empty" so the
        # cleanup function can DELETE the state file on a fresh machine
        # instead of leaving _addmachine-test pointing at a manifest
        # that no longer exists.
        prior_machine_existed=0
        prior_machine=""
        if [[ -f "$state_file" ]]; then
          prior_machine_existed=1
          # WR-08 fix: trim only edges; embedded whitespace is preserved
          # so an invalid prior state is not silently rewritten into a
          # different (possibly valid) machine name on restore.
          prior_machine=$(head -n1 "$state_file" 2>/dev/null | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
        fi
        prior_resolved_existed=0
        prior_resolved=""
        if [[ -f "$resolved_file" ]]; then
          prior_resolved_existed=1
          prior_resolved=$(cat "$resolved_file" 2>/dev/null)
        fi

        # Unconditional cleanup: remove throwaway TOML and restore state.
        # Defined as a function so trap can reference it without complex quoting.
        do_cleanup() {
          rm -f "$throwaway"
          if (( prior_machine_existed )); then
            printf '%s' "$prior_machine" > "$state_file"
          else
            rm -f "$state_file"
          fi
          if (( prior_resolved_existed )); then
            printf '%s' "$prior_resolved" > "$resolved_file"
          else
            rm -f "$resolved_file"
          fi
        }
        trap do_cleanup EXIT

        # Write a minimal valid throwaway machine TOML (printf avoids heredoc indent issues).
        printf '%s\n' \
          'schema_version = 1' \
          '' \
          '[meta]' \
          'description = "addmachine-test fixture machine"' \
          '' \
          '[platform]' \
          'os = "darwin"' \
          '' \
          '[features]' \
          '' \
          '[packages.brew]' \
          'bundles = ["core"]' \
          '' \
          '[identity]' \
          'git = "none"' \
          'ssh = "none"' \
          > "$throwaway"

        # Run setup inline (write state + resolve) without recursive task invocation.
        info "Writing state file for _addmachine-test..."
        mkdir -p "{{.STATE_DIR}}"
        printf '%s' "_addmachine-test" > "$state_file"
        info "Running resolver for _addmachine-test..."
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh"

        # Assert the resolved.json has the expected description.
        got_desc=$(jq -re '.meta.description' "$resolved_file" 2>/dev/null || echo "")
        if [[ "$got_desc" == "addmachine-test fixture machine" ]]; then
          check "MFST-09: new machine appears in resolved.json"
        else
          cross "MFST-09: expected 'addmachine-test fixture machine' in .meta.description, got: '$got_desc'"
          exit 1
        fi

        success "manifest:test:add-machine passed -- new machine TOML + resolve works end-to-end"
        # trap EXIT calls do_cleanup to restore prior_machine and prior_resolved.
