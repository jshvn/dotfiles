version: '3'

# =============================================================================
# taskfiles/macos.yml -- macOS OS-defaults + shell-registration layer
#
# Purpose:      Reads features.macos-{dock,finder,input,screenshots,security,
#               appearance} from resolved.json; applies per-concern defaults via
#               os/defaults/<concern>.zsh sourced helpers; runs
#               os/shell-registration.zsh (always-on) to register Homebrew
#               zsh as the login shell.
# Depends on:   taskfiles/helpers.yml; install/messages.zsh;
#               os/defaults/<concern>.zsh; os/shell-registration.zsh;
#               :manifest:resolve (deps).
# Side effects: writes macOS user defaults via `defaults write`; relaunches
#               Dock / Finder / SystemUIServer / ControlCenter at the end of
#               apply-defaults so visual changes take effect immediately
#               (gated on dock/finder/appearance features); appends
#               $HOMEBREW_PREFIX/bin/zsh to /etc/shells (sudo); runs chsh.
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  HOME: '{{.HOME}}'

  XDG_CONFIG_HOME:
    sh: echo "${XDG_CONFIG_HOME:-$HOME/.config}"

  XDG_STATE_HOME:
    sh: echo "${XDG_STATE_HOME:-$HOME/.local/state}"

  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # Empty-features stub so `{{if index .MANIFEST.features "<key>"}}` evaluates
  # to false at template-parse time on a fresh machine instead of erroring.
  MANIFEST_JSON:
    sh: |
      if [[ -s '{{.RESOLVED_JSON_PATH}}' ]]; then
        cat '{{.RESOLVED_JSON_PATH}}'
      else
        echo "warning: {{.RESOLVED_JSON_PATH}} missing or empty -- run 'task setup -- <machine>' first" >&2
        echo '{"features":{}}'
      fi

  MANIFEST:
    ref: 'fromJson .MANIFEST_JSON'

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # HOMEBREW_PREFIX falls back to arch-detection so `task -t taskfiles/macos.yml
  # shell` works in isolation.
  HOMEBREW_PREFIX:
    sh: |
      if command -v brew >/dev/null 2>&1; then brew --prefix
      elif [[ "$(uname -m)" == "arm64" ]]; then echo "/opt/homebrew"
      else echo "/usr/local"
      fi

tasks:

  # lint-allow: cmds-without-status
  install:
    desc: "Apply macOS defaults + register Homebrew zsh as login shell"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - task: apply-defaults
      - task: install-shell

  # lint-allow: cmds-without-status
  apply-defaults:
    desc: "Apply macOS system defaults (per-concern, feature-gated)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    preconditions:
      - sh: test -s '{{.RESOLVED_JSON_PATH}}'
        msg: |
          resolved.json missing or empty; cannot resolve features.macos-*
            run: task setup -- <machine-name>
    cmds:
      - task: apply-defaults:dock
      - task: apply-defaults:finder
      - task: apply-defaults:input
      - task: apply-defaults:screenshots
      - task: apply-defaults:security
      - task: apply-defaults:appearance
      - task: apply-defaults:refresh-ui

  # Per-concern feature-gate pattern: each status: uses a single-shell-block
  # with template-time short-circuit. The `{{if not (index .MANIFEST.features
  # "macos-<concern>")}}exit 0{{end}}` renders to literal `exit 0` when off,
  # so verify_<concern> never runs. A multi-line status entry would AND the
  # gate output with verify_<concern>'s exit code, causing the verifier to
  # run on feature-off machines.
  apply-defaults:dock:
    desc: "Apply Dock defaults (gated on macos-dock)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-dock")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/dock.zsh"; apply_dock'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-dock")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/dock.zsh"; verify_dock > /dev/null 2>&1'

  apply-defaults:finder:
    desc: "Apply Finder defaults (gated on macos-finder)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-finder")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/finder.zsh"; apply_finder'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-finder")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/finder.zsh"; verify_finder > /dev/null 2>&1'

  apply-defaults:input:
    desc: "Apply Input defaults (gated on macos-input)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-input")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/input.zsh"; apply_input'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-input")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/input.zsh"; verify_input > /dev/null 2>&1'

  apply-defaults:screenshots:
    desc: "Apply Screenshots defaults (gated on macos-screenshots)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-screenshots")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/screenshots.zsh"; apply_screenshots'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-screenshots")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/screenshots.zsh"; verify_screenshots > /dev/null 2>&1'

  apply-defaults:security:
    desc: "Apply Security defaults (gated on macos-security)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-security")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/security.zsh"; apply_security'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-security")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/security.zsh"; verify_security > /dev/null 2>&1'

  apply-defaults:appearance:
    desc: "Apply Appearance defaults (gated on macos-appearance)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-appearance")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/appearance.zsh"; apply_appearance'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-appearance")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/appearance.zsh"; verify_appearance > /dev/null 2>&1'

  # lint-allow: cmds-without-status
  apply-defaults:refresh-ui:
    # Final step of apply-defaults: relaunch UI processes so the writes from
    # the per-concern tasks take effect immediately rather than at next login.
    # Gated on any *visual* macos-* feature being on -- machines that only opt
    # into non-visual concerns (security, input) get no UI churn. Dock and
    # Finder are also killed inside their own concerns; the duplicate kill
    # here covers the appearance-on/dock-off case (Dark mode still needs the
    # Dock to repaint). `|| true` keeps the step idempotent on headless boxes
    # where the target process does not exist.
    desc: "Relaunch UI processes (Dock, Finder, SystemUIServer, ControlCenter)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (or (index .MANIFEST.features "macos-dock") (index .MANIFEST.features "macos-finder") (index .MANIFEST.features "macos-appearance"))}}exit 0{{end}}
        killall Dock 2>/dev/null || true
        killall Finder 2>/dev/null || true
        killall SystemUIServer 2>/dev/null || true
        killall ControlCenter 2>/dev/null || true

  install-shell:
    desc: "Register Homebrew zsh as login shell (/etc/shells + chsh)"
    internal: true
    platforms: [darwin]
    # BREW_ZSH renders {{.HOMEBREW_PREFIX}}/bin/zsh at task-graph build time;
    # cmds heredoc exports BREW_ZSH so the shell-registration.zsh `:?`
    # assertion does not abort; status: uses {{.BREW_ZSH}} in BOTH entries
    # (LINT-02 contract: pure template vars, never $VAR).
    vars:
      BREW_ZSH: '{{.HOMEBREW_PREFIX}}/bin/zsh'
      # USER_NAME hoisted out of the status: block to close a LINT-02 blind
      # spot. The LINT-02 regex skips lines containing `{{`, so a $VAR shell-var
      # on a line that ALSO carries a {{.TEMPLATE_VAR}} reference slips through
      # unscanned. Hoisting via `sh: id -un` at task-graph build time gives the
      # status block a pure template var.
      USER_NAME:
        sh: id -un
    cmds:
      - |
        DOTFILEDIR={{.DOTFILEDIR}} BREW_ZSH={{.BREW_ZSH}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/shell-registration.zsh"; apply_shell_registration'
    status:
      - grep -qxF "{{.BREW_ZSH}}" /etc/shells
      - '[[ "$(dscl . -read "/Users/{{.USER_NAME}}" UserShell 2>/dev/null | awk ''{print $2}'')" = "{{.BREW_ZSH}}" ]]'

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate macOS defaults match in-script expected values"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    # Enumerate-all (no fast-fail) -- each verify ORs into failed; final
    # exit "$failed" returns 0 (clean) or 1 (any drift).
    status: [false]
    cmds:
      # All sourced scripts use zsh-specific syntax (typeset -ga; 1-indexed
      # arrays). Run the validate body in an explicit `zsh -c` so the
      # interpreter matches the scripts' contract. DOTFILEDIR and BREW_ZSH
      # forwarded via env; the inner script-single-quotes keep ${DOTFILEDIR},
      # ${BREW_ZSH}, $failed unexpanded by the outer mvdan/sh shell.
      - |
        DOTFILEDIR={{.DOTFILEDIR}} BREW_ZSH={{.HOMEBREW_PREFIX}}/bin/zsh zsh -c '
          set -euo pipefail
          # messages.zsh self-guards under set -u via the `:-` default
          # expansion on $DOTFILES_MESSAGES_LOADED.
          source "${DOTFILEDIR}/install/messages.zsh"

          failed=0

          source "${DOTFILEDIR}/os/shell-registration.zsh"
          verify_shell_registration || failed=1

          {{if index .MANIFEST.features "macos-dock"}}
          source "${DOTFILEDIR}/os/defaults/dock.zsh"
          verify_dock || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-finder"}}
          source "${DOTFILEDIR}/os/defaults/finder.zsh"
          verify_finder || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-input"}}
          source "${DOTFILEDIR}/os/defaults/input.zsh"
          verify_input || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-screenshots"}}
          source "${DOTFILEDIR}/os/defaults/screenshots.zsh"
          verify_screenshots || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-security"}}
          source "${DOTFILEDIR}/os/defaults/security.zsh"
          verify_security || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-appearance"}}
          source "${DOTFILEDIR}/os/defaults/appearance.zsh"
          verify_appearance || failed=1
          {{end}}

          exit "$failed"
        '
