version: '3'

# =============================================================================
# taskfiles/macos.yml -- Phase 6 macOS OS-defaults + shell-registration layer.
#
# Purpose:
#   Reads features.macos-{dock,finder,input,screenshots,security} from
#   resolved.json via `ref: fromJson` and applies per-concern defaults via
#   `os/defaults/<concern>.zsh` sourced helpers. Also runs
#   os/shell-registration.zsh (always-on) to add Homebrew zsh to /etc/shells
#   and chsh.
#
# Dependencies:
#   - :manifest:resolve (deps) -- ensures resolved.json is current before any
#     gate read.
#   - install/messages.zsh -- sourced via {{.DOTFILES_MESSAGES}} for check/cross.
#   - os/defaults/<concern>.zsh -- sourced by each macos:apply-defaults:<concern>.
#   - os/shell-registration.zsh -- sourced by macos:install-shell.
#
# Status-block convention (LINT-02 enforcement):
#   Every install / verify task's `status:` uses `{{.X}}` template vars ONLY --
#   never `$X` shell vars (the v1 macos:shell:145 bug class). Aggregator-style
#   tasks (install, apply-defaults, validate) intentionally omit `status:` and carry the
#   `# lint-allow: cmds-without-status` marker on the line immediately above
#   the task key (LINT-01/03a aggregator exemption).
#
# Per-concern feature-gate pattern (RESEARCH Pattern 2):
#   Each macos:apply-defaults:<concern> task uses a SINGLE-SHELL-BLOCK status: the
#   heredoc renders `{{if not (index .MANIFEST.features "macos-<concern>")}}exit 0{{end}}`
#   at template build time as the SECOND line of the block. When the feature
#   is off, the line renders to literal `exit 0` and the block short-circuits
#   (verify_<concern> never runs). When the feature is on, the line renders
#   to empty and the block proceeds to source the script and run the verifier.
#   This is NOT the broken two-line ANDed pattern -- multi-line status entries
#   would AND verify_<concern>'s exit code with the gate output, causing the
#   verifier to run on feature-off machines (RESEARCH Pitfall 1).
#
# Bug-class structural fix (v1 macos:shell:145):
#   The `shell:` task's status: block uses `{{.BREW_ZSH}}` (template var,
#   resolved at task-graph build time) in BOTH entries -- zero `$BREW_ZSH`
#   literal references. LINT-02 enforces no `$VAR` in status: at lint time;
#   per .planning/codebase/CONCERNS.md lines 15-19 this closes the v1
#   `$BREW_ZSH`-unset-in-status re-run-forever bug class structurally.
#
# When the root Taskfile.yml includes this module, its vars (DOTFILEDIR,
# XDG_STATE_HOME, DOTFILES_MESSAGES, HOMEBREW_PREFIX) take precedence over
# the local fallbacks defined below.
# =============================================================================

includes:
  _: ./helpers.yml

# =============================================================================
# Vars block -- self-contained so `task -t taskfiles/macos.yml ...` works
# without the root Taskfile.yml being loaded.
# =============================================================================

vars:
  HOME: '{{.HOME}}'

  XDG_CONFIG_HOME:
    sh: echo "${XDG_CONFIG_HOME:-$HOME/.config}"

  XDG_STATE_HOME:
    sh: echo "${XDG_STATE_HOME:-$HOME/.local/state}"

  # Resolve DOTFILEDIR from this taskfile's parent directory.
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # WR-03 fallback: emit a stderr warning when resolved.json is missing so
  # consumers of {{.MANIFEST.features.macos-*}} fail loudly rather than
  # evaluating against an empty {}. The stub includes an empty `features`
  # map so `{{if index .MANIFEST.features "<key>"}}` evaluates to false
  # instead of erroring out at template-parse time on a fresh machine.
  MANIFEST_JSON:
    sh: |
      if [[ -s '{{.RESOLVED_JSON_PATH}}' ]]; then
        cat '{{.RESOLVED_JSON_PATH}}'
      else
        echo "warning: {{.RESOLVED_JSON_PATH}} missing or empty -- run 'task setup -- <machine>' first" >&2
        echo '{"features":{}}'
      fi

  # fromJson ref pattern (matches taskfiles/manifest.yml + identity.yml +
  # packages.yml). Kebab-case feature keys access via:
  #   {{if index .MANIFEST.features "macos-dock"}}
  MANIFEST:
    ref: 'fromJson .MANIFEST_JSON'

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # HOMEBREW_PREFIX is forwarded from root Taskfile.yml's vars block when this
  # taskfile is loaded via includes:. The local sh: fallback mirrors the root
  # detection so `task -t taskfiles/macos.yml shell` works in isolation.
  HOMEBREW_PREFIX:
    sh: |
      if command -v brew >/dev/null 2>&1; then brew --prefix
      elif [[ "$(uname -m)" == "arm64" ]]; then echo "/opt/homebrew"
      else echo "/usr/local"
      fi

# =============================================================================
# Tasks
# =============================================================================

tasks:

  # ---------------------------------------------------------------------------
  # install -- macOS aggregator (D-09 <ns>:install pattern).
  # Replaces the two-call pattern in Taskfile.yml install: body
  # (macos:apply-defaults + macos:install-shell).
  # Internal per D-01 (per-component install is internal); platforms: [darwin]
  # matches the sub-tasks.
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  install:
    desc: "Apply macOS defaults + register Homebrew zsh as login shell"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - task: apply-defaults
      - task: install-shell

  # ---------------------------------------------------------------------------
  # apply-defaults -- aggregator (was: defaults; renamed per D-10 -- macOS uses
  # apply- for non-install actions). Calls each macos:apply-defaults:<concern>
  # in declared order (matches OSCF-01: dock -> finder -> input -> screenshots
  # -> security). No status: block; cmds: are all task: delegations --
  # LINT-01/03a auto-exempt. Carries the # lint-allow: cmds-without-status
  # marker per convention.
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  apply-defaults:
    desc: "Apply macOS system defaults (per-concern, feature-gated)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    preconditions:
      - sh: test -s '{{.RESOLVED_JSON_PATH}}'
        msg: |
          resolved.json missing or empty; cannot resolve features.macos-*
            run: task setup -- <machine-name>
    cmds:
      - task: apply-defaults:dock
      - task: apply-defaults:finder
      - task: apply-defaults:input
      - task: apply-defaults:screenshots
      - task: apply-defaults:security

  # ---------------------------------------------------------------------------
  # apply-defaults:<concern> -- five per-concern tasks, identical shape (was:
  # defaults:<concern>; renamed in lockstep with the apply-defaults parent per
  # B-9 / D-10 verb-first consistency).
  # RESEARCH Pattern 2: single-shell-block status with template-time short-circuit.
  # internal: true -- aggregator dispatches; not shown in `task --list`.
  # ---------------------------------------------------------------------------

  apply-defaults:dock:
    desc: "Apply Dock defaults (gated on macos-dock)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-dock")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/dock.zsh"; apply_dock'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-dock")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/dock.zsh"; verify_dock > /dev/null 2>&1'

  apply-defaults:finder:
    desc: "Apply Finder defaults (gated on macos-finder)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-finder")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/finder.zsh"; apply_finder'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-finder")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/finder.zsh"; verify_finder > /dev/null 2>&1'

  apply-defaults:input:
    desc: "Apply Input defaults (gated on macos-input)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-input")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/input.zsh"; apply_input'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-input")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/input.zsh"; verify_input > /dev/null 2>&1'

  apply-defaults:screenshots:
    desc: "Apply Screenshots defaults (gated on macos-screenshots)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-screenshots")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/screenshots.zsh"; apply_screenshots'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-screenshots")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/screenshots.zsh"; verify_screenshots > /dev/null 2>&1'

  apply-defaults:security:
    desc: "Apply Security defaults (gated on macos-security)"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    cmds:
      - |
        {{if not (index .MANIFEST.features "macos-security")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/defaults/security.zsh"; apply_security'
    status:
      - |
        {{if not (index .MANIFEST.features "macos-security")}}exit 0{{end}}
        DOTFILEDIR={{.DOTFILEDIR}} zsh -c 'source "${DOTFILEDIR}/os/defaults/security.zsh"; verify_security > /dev/null 2>&1'

  # ---------------------------------------------------------------------------
  # install-shell -- always-on (was: shell; renamed per D-10 -- shell
  # registration IS an install action). No feature gate. Adds Homebrew zsh to
  # /etc/shells and runs chsh. RESEARCH Pattern 5 -- the structural LINT-02 fix:
  #   vars.BREW_ZSH renders {{.HOMEBREW_PREFIX}}/bin/zsh at task-graph build time;
  #   cmds heredoc exports BREW_ZSH so the shell-registration.zsh :? assertion
  #     does not abort; status: uses {{.BREW_ZSH}} template var in BOTH entries.
  # The v1 macos:shell:145 bug class is closed structurally: LINT-02 enforces
  # no $VAR in status:, and this task is the canonical correct shape.
  # ---------------------------------------------------------------------------

  install-shell:
    desc: "Register Homebrew zsh as login shell (/etc/shells + chsh)"
    internal: true
    platforms: [darwin]
    vars:
      BREW_ZSH: '{{.HOMEBREW_PREFIX}}/bin/zsh'
      # USER_NAME hoisted out of the status: block to close a LINT-02 blind
      # spot. The LINT-02 regex skips lines containing `{{`, so a $VAR
      # shell-var on a line that ALSO carries a {{.TEMPLATE_VAR}} reference
      # slips through unscanned. Hoisting via `sh: id -un` at task-graph
      # build time gives the status block a pure template var, no shell
      # var, and the v1 macos:shell:145 bug-class regression vector is
      # closed in spirit as well as in letter.
      USER_NAME:
        sh: id -un
    cmds:
      - |
        DOTFILEDIR={{.DOTFILEDIR}} BREW_ZSH={{.BREW_ZSH}} zsh -c 'set -euo pipefail; source "${DOTFILEDIR}/os/shell-registration.zsh"; apply_shell_registration'
    status:
      # LINT-02 contract: every status condition uses {{.TEMPLATE_VAR}}
      # references only -- zero shell-var (dollar-prefixed) references to
      # BREW_ZSH or USER appear in this block. Structural fix for the v1
      # macos:shell:145 bug class (CONCERNS.md lines 15-19).
      - grep -qxF "{{.BREW_ZSH}}" /etc/shells
      - '[[ "$(dscl . -read "/Users/{{.USER_NAME}}" UserShell 2>/dev/null | awk ''{print $2}'')" = "{{.BREW_ZSH}}" ]]'

  # ---------------------------------------------------------------------------
  # validate -- always-rerun aggregator. Sources every enabled concern's script
  # and runs verify_<concern>; sources shell-registration.zsh always and runs
  # verify_shell_registration. Prints check/cross output via messages.zsh.
  # Enumerate-all (no fast-fail) per OSCF-05 + D-07 pattern: each verify
  # ORs into failed flag; final exit "$failed" returns 0 (clean) or 1 (any drift).
  # status: [false] satisfies LINT-03a always-rerun; marker is documentation.
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate macOS defaults match in-script expected values"
    internal: true
    platforms: [darwin]
    deps: [":manifest:resolve"]
    status: [false]
    cmds:
      # All sourced scripts use zsh-specific syntax (typeset -ga; 1-indexed
      # arrays). Run the validate body in an explicit `zsh -c` so the script
      # interpreter matches the scripts' contract. DOTFILEDIR and BREW_ZSH
      # forwarded via env; the inner script-single-quotes keep ${DOTFILEDIR},
      # ${BREW_ZSH}, $failed unexpanded by the outer mvdan/sh shell.
      - |
        DOTFILEDIR={{.DOTFILEDIR}} BREW_ZSH={{.HOMEBREW_PREFIX}}/bin/zsh zsh -c '
          set -euo pipefail
          # messages.zsh self-guards under set -u via the `:-` default
          # expansion on $DOTFILES_MESSAGES_LOADED; a bare source is
          # sufficient and idempotent.
          source "${DOTFILEDIR}/install/messages.zsh"

          failed=0

          # Always-on: shell registration.
          source "${DOTFILEDIR}/os/shell-registration.zsh"
          verify_shell_registration || failed=1

          # Per-concern, feature-gated -- enumerate-all (no fast-fail).
          # Enumeration order matches OSCF-01: dock -> finder -> input -> screenshots -> security.
          {{if index .MANIFEST.features "macos-dock"}}
          source "${DOTFILEDIR}/os/defaults/dock.zsh"
          verify_dock || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-finder"}}
          source "${DOTFILEDIR}/os/defaults/finder.zsh"
          verify_finder || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-input"}}
          source "${DOTFILEDIR}/os/defaults/input.zsh"
          verify_input || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-screenshots"}}
          source "${DOTFILEDIR}/os/defaults/screenshots.zsh"
          verify_screenshots || failed=1
          {{end}}
          {{if index .MANIFEST.features "macos-security"}}
          source "${DOTFILEDIR}/os/defaults/security.zsh"
          verify_security || failed=1
          {{end}}

          exit "$failed"
        '
