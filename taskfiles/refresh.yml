version: '3'

# =============================================================================
# taskfiles/refresh.yml -- Phase 12 public refresh namespace (D-03).
#
# Purpose: Public delegates for explicit manual-refresh operations across all namespaces.
# Callers: Invoked directly by operator; included by Taskfile.yml.
# Side effects: Read-only -- these tasks print state or detect drift; no mutations.
#   (NOTE: the underlying refresh implementations DO mutate state; the delegate
#   itself is the read-only thin pass-through -- it forwards args and propagates
#   exit codes without performing any work of its own.)
# Tasks:
#   - claude -- delegate to :claude:update (marketplaces + plugins + GSD refresh; D-03)
# =============================================================================

vars:
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

tasks:
  # lint-allow: cmds-without-status
  claude:
    desc: "Refresh marketplaces + plugins + GSD (explicit; not in task install)"
    status: [false]
    cmds:
      - task: :claude:update
