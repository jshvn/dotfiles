version: '3'

# =============================================================================
# taskfiles/refresh.yml -- public refresh namespace
#
# Purpose:      Public delegates for explicit manual-refresh operations.
# Depends on:   included by Taskfile.yml; delegates to :claude:update.
# Side effects: tasks here are thin pass-through delegates; the underlying
#               implementations may mutate state (e.g., claude:update
#               re-fetches plugins).
# =============================================================================

vars:
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

tasks:
  # lint-allow: cmds-without-status
  claude:
    desc: "Refresh marketplaces + plugins + GSD (explicit; not in task install)"
    status: [false]
    cmds:
      - task: :claude:update
