version: '3'

# =============================================================================
# taskfiles/test.yml -- Phase-7 smoke-test surface (TEST-01 + TEST-02)
#
# Exposes hook smoke tests for the four CLDE-02 named hooks via
# install/test-hooks.zsh. Included from the root Taskfile.yml as the
# `test:` namespace. The root `task test` aggregator combines this with
# `task test:manifest` (P1 deep-merge fixtures) to form the full Tier-3
# smoke-test suite (TEST-02).
#
# Phase 12 (Plan 07): hosts test:manifest + test:add-machine, moved here
# from taskfiles/manifest.yml per D-04 + Claude's-Discretion item 7.
#
# Callable as:
#   task test:hooks         # run hook smoke tests (CLDE-02 named hooks)
#   task test:default       # alias for test:hooks (local-to-this-file default)
#   task test:manifest      # deep-merge fixtures (positive + negative) - MFST-05
#   task test:add-machine   # MFST-09 smoke: new TOML + setup -> resolve
#   task test               # root aggregator: test:manifest + test:hooks (TEST-02)
#
# Scope: CLDE-02 named hooks only. block-destructive, notify, and
# post-compact are excluded (D-17).
# =============================================================================

# =============================================================================
# Vars -- self-contained fallbacks for standalone invocation:
#   task -t taskfiles/test.yml hooks
# When loaded via root Taskfile.yml, root vars take precedence.
#
# MACHINES_DIR / FIXTURES_DIR / STATE_FILE / RESOLVED_JSON_PATH /
# DEFAULTS_TOML / STATE_DIR mirror the analogous vars in
# taskfiles/manifest.yml (the test bodies were moved from there).
# =============================================================================

vars:
  HOME: '{{.HOME}}'
  XDG_STATE_HOME:
    sh: echo "${XDG_STATE_HOME:-$HOME/.local/state}"
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"
  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # --- State paths (mirror taskfiles/manifest.yml) ---
  STATE_DIR: '{{.XDG_STATE_HOME}}/dotfiles'
  STATE_FILE: '{{.STATE_DIR}}/machine'
  RESOLVED_JSON_PATH: '{{.XDG_STATE_HOME}}/dotfiles/resolved.json'

  # --- Manifest source paths (mirror taskfiles/manifest.yml) ---
  DEFAULTS_TOML: '{{.DOTFILEDIR}}/manifests/defaults.toml'
  MACHINES_DIR: '{{.DOTFILEDIR}}/manifests/machines'
  FIXTURES_DIR: '{{.DOTFILEDIR}}/manifests/test/fixtures'

# =============================================================================
# Tasks
# =============================================================================

tasks:

  # ---------------------------------------------------------------------------
  # default -- local aggregator so `task -t taskfiles/test.yml` runs hooks.
  # Root `task test` is the canonical entry point (TEST-02).
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  default:
    desc: "Run hook smoke tests (CLDE-02 named hooks)"
    internal: true
    cmds:
      - task: hooks

  # ---------------------------------------------------------------------------
  # hooks -- invoke the test runner. Always re-run; diagnostic by nature.
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  hooks:
    desc: "Run Claude hook smoke tests via install/test-hooks.zsh (TEST-01)"
    internal: true
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        info "running hook smoke tests"
        export DOTFILEDIR="{{.DOTFILEDIR}}"
        zsh "${DOTFILEDIR}/install/test-hooks.zsh"
    status:
      - false

  # ---------------------------------------------------------------------------
  # manifest -- deep-merge fixtures (positive + negative). Moved from
  # taskfiles/manifest.yml in Phase 12 (Claude's-Discretion item 7 + D-04).
  # ---------------------------------------------------------------------------

  manifest:
    desc: "Run deep-merge fixtures (positive + negative) — MFST-05"
    internal: true
    # No status -- always re-run; this is a test runner.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        failures=0
        fix_dir="{{.FIXTURES_DIR}}"

        # Cleanup tracker for negative-fixture copies in MACHINES_DIR.
        # CR-01 fix: any failure between cp and rm -f (yq crash, SIGINT,
        # validator coredump) would otherwise leak _invalid-* files into
        # manifests/machines/, polluting AVAILABLE_MACHINES and breaking
        # `task setup` autocomplete UX. go-task's mvdan/sh interpreter only
        # supports EXIT in trap (not INT/TERM by name); go-task forwards
        # received signals to its child shell, which then runs the EXIT
        # trap on its way out, so EXIT alone covers Ctrl-C correctly.
        neg_copies=()
        cleanup_neg() {
          local f
          for f in "${neg_copies[@]}"; do
            rm -f "$f"
          done
        }
        trap cleanup_neg EXIT

        # ---------------------------------------------------------------
        # Positive fixtures 01-06: run inline merge pipeline + diff
        # ---------------------------------------------------------------
        for fix in "${fix_dir}"/[0-9][0-9]-*; do
          fix_name=$(basename "$fix")

          # Pass 1: deep-merge defaults + machine via yq (RESEARCH §4.2, D-07).
          merged=$(yq eval-all '. as $i ireduce ({}; . * $i)' \
            "$fix/defaults.toml" "$fix/machine.toml" -o json 2>/dev/null) || {
            cross "fixture: ${fix_name} -- yq merge failed"
            failures=$(( failures + 1 ))
            continue
          }

          # Pass 2 (conditional): union extra_packages only when either side declares it.
          # Avoids incorrectly adding the key to fixtures that omit extra_packages.
          has_extras_def=false
          has_extras_mach=false
          if yq 'has("packages") and (.packages | has("brew")) and (.packages.brew | has("extra_packages"))' \
              "$fix/defaults.toml" 2>/dev/null | grep -q true; then
            has_extras_def=true
          fi
          if yq 'has("packages") and (.packages | has("brew")) and (.packages.brew | has("extra_packages"))' \
              "$fix/machine.toml" 2>/dev/null | grep -q true; then
            has_extras_mach=true
          fi

          if [[ "$has_extras_def" == "true" ]] || [[ "$has_extras_mach" == "true" ]]; then
            extras_def=$(yq -o=json '.packages.brew.extra_packages // []' "$fix/defaults.toml")
            extras_mach=$(yq -o=json '.packages.brew.extra_packages // []' "$fix/machine.toml")
            union_extras=$(printf '%s %s' "$extras_def" "$extras_mach" | jq -s 'add | unique')
            actual=$(printf '%s' "$merged" \
              | jq --argjson extras "$union_extras" '.packages.brew.extra_packages = $extras')
          else
            actual="$merged"
          fi

          # Diff actual vs expected (normalized via jq -S for key-sorted comparison).
          if diff <(printf '%s' "$actual" | jq -S .) <(jq -S . "$fix/expected.json") > /dev/null 2>&1; then
            check "fixture: ${fix_name} -- pass"
          else
            cross "fixture: ${fix_name} -- FAIL (diff: actual vs expected)"
            diff <(printf '%s' "$actual" | jq -S .) <(jq -S . "$fix/expected.json") || true
            failures=$(( failures + 1 ))
          fi
        done

        # ---------------------------------------------------------------
        # Negative fixtures: validate-only; assert non-zero exit + stderr
        # fragment.
        # ---------------------------------------------------------------
        # _invalid-missing-desc: validator must reject; stderr must contain
        # "meta.description".
        # CR-01 fix: register copy in neg_copies BEFORE cp so the EXIT trap
        # can clean it up even if cp itself fails or is interrupted. Drop
        # the silenced `2>/dev/null || true` -- let cp errors fail loudly
        # rather than silently running the test against stale or absent
        # files (which would mask real bugs as "test passed").
        neg_dir="${fix_dir}/_invalid-missing-desc"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-missing-desc.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-missing-desc 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'meta.description'; then
          check "fixture: _invalid-missing-desc -- correctly rejected (meta.description in stderr)"
        else
          cross "fixture: _invalid-missing-desc -- expected rejection with 'meta.description' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-bad-os: validator must reject; stderr must contain "darwin".
        # CR-01 fix: same pattern as _invalid-missing-desc above.
        neg_dir="${fix_dir}/_invalid-bad-os"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-bad-os.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-bad-os 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'darwin'; then
          check "fixture: _invalid-bad-os -- correctly rejected (darwin in stderr)"
        else
          cross "fixture: _invalid-bad-os -- expected rejection with 'darwin' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-identity-without-opssh: cross-field rule (D-16); stderr must contain "one-password-ssh".
        neg_dir="${fix_dir}/_invalid-identity-without-opssh"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-identity-without-opssh.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-identity-without-opssh 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'one-password-ssh'; then
          check "fixture: _invalid-identity-without-opssh -- correctly rejected (one-password-ssh in stderr)"
        else
          cross "fixture: _invalid-identity-without-opssh -- expected rejection with 'one-password-ssh' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-identity-without-opsign: cross-field rule (D-16); stderr must contain "one-password-signing".
        neg_dir="${fix_dir}/_invalid-identity-without-opsign"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-identity-without-opsign.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-identity-without-opsign 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'one-password-signing'; then
          check "fixture: _invalid-identity-without-opsign -- correctly rejected (one-password-signing in stderr)"
        else
          cross "fixture: _invalid-identity-without-opsign -- expected rejection with 'one-password-signing' in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # _invalid-bad-identity: identity values are filesystem-validated against
        # identity/{git,ssh}/identities/*. A bogus identity name (e.g. "alice")
        # must trigger a rejection naming the missing overlay file.
        neg_dir="${fix_dir}/_invalid-bad-identity"
        tmp_neg="{{.MACHINES_DIR}}/_invalid-bad-identity.toml"
        neg_copies+=("$tmp_neg")
        cp "$neg_dir/machine.toml" "$tmp_neg"
        neg_stderr=$(DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh" \
          --validate-only --machine _invalid-bad-identity 2>&1 >/dev/null || true)
        rm -f "$tmp_neg"
        if echo "$neg_stderr" | grep -q 'no overlay file at'; then
          check "fixture: _invalid-bad-identity -- correctly rejected (missing overlay file in stderr)"
        else
          cross "fixture: _invalid-bad-identity -- expected rejection naming a missing overlay file in stderr"
          echo "stderr was: $neg_stderr" >&2
          failures=$(( failures + 1 ))
        fi

        # ---------------------------------------------------------------
        # Summary
        # ---------------------------------------------------------------
        # WR-05 fix: derive totals from actual fixture counts so adding a
        # 7th positive fixture does not require editing this constant.
        positive_count=0
        for fix in "${fix_dir}"/[0-9][0-9]-*; do
          positive_count=$(( positive_count + 1 ))
        done
        negative_count=5
        total=$(( positive_count + negative_count ))
        passed=$(( total - failures ))
        if (( failures == 0 )); then
          info "fixtures: ${total} total, ${passed} passed, ${failures} failed"
        else
          error "fixtures: ${total} total, ${passed} passed, ${failures} failed"
        fi
        exit "$failures"

  # ---------------------------------------------------------------------------
  # add-machine -- MFST-09 smoke. Moved from taskfiles/manifest.yml in Phase 12
  # (Claude's-Discretion item 7 + D-04).
  # ---------------------------------------------------------------------------

  add-machine:
    desc: "Smoke test: adding a new machine is one TOML + task setup (MFST-09)"
    internal: true
    # No status -- always re-run; this is a smoke test.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        state_file="{{.STATE_FILE}}"
        resolved_file="{{.RESOLVED_JSON_PATH}}"
        machines_dir="{{.MACHINES_DIR}}"
        throwaway="${machines_dir}/_addmachine-test.toml"

        # Save current state for restoration. CR-02 fix: distinguish
        # "no prior state existed" from "prior state was empty" so the
        # cleanup function can DELETE the state file on a fresh machine
        # instead of leaving _addmachine-test pointing at a manifest
        # that no longer exists.
        prior_machine_existed=0
        prior_machine=""
        if [[ -f "$state_file" ]]; then
          prior_machine_existed=1
          # WR-08 fix: trim only edges; embedded whitespace is preserved
          # so an invalid prior state is not silently rewritten into a
          # different (possibly valid) machine name on restore.
          prior_machine=$(head -n1 "$state_file" 2>/dev/null | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
        fi
        prior_resolved_existed=0
        prior_resolved=""
        if [[ -f "$resolved_file" ]]; then
          prior_resolved_existed=1
          prior_resolved=$(cat "$resolved_file" 2>/dev/null)
        fi

        # Unconditional cleanup: remove throwaway TOML and restore state.
        # Defined as a function so trap can reference it without complex quoting.
        do_cleanup() {
          rm -f "$throwaway"
          if (( prior_machine_existed )); then
            printf '%s' "$prior_machine" > "$state_file"
          else
            rm -f "$state_file"
          fi
          if (( prior_resolved_existed )); then
            printf '%s' "$prior_resolved" > "$resolved_file"
          else
            rm -f "$resolved_file"
          fi
        }
        trap do_cleanup EXIT

        # Write a minimal valid throwaway machine TOML (printf avoids heredoc indent issues).
        printf '%s\n' \
          'schema_version = 1' \
          '' \
          '[meta]' \
          'description = "addmachine-test fixture machine"' \
          '' \
          '[platform]' \
          'os = "darwin"' \
          '' \
          '[features]' \
          '' \
          '[packages.brew]' \
          'bundles = ["core"]' \
          '' \
          '[identity]' \
          'git = "none"' \
          'ssh = "none"' \
          > "$throwaway"

        # Run setup inline (write state + resolve) without recursive task invocation.
        info "Writing state file for _addmachine-test..."
        mkdir -p "{{.STATE_DIR}}"
        printf '%s' "_addmachine-test" > "$state_file"
        info "Running resolver for _addmachine-test..."
        DOTFILEDIR="{{.DOTFILEDIR}}" XDG_STATE_HOME="{{.XDG_STATE_HOME}}" \
          zsh "{{.DOTFILEDIR}}/install/resolver.zsh"

        # Assert the resolved.json has the expected description.
        got_desc=$(jq -re '.meta.description' "$resolved_file" 2>/dev/null || echo "")
        if [[ "$got_desc" == "addmachine-test fixture machine" ]]; then
          check "MFST-09: new machine appears in resolved.json"
        else
          cross "MFST-09: expected 'addmachine-test fixture machine' in .meta.description, got: '$got_desc'"
          exit 1
        fi

        success "test:add-machine passed -- new machine TOML + resolve works end-to-end"
        # trap EXIT calls do_cleanup to restore prior_machine and prior_resolved.
