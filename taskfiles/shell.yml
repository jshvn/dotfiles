version: '3'

# =============================================================================
# taskfiles/shell.yml -- shell-layer measurement tasks for the v2 shell stack
#
# Purpose:
#   Hosts measurement / observability tasks that apply to the shell layer.
#   Currently a single-task file; future plans may extend.
#
# Tasks:
#   - shell -- SHEL-12 cold interactive startup gate via hyperfine
#     (invoked as `task perf:shell` from the root Taskfile.yml via the
#     `perf: ./taskfiles/shell.yml` include).
#
# Self-exemption (LINT-03a):
#   `shell` is a measurement task; always-re-run is correct -- the cold-start
#   number changes every invocation. The task is marked with
#   `# lint-allow: cmds-without-status` so LINT-03a skips it.
#
# Dependencies:
#   - hyperfine (Phase 5 core Brewfile). Existence check provides an actionable
#     error when hyperfine is absent (useful before Phase 5 brews land).
#   - jq (Phase 1 tool stack) -- parses hyperfine's JSON export.
#   - bc, awk -- macOS-native; convert seconds to integer milliseconds.
#
# When the root Taskfile.yml includes this module, its DOTFILEDIR and
# DOTFILES_MESSAGES vars take precedence over the local fallbacks.
# =============================================================================

includes:
  _: ./helpers.yml

# =============================================================================
# Vars block -- self-contained so direct invocation
#   task -t taskfiles/shell.yml shell
# works without the root Taskfile.yml being loaded.
# =============================================================================

vars:
  HOME: '{{.HOME}}'

  # Resolve DOTFILEDIR from this taskfile's parent directory.
  # dirname once: taskfiles/shell.yml -> taskfiles/ -> ../ -> repo root.
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

# =============================================================================
# Tasks
# =============================================================================

tasks:

  # ---------------------------------------------------------------------------
  # SHEL-12: cold interactive shell start gate (≤ 200ms target).
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  shell:
    desc: "Measure cold interactive zsh startup time (fails if > 200ms -- SHEL-12)"
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        if ! command -v hyperfine >/dev/null 2>&1; then
            error "hyperfine not installed (brew install hyperfine)"
            exit 1
        fi
        # Cold-start: each run is a fresh login interactive shell that exits
        # immediately. --warmup 1 discards the first run (filesystem cache
        # warm-up); --runs 5 averages five subsequent measurements.
        result=$(hyperfine --warmup 1 --runs 5 --export-json /dev/stdout \
            "zsh -lic exit" 2>/dev/null \
            | jq -r '.results[0].mean')
        ms=$(echo "$result * 1000" | bc | awk '{printf "%d\n", $0}')
        info "cold shell start: ${ms}ms (target: <= 200ms)"
        if (( ms > 200 )); then
            error "shell start exceeds 200ms target (SHEL-12)"
            exit 1
        fi
        check "shell start within budget"

  # ---------------------------------------------------------------------------
  # PORT-02: shell-layer validation (XDG dirs, ZDOTDIR dir, /etc/zshenv ZDOTDIR
  # line, DOTFILES_MACHINE state). Joins the root `task validate` aggregator.
  #
  # Implementation note (RESEARCH.md Landmine 4): does NOT use _:check-dir
  # because that helper always exits 0 (the `&&` / `||` chain ends on `cross`
  # which itself exits 0). Inlines the per-check `[[ -d ... ]]` test and
  # tallies a `failures` counter, then `exit "$failures"` so the root
  # aggregator's exit-code capture (Taskfile.yml:219) sees a real non-zero on
  # any failed assertion. Mirrors the pattern at taskfiles/links.yml:382.
  # ---------------------------------------------------------------------------

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate shell layer (XDG dirs, ZDOTDIR dir, /etc/zshenv ZDOTDIR line, DOTFILES_MACHINE state)"
    status: [false]
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        failures=0

        # Four XDG base directories.
        if [[ -d "{{.XDG_CONFIG_HOME}}" ]]; then
          check "XDG config home exists"
        else
          cross "XDG config home missing"
          failures=$(( failures + 1 ))
        fi

        if [[ -d "{{.XDG_DATA_HOME}}" ]]; then
          check "XDG data home exists"
        else
          cross "XDG data home missing"
          failures=$(( failures + 1 ))
        fi

        if [[ -d "{{.XDG_STATE_HOME}}" ]]; then
          check "XDG state home exists"
        else
          cross "XDG state home missing"
          failures=$(( failures + 1 ))
        fi

        if [[ -d "{{.XDG_CACHE_HOME}}" ]]; then
          check "XDG cache home exists"
        else
          cross "XDG cache home missing"
          failures=$(( failures + 1 ))
        fi

        # ZDOTDIR directory ($XDG_CONFIG_HOME/zsh).
        if [[ -d "{{.ZDOTDIR}}" ]]; then
          check "ZDOTDIR directory exists"
        else
          cross "ZDOTDIR directory missing"
          failures=$(( failures + 1 ))
        fi

        # /etc/zshenv ZDOTDIR line (the PORT-01 milestone driver).
        # Embed the template var directly in the literal grep pattern so the
        # status equivalent of this check never references a shell var
        # (LINT-02 hygiene; mirrors the zdotdir task in taskfiles/links.yml).
        ZDOTDIR_EXPORT='export ZDOTDIR="{{.ZDOTDIR}}"'
        if [[ -f /etc/zshenv ]] && grep -qF "$ZDOTDIR_EXPORT" /etc/zshenv; then
          check "ZDOTDIR configured in /etc/zshenv"
        else
          cross "ZDOTDIR not configured in /etc/zshenv"
          failures=$(( failures + 1 ))
        fi

        # DOTFILES_MACHINE state file (D-08 discretionary fresh-install check
        # per RESEARCH.md `### PORT-02 -- shell:validate`): operator forgetting
        # `task setup` would leave $DOTFILES_MACHINE unset in shell/.zshenv.
        if [[ -r "{{.XDG_STATE_HOME}}/dotfiles/machine" ]]; then
          check "DOTFILES_MACHINE state file present"
        else
          cross "DOTFILES_MACHINE state file missing -- run: task setup -- <machine-name>"
          failures=$(( failures + 1 ))
        fi

        exit "$failures"
