version: '3'

# =============================================================================
# taskfiles/helpers.yml -- shared reusable helper tasks
#
# Purpose:      Single source of truth for symlink creation + validation
#               helpers (_:safe-link, _:check-link).
# Depends on:   nothing.
# Side effects: _:safe-link creates symlinks (_:check-link is read-only).
# =============================================================================

tasks:

  safe-link:
    desc: "Create a symlink with automatic parent directory creation"
    internal: true
    requires:
      vars: [SOURCE, TARGET]
    cmds:
      - |
        if [[ -e "{{.TARGET}}" && ! -L "{{.TARGET}}" ]]; then
          echo "_:safe-link: target exists and is not a symlink: {{.TARGET}}" >&2
          exit 1
        fi
      - mkdir -p "$(dirname "{{.TARGET}}")"
      - ln -sfn "{{.SOURCE}}" "{{.TARGET}}"

  check-link:
    desc: "Validate a symlink exists and points to a valid target"
    internal: true
    requires:
      vars: [TARGET, NAME]
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        if [[ -L "{{.TARGET}}" ]]; then
          if [[ -e "{{.TARGET}}" ]]; then
            {{- if .SOURCE}}
            actual="$(readlink -f "{{.TARGET}}")"
            if [[ "$actual" == "{{.SOURCE}}" ]]; then
              check "{{.NAME}} linked"
            else
              cross "{{.NAME}} points to wrong source (expected {{.SOURCE}}, got $actual)"
            fi
            {{- else}}
            check "{{.NAME}} linked"
            {{- end}}
          else
            cross "{{.NAME}} broken (target missing)"
          fi
        else
          cross "{{.NAME}} missing"
        fi
