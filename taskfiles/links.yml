version: '3'

# =============================================================================
# taskfiles/links.yml -- symlink orchestration for shell + claude + tool configs
#
# Purpose:      All symlink creation owned by this taskfile (shell startup,
#               claude config tree, tool configs); identity-layer symlinks
#               live in taskfiles/identity.yml.
# Depends on:   taskfiles/helpers.yml (_:safe-link, _:check-link).
# Side effects: writes symlinks under $ZDOTDIR + $XDG_CONFIG_HOME; writes
#               $ZDOTDIR export to /etc/zshenv (sudo, idempotent).
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  HOME: '{{.HOME}}'

  XDG_CONFIG_HOME:
    sh: echo "${XDG_CONFIG_HOME:-$HOME/.config}"

  ZDOTDIR: '{{.XDG_CONFIG_HOME}}/zsh'

  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"

  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

  # EXPECTED_TARGETS -- single source of truth for every symlink target owned
  # by this taskfile. Identity-layer symlinks are intentionally EXCLUDED --
  # they live in taskfiles/identity.yml's equivalent and are validated by
  # identity:validate. Feature-gated entries use the inline-ternary form
  # which renders an empty line when the feature is off; consumers skip
  # empty lines via `[[ -z "$target" ]] && continue`.
  EXPECTED_TARGETS: |
    {{.ZDOTDIR}}/.zshenv
    {{.ZDOTDIR}}/.zprofile
    {{.ZDOTDIR}}/.zshrc
    {{.ZDOTDIR}}/.zlogin
    {{.ZDOTDIR}}/.zlogout
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/CLAUDE.md{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/settings.json{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/agents{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/commands{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/skills{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/post-compact.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/agent-transparency.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/secret-scan.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/block-destructive.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/no-ai-comments.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/no-emojis.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/notify.zsh{{end}}
    {{if index .MANIFEST.features "claude-marketplace"}}{{.XDG_CONFIG_HOME}}/claude/hooks/lib.zsh{{end}}
    {{if index .MANIFEST.features "ghostty"}}{{.XDG_CONFIG_HOME}}/ghostty/config{{end}}
    {{.XDG_CONFIG_HOME}}/glow/glow.yml
    {{.XDG_CONFIG_HOME}}/glow/glow_style.json
    {{.XDG_CONFIG_HOME}}/trippy/trippy.toml
    {{.XDG_CONFIG_HOME}}/tlrc/config.toml
    {{.XDG_CONFIG_HOME}}/conda/condarc
    {{.XDG_CONFIG_HOME}}/eza/theme.yaml

tasks:

  # lint-allow: cmds-without-status
  install:
    desc: "Create all symlinks (shell + identity + claude + configs)"
    internal: true
    cmds:
      - task: install-zsh
      # Leading-colon absolute form: a bare `task: identity:install` resolves
      # relative to the `links:` namespace and tries `links:identity:install`
      # (which does not exist).
      - task: :identity:install
      - task: install-claude
      - task: install-configs

  install-zsh:
    desc: "Link zsh configuration files and configure /etc/zshenv ZDOTDIR"
    internal: true
    cmds:
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/shell/.zshenv", TARGET: "{{.ZDOTDIR}}/.zshenv" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/shell/.zprofile", TARGET: "{{.ZDOTDIR}}/.zprofile" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/shell/.zshrc", TARGET: "{{.ZDOTDIR}}/.zshrc" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/shell/.zlogin", TARGET: "{{.ZDOTDIR}}/.zlogin" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/shell/.zlogout", TARGET: "{{.ZDOTDIR}}/.zlogout" }
      - task: zdotdir
    # Verify target via `readlink -f` against the manifest-expected source path,
    # not just `test -L` existence -- a corrupted symlink (wrong target) must
    # force a re-run of cmds: to repair the link.
    status:
      - test -L "{{.ZDOTDIR}}/.zshenv"   && [[ "$(readlink -f "{{.ZDOTDIR}}/.zshenv")"   == "{{.DOTFILEDIR}}/shell/.zshenv"   ]]
      - test -L "{{.ZDOTDIR}}/.zprofile" && [[ "$(readlink -f "{{.ZDOTDIR}}/.zprofile")" == "{{.DOTFILEDIR}}/shell/.zprofile" ]]
      - test -L "{{.ZDOTDIR}}/.zshrc"    && [[ "$(readlink -f "{{.ZDOTDIR}}/.zshrc")"    == "{{.DOTFILEDIR}}/shell/.zshrc"    ]]
      - test -L "{{.ZDOTDIR}}/.zlogin"   && [[ "$(readlink -f "{{.ZDOTDIR}}/.zlogin")"   == "{{.DOTFILEDIR}}/shell/.zlogin"   ]]
      - test -L "{{.ZDOTDIR}}/.zlogout"  && [[ "$(readlink -f "{{.ZDOTDIR}}/.zlogout")"  == "{{.DOTFILEDIR}}/shell/.zlogout"  ]]
      - grep -qF 'export ZDOTDIR="{{.ZDOTDIR}}"' /etc/zshenv 2>/dev/null

  zdotdir:
    desc: "Configure ZDOTDIR in /etc/zshenv (sudo write, idempotent)"
    internal: true
    # /etc/zshenv ZDOTDIR write. Status uses {{.ZDOTDIR}} (template var) not
    # $ZDOTDIR -- shell vars in status: re-run every invocation (LINT-02).
    # /etc/zshenv is world-readable so grep -qF runs without sudo on re-checks.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        ZDOTDIR_EXPORT='export ZDOTDIR="{{.ZDOTDIR}}"'
        if [[ ! -f /etc/zshenv ]]; then
          info "Creating /etc/zshenv with ZDOTDIR export..."
          echo "$ZDOTDIR_EXPORT" | sudo tee /etc/zshenv > /dev/null
          success "ZDOTDIR configured in /etc/zshenv"
        elif ! grep -qF "$ZDOTDIR_EXPORT" /etc/zshenv; then
          info "Adding ZDOTDIR export to /etc/zshenv..."
          echo "$ZDOTDIR_EXPORT" | sudo tee -a /etc/zshenv > /dev/null
          success "ZDOTDIR added to /etc/zshenv"
        else
          info "ZDOTDIR already configured in /etc/zshenv"
        fi
    status:
      - grep -qF 'export ZDOTDIR="{{.ZDOTDIR}}"' /etc/zshenv 2>/dev/null

  install-claude:
    desc: "Link claude config tree (files, dirs, hooks)"
    internal: true
    deps: [":manifest:resolve"]
    # Feature-gated on claude-marketplace. The status: block mirrors the gate
    # so status checks also no-op when the flag is off.
    cmds:
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/CLAUDE.md", TARGET: "{{.XDG_CONFIG_HOME}}/claude/CLAUDE.md" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/settings.json", TARGET: "{{.XDG_CONFIG_HOME}}/claude/settings.json" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/agents", TARGET: "{{.XDG_CONFIG_HOME}}/claude/agents" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/commands", TARGET: "{{.XDG_CONFIG_HOME}}/claude/commands" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/skills", TARGET: "{{.XDG_CONFIG_HOME}}/claude/skills" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/post-compact.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/post-compact.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/agent-transparency.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/agent-transparency.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/secret-scan.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/secret-scan.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/block-destructive.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/block-destructive.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/no-ai-comments.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/no-ai-comments.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/no-emojis.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/no-emojis.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/notify.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/notify.zsh" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/claude/hooks/lib.zsh", TARGET: "{{.XDG_CONFIG_HOME}}/claude/hooks/lib.zsh" }
    status:
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/CLAUDE.md" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/CLAUDE.md")" == "{{.DOTFILEDIR}}/claude/CLAUDE.md" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/settings.json" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/settings.json")" == "{{.DOTFILEDIR}}/claude/settings.json" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/agents" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/agents")" == "{{.DOTFILEDIR}}/claude/agents" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/commands" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/commands")" == "{{.DOTFILEDIR}}/claude/commands" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/skills" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/skills")" == "{{.DOTFILEDIR}}/claude/skills" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/post-compact.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/post-compact.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/post-compact.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/agent-transparency.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/agent-transparency.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/agent-transparency.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/secret-scan.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/secret-scan.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/secret-scan.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/block-destructive.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/block-destructive.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/block-destructive.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/no-ai-comments.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/no-ai-comments.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/no-ai-comments.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/no-emojis.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/no-emojis.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/no-emojis.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/notify.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/notify.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/notify.zsh" ]]{{end}}'
      - '{{if not (index .MANIFEST.features "claude-marketplace")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/claude/hooks/lib.zsh" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/claude/hooks/lib.zsh")" == "{{.DOTFILEDIR}}/claude/hooks/lib.zsh" ]]{{end}}'

  install-configs:
    desc: "Link tool config files (ghostty, glow, trippy, tlrc, conda, eza)"
    internal: true
    deps: [":manifest:resolve"]
    # ghostty is feature-gated; the other 6 are always-on. motd is intentionally
    # absent (runtime read from DOTFILEDIR, no symlink needed).
    cmds:
      - task: configs:ghostty
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/glow/glow.yml", TARGET: "{{.XDG_CONFIG_HOME}}/glow/glow.yml" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/glow/glow_style.json", TARGET: "{{.XDG_CONFIG_HOME}}/glow/glow_style.json" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/trippy/trippy.toml", TARGET: "{{.XDG_CONFIG_HOME}}/trippy/trippy.toml" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/tlrc/config.toml", TARGET: "{{.XDG_CONFIG_HOME}}/tlrc/config.toml" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/conda/condarc", TARGET: "{{.XDG_CONFIG_HOME}}/conda/condarc" }
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/eza/theme.yaml", TARGET: "{{.XDG_CONFIG_HOME}}/eza/theme.yaml" }
    status:
      # ghostty MUST appear in this status block. Without it, on a ghostty=true
      # machine where the ghostty link is broken but the always-on configs are
      # healthy, status returns 0 and go-task skips the entire cmds block --
      # including `task: configs:ghostty`.
      - '{{if not (index .MANIFEST.features "ghostty")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/ghostty/config" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/ghostty/config")" == "{{.DOTFILEDIR}}/configs/ghostty/config" ]]{{end}}'
      - test -L "{{.XDG_CONFIG_HOME}}/glow/glow.yml"        && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/glow/glow.yml")"        == "{{.DOTFILEDIR}}/configs/glow/glow.yml"        ]]
      - test -L "{{.XDG_CONFIG_HOME}}/glow/glow_style.json" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/glow/glow_style.json")" == "{{.DOTFILEDIR}}/configs/glow/glow_style.json" ]]
      - test -L "{{.XDG_CONFIG_HOME}}/trippy/trippy.toml"   && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/trippy/trippy.toml")"   == "{{.DOTFILEDIR}}/configs/trippy/trippy.toml"   ]]
      - test -L "{{.XDG_CONFIG_HOME}}/tlrc/config.toml"     && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/tlrc/config.toml")"     == "{{.DOTFILEDIR}}/configs/tlrc/config.toml"     ]]
      - test -L "{{.XDG_CONFIG_HOME}}/conda/condarc"        && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/conda/condarc")"        == "{{.DOTFILEDIR}}/configs/conda/condarc"        ]]
      - test -L "{{.XDG_CONFIG_HOME}}/eza/theme.yaml"       && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/eza/theme.yaml")"       == "{{.DOTFILEDIR}}/configs/eza/theme.yaml"       ]]

  configs:ghostty:
    desc: "Link ghostty config (gated on ghostty feature)"
    internal: true
    deps: [":manifest:resolve"]
    # Isolated as its own sub-task so the inline-ternary status: gate works
    # independently of the always-on tool configs. Avoids the regression
    # where a missing always-on link forces cmds: to run unconditionally
    # including the gated ghostty link.
    cmds:
      - task: _:safe-link
        vars: { SOURCE: "{{.DOTFILEDIR}}/configs/ghostty/config", TARGET: "{{.XDG_CONFIG_HOME}}/ghostty/config" }
    status:
      - '{{if not (index .MANIFEST.features "ghostty")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/ghostty/config" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/ghostty/config")" == "{{.DOTFILEDIR}}/configs/ghostty/config" ]]{{end}}'

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate all symlinks (strict-mode SOURCE check)"
    internal: true
    deps: [":manifest:resolve"]
    status: [false]
    cmds:
      # Iterates EXPECTED_TARGETS line-by-line and verifies each symlink with
      # the same three-condition logic as helpers.yml _:check-link BUT
      # increments an explicit failures counter on each failing path, ending
      # with `exit "$failures"`. This closes the _:check-link-always-exits-0
      # gap so root `task validate` can bubble links:validate failures via
      # exit code. Feature-off entries in EXPECTED_TARGETS render as empty
      # lines and are skipped via `[[ -z "$target" ]] && continue`.
      - |
        {{.DOTFILES_MESSAGES}}
        failures=0

        # Resolve the expected SOURCE for a given TARGET. Mirrors the literal
        # pairings used by install-zsh / install-claude / install-configs
        # when materializing the links -- editing one mapping requires editing
        # this case statement AND the corresponding cmds: entry.
        resolve_source() {
          local target="$1"
          local zdotdir="{{.ZDOTDIR}}"
          local xdg="{{.XDG_CONFIG_HOME}}"
          local dotfiledir="{{.DOTFILEDIR}}"
          case "$target" in
            "$zdotdir/.zshenv")            printf '%s\n' "$dotfiledir/shell/.zshenv" ;;
            "$zdotdir/.zprofile")          printf '%s\n' "$dotfiledir/shell/.zprofile" ;;
            "$zdotdir/.zshrc")             printf '%s\n' "$dotfiledir/shell/.zshrc" ;;
            "$zdotdir/.zlogin")            printf '%s\n' "$dotfiledir/shell/.zlogin" ;;
            "$zdotdir/.zlogout")           printf '%s\n' "$dotfiledir/shell/.zlogout" ;;
            "$xdg/claude/CLAUDE.md")       printf '%s\n' "$dotfiledir/claude/CLAUDE.md" ;;
            "$xdg/claude/settings.json")   printf '%s\n' "$dotfiledir/claude/settings.json" ;;
            "$xdg/claude/agents")          printf '%s\n' "$dotfiledir/claude/agents" ;;
            "$xdg/claude/commands")        printf '%s\n' "$dotfiledir/claude/commands" ;;
            "$xdg/claude/skills")          printf '%s\n' "$dotfiledir/claude/skills" ;;
            "$xdg/claude/hooks/"*)         printf '%s\n' "$dotfiledir/claude/hooks/${target##*/hooks/}" ;;
            "$xdg/ghostty/config")         printf '%s\n' "$dotfiledir/configs/ghostty/config" ;;
            "$xdg/glow/"*)                 printf '%s\n' "$dotfiledir/configs/glow/${target##*/glow/}" ;;
            "$xdg/trippy/"*)               printf '%s\n' "$dotfiledir/configs/trippy/${target##*/trippy/}" ;;
            "$xdg/tlrc/"*)                 printf '%s\n' "$dotfiledir/configs/tlrc/${target##*/tlrc/}" ;;
            "$xdg/conda/"*)                printf '%s\n' "$dotfiledir/configs/conda/${target##*/conda/}" ;;
            "$xdg/eza/"*)                  printf '%s\n' "$dotfiledir/configs/eza/${target##*/eza/}" ;;
            *)                             printf '%s\n' "" ;;
          esac
        }

        while IFS= read -r target; do
          [[ -z "$target" ]] && continue

          if [[ ! -L "$target" ]]; then
            cross "$target missing"
            failures=$(( failures + 1 ))
            continue
          fi

          if [[ ! -e "$target" ]]; then
            cross "$target broken (target missing)"
            failures=$(( failures + 1 ))
            continue
          fi

          expected="$(resolve_source "$target")"
          if [[ -z "$expected" ]]; then
            cross "$target has no known expected source (links:validate bug)"
            failures=$(( failures + 1 ))
            continue
          fi

          actual="$(readlink -f "$target" 2>/dev/null || true)"
          if [[ "$actual" != "$expected" ]]; then
            cross "$target points to wrong source (expected $expected, got $actual)"
            failures=$(( failures + 1 ))
          else
            check "$target linked"
          fi
        done <<< "{{.EXPECTED_TARGETS}}"

        exit "$failures"

  # lint-allow: cmds-without-status
  reconcile:
    desc: "Detect orphan symlinks (default: exit non-zero); -- --remove for interactive cleanup"
    internal: true
    deps: [":manifest:resolve"]
    status: [false]
    # Three invocation modes via CLI_ARGS:
    #   default     -- detect-only; exit non-zero on orphan; CI-safe gate.
    #   --remove    -- interactive cleanup; TTY-gated; y/N per orphan;
    #                  uses `unlink` only (never `rm`).
    #   --warn-only -- non-fatal; emits orphans via warn(); always exits 0.
    # Public path: audit:links (taskfiles/audit.yml delegate).
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}

        # Mode dispatch via CLI_ARGS. If both --remove and --warn-only appear,
        # warn-only wins by parse order (documented; pick one flag).
        mode="detect"
        cli="{{.CLI_ARGS}}"
        case " $cli " in
          *" --remove "*)      mode="remove" ;;
        esac
        case " $cli " in
          *" --warn-only "*)   mode="warn" ;;
        esac

        # --remove TTY-gate MUST appear BEFORE any orphan enumeration so
        # non-TTY callers fail fast.
        if [[ "$mode" == "remove" ]]; then
          if [[ ! -t 0 ]]; then
            error "links:reconcile --remove requires an interactive TTY; stdin is not a tty"
            exit 1
          fi
        fi

        dotfiledir="{{.DOTFILEDIR}}"

        expected=()
        while IFS= read -r line; do
          [[ -n "$line" ]] && expected+=("$line")
        done <<< "{{.EXPECTED_TARGETS}}"

        # Derive deduplicated parent_dirs from expected. CRITICAL: word-split-safe
        # assignment via `while IFS= read -r` -- NOT the `array=($(...))` form,
        # which is vulnerable to word-splitting on path components containing
        # spaces and is not shellcheck-clean.
        raw_parents=()
        for t in "${expected[@]}"; do
          raw_parents+=("$(dirname "$t")")
        done
        parent_dirs=()
        while IFS= read -r dir; do
          [[ -n "$dir" ]] && parent_dirs+=("$dir")
        done < <(printf '%s\n' "${raw_parents[@]}" | sort -u)

        # Bounded scan (-maxdepth 2). A symlink is an orphan iff its readlink -f
        # target is under $dotfiledir AND the link path itself is not in
        # EXPECTED_TARGETS.
        #
        # `(( expr ))` evaluates to exit-1 when expr is zero -- under errexit
        # that aborts the script. Use `if ... ; then ... ; fi` instead of
        # `(( ... )) && cmd` or bare `(( ... ))`.
        orphans=()
        for dir in "${parent_dirs[@]}"; do
          [[ -d "$dir" ]] || continue
          while IFS= read -r lnk; do
            [[ -z "$lnk" ]] && continue
            target="$(readlink -f "$lnk" 2>/dev/null || true)"
            [[ "$target" == "$dotfiledir"* ]] || continue
            found=0
            for e in "${expected[@]}"; do
              if [[ "$lnk" == "$e" ]]; then
                found=1
                break
              fi
            done
            if [[ "$found" == "0" ]]; then
              orphans+=("$lnk")
            fi
          done < <(find "$dir" -maxdepth 2 -type l 2>/dev/null)
        done

        orphan_count=${#orphans[@]}

        case "$mode" in
          detect)
            if [[ "$orphan_count" -eq 0 ]]; then
              info "no orphan symlinks detected"
              exit 0
            fi
            for orphan in "${orphans[@]}"; do
              warn "orphan: $orphan -> $(readlink "$orphan" 2>/dev/null || echo unreadable)"
            done
            exit 1
            ;;
          warn)
            if [[ "$orphan_count" -eq 0 ]]; then
              info "no orphan symlinks detected"
              exit 0
            fi
            for orphan in "${orphans[@]}"; do
              warn "orphan: $orphan -> $(readlink "$orphan" 2>/dev/null || echo unreadable)"
            done
            # --warn-only ALWAYS exits 0 regardless of orphan count.
            exit 0
            ;;
          remove)
            if [[ "$orphan_count" -eq 0 ]]; then
              info "no orphan symlinks detected"
              exit 0
            fi
            for orphan in "${orphans[@]}"; do
              tgt="$(readlink "$orphan" 2>/dev/null || echo unreadable)"
              info "orphan: $orphan -> $tgt"
              printf 'Remove? [y/N]: '
              read -r REPLY
              if [[ "$REPLY" == "y" || "$REPLY" == "yes" ]]; then
                # Security: `unlink` removes ONLY the named symlink path.
                # Never use `rm` here -- a misdirected rm could delete a
                # directory if a real path slipped through orphan detection.
                if unlink "$orphan"; then
                  success "removed: $orphan"
                else
                  error "failed to unlink: $orphan"
                fi
              else
                info "skipped: $orphan"
              fi
            done
            exit 0
            ;;
          *)
            # Defensive catch-all. The three valid modes (detect, warn, remove)
            # are the only values $mode can take given the initialization +
            # the two case mutators above; this branch surfaces a future
            # flag-parsing bug as a hard error instead of a silent no-op.
            error "links:reconcile: internal bug -- unknown mode '$mode'"
            exit 1
            ;;
        esac
