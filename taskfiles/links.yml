version: '3'

# =============================================================================
# taskfiles/links.yml -- symlink orchestration for shell + claude + tool configs
#
# Purpose:      All symlink creation owned by this taskfile (shell startup,
#               claude config tree, tool configs); identity-layer symlinks
#               live in taskfiles/identity.yml.
# Depends on:   taskfiles/helpers.yml (_:safe-link, _:check-link).
# Side effects: writes symlinks under $ZDOTDIR + $XDG_CONFIG_HOME; writes
#               $ZDOTDIR export to /etc/zshenv (sudo, idempotent).
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  # CLAUDE_LINKS -- relative paths under claude/ that each link 1:1 into
  # $XDG_CONFIG_HOME/claude/ (identical relpath on both sides). Single source
  # for install-claude (cmds + status) AND the claude block of EXPECTED_TARGETS
  # below, so adding a claude file/hook is a one-line change here. `|-` strips
  # the trailing newline so install-claude's `for:`-loop split yields no empty
  # element. MUST precede EXPECTED_TARGETS (go-task evaluates vars top-to-bottom).
  CLAUDE_LINKS: |-
    CLAUDE.md
    settings.json
    agents
    commands
    skills
    hooks/post-compact.zsh
    hooks/agent-transparency.zsh
    hooks/secret-scan.zsh
    hooks/block-destructive.zsh
    hooks/no-ai-comments.zsh
    hooks/no-emojis.zsh
    hooks/notify.zsh
    hooks/auto-approve-reads.zsh
    hooks/lib.zsh

  # EXPECTED_TARGETS -- single source of truth for every symlink target owned
  # by this taskfile. Identity-layer symlinks are intentionally EXCLUDED --
  # they live in taskfiles/identity.yml's equivalent and are validated by
  # identity:validate. Feature-gated entries use the inline-ternary form
  # which renders an empty line when the feature is off; consumers skip
  # empty lines via `[[ -z "$target" ]] && continue`. The claude block is
  # derived from CLAUDE_LINKS (gated on claude-marketplace).
  EXPECTED_TARGETS: |
    {{.ZDOTDIR}}/.zshenv
    {{.ZDOTDIR}}/.zprofile
    {{.ZDOTDIR}}/.zshrc
    {{.ZDOTDIR}}/.zlogin
    {{.ZDOTDIR}}/.zlogout
    {{if index .MANIFEST.features "claude-marketplace"}}{{range (splitList "\n" .CLAUDE_LINKS)}}{{$.XDG_CONFIG_HOME}}/claude/{{.}}
    {{end}}{{end}}
    {{if index .MANIFEST.features "ghostty"}}{{.XDG_CONFIG_HOME}}/ghostty/config{{end}}
    {{.XDG_CONFIG_HOME}}/tlrc/config.toml
    {{.XDG_CONFIG_HOME}}/conda/condarc
    {{.XDG_CONFIG_HOME}}/eza/theme.yaml

tasks:

  # lint-allow: cmds-without-status
  install:
    desc: "Create all symlinks (shell + identity + claude + configs)"
    internal: true
    cmds:
      - task: install-zsh
      # Leading-colon absolute form: a bare `task: identity:install` resolves
      # relative to the `links:` namespace and tries `links:identity:install`
      # (which does not exist).
      - task: :identity:install
      - task: install-claude
      - task: install-configs

  install-zsh:
    desc: "Link zsh configuration files and configure /etc/zshenv ZDOTDIR"
    internal: true
    cmds:
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/shell/.zshenv", TARGET: "{{.ZDOTDIR}}/.zshenv" }
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/shell/.zprofile", TARGET: "{{.ZDOTDIR}}/.zprofile" }
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/shell/.zshrc", TARGET: "{{.ZDOTDIR}}/.zshrc" }
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/shell/.zlogin", TARGET: "{{.ZDOTDIR}}/.zlogin" }
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/shell/.zlogout", TARGET: "{{.ZDOTDIR}}/.zlogout" }
      - task: zdotdir
    # Verify target via `readlink -f` against the manifest-expected source path,
    # not just `test -L` existence -- a corrupted symlink (wrong target) must
    # force a re-run of cmds: to repair the link.
    status:
      - test -L "{{.ZDOTDIR}}/.zshenv"   && [[ "$(readlink -f "{{.ZDOTDIR}}/.zshenv")"   == "{{.ROOT_DIR}}/shell/.zshenv"   ]]
      - test -L "{{.ZDOTDIR}}/.zprofile" && [[ "$(readlink -f "{{.ZDOTDIR}}/.zprofile")" == "{{.ROOT_DIR}}/shell/.zprofile" ]]
      - test -L "{{.ZDOTDIR}}/.zshrc"    && [[ "$(readlink -f "{{.ZDOTDIR}}/.zshrc")"    == "{{.ROOT_DIR}}/shell/.zshrc"    ]]
      - test -L "{{.ZDOTDIR}}/.zlogin"   && [[ "$(readlink -f "{{.ZDOTDIR}}/.zlogin")"   == "{{.ROOT_DIR}}/shell/.zlogin"   ]]
      - test -L "{{.ZDOTDIR}}/.zlogout"  && [[ "$(readlink -f "{{.ZDOTDIR}}/.zlogout")"  == "{{.ROOT_DIR}}/shell/.zlogout"  ]]
      - grep -qF 'export ZDOTDIR="{{.ZDOTDIR}}"' /etc/zshenv 2>/dev/null

  zdotdir:
    desc: "Configure ZDOTDIR in /etc/zshenv (sudo write, idempotent)"
    internal: true
    # /etc/zshenv ZDOTDIR write. Status uses {{.ZDOTDIR}} (template var) not
    # $ZDOTDIR -- shell vars in status: re-run every invocation (LINT-02).
    # /etc/zshenv is world-readable so grep -qF runs without sudo on re-checks.
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}
        ZDOTDIR_EXPORT='export ZDOTDIR="{{.ZDOTDIR}}"'
        if [[ ! -f /etc/zshenv ]]; then
          info "Creating /etc/zshenv with ZDOTDIR export..."
          echo "$ZDOTDIR_EXPORT" | sudo tee /etc/zshenv > /dev/null
          success "ZDOTDIR configured in /etc/zshenv"
        elif ! grep -qF "$ZDOTDIR_EXPORT" /etc/zshenv; then
          info "Adding ZDOTDIR export to /etc/zshenv..."
          echo "$ZDOTDIR_EXPORT" | sudo tee -a /etc/zshenv > /dev/null
          success "ZDOTDIR added to /etc/zshenv"
        else
          info "ZDOTDIR already configured in /etc/zshenv"
        fi
    status:
      - grep -qF 'export ZDOTDIR="{{.ZDOTDIR}}"' /etc/zshenv 2>/dev/null

  install-claude:
    desc: "Link claude config tree (files, dirs, hooks)"
    internal: true
    deps: [":manifest:resolve"]
    # Feature-gated on claude-marketplace. The status: block mirrors the gate
    # so status checks (and therefore cmds) no-op when the flag is off. Both
    # cmds and status are driven by CLAUDE_LINKS (one line per claude file/hook).
    cmds:
      - for: { var: CLAUDE_LINKS, split: "\n" }
        task: _:safe-link
        vars:
          SOURCE: '{{.ROOT_DIR}}/claude/{{.ITEM}}'
          TARGET: '{{.XDG_CONFIG_HOME}}/claude/{{.ITEM}}'
    status:
      - |
        {{if not (index .MANIFEST.features "claude-marketplace")}}exit 0{{end}}
        while IFS= read -r rel; do
          [[ -z "$rel" ]] && continue
          tgt="{{.XDG_CONFIG_HOME}}/claude/$rel"
          src="{{.ROOT_DIR}}/claude/$rel"
          test -L "$tgt" && [[ "$(readlink -f "$tgt")" == "$src" ]] || exit 1
        done <<< "{{.CLAUDE_LINKS}}"

  install-configs:
    desc: "Link tool config files (ghostty, tlrc, conda, eza)"
    internal: true
    deps: [":manifest:resolve"]
    # ghostty is feature-gated; the other 4 are always-on. motd is intentionally
    # absent (runtime read from DOTFILEDIR, no symlink needed).
    cmds:
      - task: configs:ghostty
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/configs/tlrc/config.toml", TARGET: "{{.XDG_CONFIG_HOME}}/tlrc/config.toml" }
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/configs/conda/condarc", TARGET: "{{.XDG_CONFIG_HOME}}/conda/condarc" }
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/configs/eza/theme.yaml", TARGET: "{{.XDG_CONFIG_HOME}}/eza/theme.yaml" }
    status:
      # ghostty MUST appear in this status block. Without it, on a ghostty=true
      # machine where the ghostty link is broken but the always-on configs are
      # healthy, status returns 0 and go-task skips the entire cmds block --
      # including `task: configs:ghostty`.
      - '{{if not (index .MANIFEST.features "ghostty")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/ghostty/config" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/ghostty/config")" == "{{.ROOT_DIR}}/configs/ghostty/config" ]]{{end}}'
      - test -L "{{.XDG_CONFIG_HOME}}/tlrc/config.toml"     && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/tlrc/config.toml")"     == "{{.ROOT_DIR}}/configs/tlrc/config.toml"     ]]
      - test -L "{{.XDG_CONFIG_HOME}}/conda/condarc"        && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/conda/condarc")"        == "{{.ROOT_DIR}}/configs/conda/condarc"        ]]
      - test -L "{{.XDG_CONFIG_HOME}}/eza/theme.yaml"       && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/eza/theme.yaml")"       == "{{.ROOT_DIR}}/configs/eza/theme.yaml"       ]]

  configs:ghostty:
    desc: "Link ghostty config (gated on ghostty feature)"
    internal: true
    deps: [":manifest:resolve"]
    # Isolated as its own sub-task so the inline-ternary status: gate works
    # independently of the always-on tool configs. Avoids the regression
    # where a missing always-on link forces cmds: to run unconditionally
    # including the gated ghostty link.
    cmds:
      - task: _:safe-link
        vars: { SOURCE: "{{.ROOT_DIR}}/configs/ghostty/config", TARGET: "{{.XDG_CONFIG_HOME}}/ghostty/config" }
    status:
      - '{{if not (index .MANIFEST.features "ghostty")}}true{{else}}test -L "{{.XDG_CONFIG_HOME}}/ghostty/config" && [[ "$(readlink -f "{{.XDG_CONFIG_HOME}}/ghostty/config")" == "{{.ROOT_DIR}}/configs/ghostty/config" ]]{{end}}'

  # lint-allow: cmds-without-status
  validate:
    desc: "Validate all symlinks (strict-mode SOURCE check)"
    internal: true
    deps: [":manifest:resolve"]
    status: [false]
    cmds:
      # Iterates EXPECTED_TARGETS line-by-line and verifies each symlink with
      # the same three-condition logic as helpers.yml _:check-link BUT
      # increments an explicit failures counter on each failing path, ending
      # with `exit "$failures"`. This closes the _:check-link-always-exits-0
      # gap so root `task validate` can bubble links:validate failures via
      # exit code. Feature-off entries in EXPECTED_TARGETS render as empty
      # lines and are skipped via `[[ -z "$target" ]] && continue`.
      - |
        {{.DOTFILES_MESSAGES}}
        failures=0

        # Resolve the expected SOURCE for a given TARGET. Mirrors the literal
        # pairings used by install-zsh / install-claude / install-configs
        # when materializing the links -- editing one mapping requires editing
        # this case statement AND the corresponding cmds: entry.
        resolve_source() {
          local target="$1"
          local zdotdir="{{.ZDOTDIR}}"
          local xdg="{{.XDG_CONFIG_HOME}}"
          local dotfiledir="{{.ROOT_DIR}}"
          case "$target" in
            "$zdotdir/.zshenv")            printf '%s\n' "$dotfiledir/shell/.zshenv" ;;
            "$zdotdir/.zprofile")          printf '%s\n' "$dotfiledir/shell/.zprofile" ;;
            "$zdotdir/.zshrc")             printf '%s\n' "$dotfiledir/shell/.zshrc" ;;
            "$zdotdir/.zlogin")            printf '%s\n' "$dotfiledir/shell/.zlogin" ;;
            "$zdotdir/.zlogout")           printf '%s\n' "$dotfiledir/shell/.zlogout" ;;
            # All claude links share the relpath on both sides (see CLAUDE_LINKS);
            # strip the $xdg/claude/ prefix to recover it (covers files + hooks/*).
            "$xdg/claude/"*)               printf '%s\n' "$dotfiledir/claude/${target#$xdg/claude/}" ;;
            "$xdg/ghostty/config")         printf '%s\n' "$dotfiledir/configs/ghostty/config" ;;
            "$xdg/tlrc/"*)                 printf '%s\n' "$dotfiledir/configs/tlrc/${target##*/tlrc/}" ;;
            "$xdg/conda/"*)                printf '%s\n' "$dotfiledir/configs/conda/${target##*/conda/}" ;;
            "$xdg/eza/"*)                  printf '%s\n' "$dotfiledir/configs/eza/${target##*/eza/}" ;;
            *)                             printf '%s\n' "" ;;
          esac
        }

        while IFS= read -r target; do
          [[ -z "$target" ]] && continue

          if [[ ! -L "$target" ]]; then
            cross "$target missing"
            failures=$(( failures + 1 ))
            continue
          fi

          if [[ ! -e "$target" ]]; then
            cross "$target broken (target missing)"
            failures=$(( failures + 1 ))
            continue
          fi

          expected="$(resolve_source "$target")"
          if [[ -z "$expected" ]]; then
            cross "$target has no known expected source (links:validate bug)"
            failures=$(( failures + 1 ))
            continue
          fi

          actual="$(readlink -f "$target" 2>/dev/null || true)"
          if [[ "$actual" != "$expected" ]]; then
            cross "$target points to wrong source (expected $expected, got $actual)"
            failures=$(( failures + 1 ))
          else
            check "$target linked"
          fi
        done <<< "{{.EXPECTED_TARGETS}}"

        exit "$failures"

  # lint-allow: cmds-without-status
  audit:
    desc: "Audit symlink drift (detect orphans); -- --remove for interactive cleanup"
    deps: [":manifest:resolve"]
    status: [false]
    # Three invocation modes via CLI_ARGS:
    #   default     -- detect-only; exit non-zero on orphan; CI-safe gate.
    #   --remove    -- interactive cleanup; TTY-gated; y/N per orphan;
    #                  uses `unlink` only (never `rm`).
    #   --warn-only -- non-fatal; emits orphans via warn(); always exits 0.
    # This is the public `task links:audit` command (domain-first).
    cmds:
      - |
        {{.DOTFILES_MESSAGES}}

        # Mode dispatch via CLI_ARGS. If both --remove and --warn-only appear,
        # warn-only wins by parse order (documented; pick one flag).
        mode="detect"
        cli="{{.CLI_ARGS}}"
        case " $cli " in
          *" --remove "*)      mode="remove" ;;
        esac
        case " $cli " in
          *" --warn-only "*)   mode="warn" ;;
        esac

        # --remove TTY-gate MUST appear BEFORE any orphan enumeration so
        # non-TTY callers fail fast.
        if [[ "$mode" == "remove" ]]; then
          if [[ ! -t 0 ]]; then
            error "links:audit --remove requires an interactive TTY; stdin is not a tty"
            exit 1
          fi
        fi

        dotfiledir="{{.ROOT_DIR}}"

        expected=()
        while IFS= read -r line; do
          [[ -n "$line" ]] && expected+=("$line")
        done <<< "{{.EXPECTED_TARGETS}}"

        # Derive deduplicated parent_dirs from expected. CRITICAL: word-split-safe
        # assignment via `while IFS= read -r` -- NOT the `array=($(...))` form,
        # which is vulnerable to word-splitting on path components containing
        # spaces and is not shellcheck-clean.
        raw_parents=()
        for t in "${expected[@]}"; do
          raw_parents+=("$(dirname "$t")")
        done
        parent_dirs=()
        while IFS= read -r dir; do
          [[ -n "$dir" ]] && parent_dirs+=("$dir")
        done < <(printf '%s\n' "${raw_parents[@]}" | sort -u)

        # Bounded scan (-maxdepth 2). A symlink is an orphan iff its readlink -f
        # target is under $dotfiledir AND the link path itself is not in
        # EXPECTED_TARGETS.
        #
        # `(( expr ))` evaluates to exit-1 when expr is zero -- under errexit
        # that aborts the script. Use `if ... ; then ... ; fi` instead of
        # `(( ... )) && cmd` or bare `(( ... ))`.
        orphans=()
        for dir in "${parent_dirs[@]}"; do
          [[ -d "$dir" ]] || continue
          while IFS= read -r lnk; do
            [[ -z "$lnk" ]] && continue
            target="$(readlink -f "$lnk" 2>/dev/null || true)"
            [[ "$target" == "$dotfiledir"* ]] || continue
            found=0
            for e in "${expected[@]}"; do
              if [[ "$lnk" == "$e" ]]; then
                found=1
                break
              fi
            done
            if [[ "$found" == "0" ]]; then
              orphans+=("$lnk")
            fi
          done < <(find "$dir" -maxdepth 2 -type l 2>/dev/null)
        done

        orphan_count=${#orphans[@]}

        case "$mode" in
          detect)
            if [[ "$orphan_count" -eq 0 ]]; then
              info "no orphan symlinks detected"
              exit 0
            fi
            for orphan in "${orphans[@]}"; do
              warn "orphan: $orphan -> $(readlink "$orphan" 2>/dev/null || echo unreadable)"
            done
            exit 1
            ;;
          warn)
            if [[ "$orphan_count" -eq 0 ]]; then
              info "no orphan symlinks detected"
              exit 0
            fi
            for orphan in "${orphans[@]}"; do
              warn "orphan: $orphan -> $(readlink "$orphan" 2>/dev/null || echo unreadable)"
            done
            # --warn-only ALWAYS exits 0 regardless of orphan count.
            exit 0
            ;;
          remove)
            if [[ "$orphan_count" -eq 0 ]]; then
              info "no orphan symlinks detected"
              exit 0
            fi
            for orphan in "${orphans[@]}"; do
              tgt="$(readlink "$orphan" 2>/dev/null || echo unreadable)"
              info "orphan: $orphan -> $tgt"
              printf 'Remove? [y/N]: '
              read -r REPLY
              if [[ "$REPLY" == "y" || "$REPLY" == "yes" ]]; then
                # Security: `unlink` removes ONLY the named symlink path.
                # Never use `rm` here -- a misdirected rm could delete a
                # directory if a real path slipped through orphan detection.
                if unlink "$orphan"; then
                  success "removed: $orphan"
                else
                  error "failed to unlink: $orphan"
                fi
              else
                info "skipped: $orphan"
              fi
            done
            exit 0
            ;;
          *)
            # Defensive catch-all. The three valid modes (detect, warn, remove)
            # are the only values $mode can take given the initialization +
            # the two case mutators above; this branch surfaces a future
            # flag-parsing bug as a hard error instead of a silent no-op.
            error "links:audit: internal bug -- unknown mode '$mode'"
            exit 1
            ;;
        esac
