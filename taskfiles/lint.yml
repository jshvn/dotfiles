version: '3'

# =============================================================================
# taskfiles/lint.yml -- lint suite for v2 dotfiles conventions
#
# Purpose:      Enforce LINT-01..08 structural correctness rules that prevent
#               recurring v1 bug classes. See CLAUDE.md §Lint rule catalogue
#               for the rule definitions.
# Depends on:   taskfiles/helpers.yml; install/messages.zsh; yq + ggrep.
# Side effects: read-only -- emits check/cross output via messages.zsh.
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  TASKFILE_GLOB: 'taskfiles/*.yml'
  # ZSH_FIND uses DOTFILEDIR so it works regardless of cwd when task is invoked.
  ZSH_FIND: >-
    find {{.DOTFILEDIR}} -name '*.zsh'
    -not -path '{{.DOTFILEDIR}}/.git/*'
    -not -path '{{.DOTFILEDIR}}/.planning/*'
    -not -path '{{.DOTFILEDIR}}/taskfiles/test/*'
    -not -path '{{.DOTFILEDIR}}/.claude/*'
  DOTFILEDIR:
    sh: dirname "{{.TASKFILE_DIR}}"
  DOTFILES_MESSAGES: |
    source '{{.DOTFILEDIR}}/install/messages.zsh'

tasks:

  # lint-allow: cmds-without-status
  default:
    desc: "Run all lint checks (LINT-06 aggregator)"
    # lint tasks intentionally have no status: block -- they are always
    # re-run. Each sub-check carries ignore_error: true so the aggregator runs
    # every check regardless of prior failures (run-all-aggregate). Without
    # this, one early failure (e.g., a pre-existing LINT-02 baseline) aborts
    # the pipeline and downstream checks like LINT-08 banner-parity never run.
    cmds:
      - task: syntax
        ignore_error: true
      - task: taskfile
        ignore_error: true
      - task: shell-headers
        ignore_error: true
      - task: portability
        ignore_error: true
      - task: banner-parity
        ignore_error: true

  # lint-allow: cmds-without-status
  syntax:
    desc: "YAML parse + zsh -n syntax checks (LINT-07)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # task --list-all --json exits non-zero on parse errors. Exit-1 with
        # empty task list (all internal: true) is NOT a parse error; detect
        # real failures by checking stderr for "Failed to parse".
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          err=$(task --list-all --json -t "$f" 2>&1 >/dev/null || true)
          if echo "$err" | ggrep -q 'Failed to parse'; then
            cross "yaml-parse: $f -- task --list-all failed"
            echo "$err" >&2
            failures=$(( failures + 1 ))
          else
            check "yaml-parse: $f"
          fi
        done < <(find {{.DOTFILEDIR}}/taskfiles -maxdepth 1 -name '*.yml' | sort)
        exit "$failures"
      - |
        # lint-allow: cmds-without-status
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          if zsh -n "$f" 2>&1; then
            check "zsh -n: $f"
          else
            cross "zsh -n: $f"
            failures=$(( failures + 1 ))
          fi
        done < <({{.ZSH_FIND}})
        exit "$failures"

  # lint-allow: cmds-without-status
  taskfile:
    desc: 'Taskfile convention checks: $VAR in status:, cmds: without status:, bare symlink outside helpers (LINT-02 + LINT-03a + LINT-03b)'
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # All three checks run in a single block so all produce output even
        # when one fails. The failures counter accumulates across LINT-02,
        # LINT-03b, and LINT-03a; the final exit reports the total count.
        {{.DOTFILES_MESSAGES}}
        failures=0

        # LINT-02: $VAR-style shell vars inside status: blocks.
        while IFS= read -r f; do
          out=$(yq '.tasks[] | select(.status) | .status' "$f" 2>/dev/null \
                | ggrep -nE '\$[A-Za-z_][A-Za-z0-9_]*' \
                | ggrep -vE '\$\(' \
                | ggrep -vE '\{\{' || true)
          if [[ -n "$out" ]]; then
            cross "LINT-02: \$VAR in status: block -- $f"
            echo "$out" >&2
            failures=$(( failures + 1 ))
          else
            check "LINT-02: $f"
          fi
        done < <(find {{.DOTFILEDIR}}/taskfiles -maxdepth 1 -name '*.yml' | sort)

        # LINT-03b: bare ln -s outside taskfiles/helpers.yml.
        violations=$(ggrep -rn -E '\bln[[:space:]]+-s' "{{.DOTFILEDIR}}/taskfiles/" \
                      | ggrep -v 'helpers.yml' \
                      | ggrep -v ':[[:space:]]*#' || true)
        if [[ -n "$violations" ]]; then
          cross "LINT-03b: bare 'ln -s' outside helpers.yml"
          echo "$violations" >&2
          failures=$(( failures + 1 ))
        else
          check "LINT-03b: no bare ln -s outside helpers.yml"
        fi

        # LINT-03a: tasks with cmds: but no status: block.
        # Exemptions: internal: true tasks; tasks whose cmds: are ALL task:
        # delegations; taskfiles/lint.yml itself.
        while IFS= read -r f; do
          [[ "$f" == *"lint.yml" ]] && continue
          while IFS= read -r task_name; do
            [[ -z "$task_name" ]] && continue
            is_internal=$(yq ".tasks.\"$task_name\".internal // false" "$f" 2>/dev/null || echo false)
            [[ "$is_internal" == "true" ]] && continue
            # `map(has("task")) | all` (no-arg `all` builtin) because the
            # `all(filter)` form returns a yq syntax error -- and that error
            # was previously masked behind 2>/dev/null + ||echo false, so the
            # exemption silently failed and orchestrator tasks were
            # mis-flagged. Bracket-indexing `.tasks["$task_name"]` keeps the
            # query robust when $task_name collides with a yq builtin name
            # such as "all".
            all_delegations=$(yq ".tasks[\"$task_name\"].cmds | map(has(\"task\")) | all" "$f" 2>/dev/null || echo false)
            [[ "$all_delegations" == "true" ]] && continue
            cross "LINT-03a: '$task_name' in $f has cmds: but no status:"
            failures=$(( failures + 1 ))
          done < <(yq '.tasks | to_entries | .[] | select(.value | has("cmds")) | select(.value | has("status") | not) | .key' "$f" 2>/dev/null || true)
        done < <(find {{.DOTFILEDIR}}/taskfiles -maxdepth 1 -name '*.yml' | sort)

        exit "$failures"

  # lint-allow: cmds-without-status
  shell-headers:
    desc: "Executable .zsh files have set -euo pipefail (LINT-04)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          if head -30 "$f" | ggrep -qE '^set -euo pipefail$'; then
            check "LINT-04: $f"
          else
            cross "LINT-04: $f missing 'set -euo pipefail' in first 30 lines"
            failures=$(( failures + 1 ))
          fi
        done < <(find {{.DOTFILEDIR}} -name '*.zsh' -perm +111 \
                   -not -path '{{.DOTFILEDIR}}/.git/*' \
                   -not -path '{{.DOTFILEDIR}}/.planning/*' \
                   -not -path '{{.DOTFILEDIR}}/taskfiles/test/*' \
                   -not -path '{{.DOTFILEDIR}}/.claude/*' \
                   2>/dev/null)
        exit "$failures"

  # lint-allow: cmds-without-status
  portability:
    desc: "Portability hints for future-Linux v2 (warn-only, exit 0; LINT-05)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # Scans shell/ and os/ for macOS-only commands. ggrep tolerates
        # missing directories via 2>/dev/null and || true.
        {{.DOTFILES_MESSAGES}}
        patterns=(pbcopy pbpaste osascript 'defaults read' 'defaults write' sw_vers dscl PlistBuddy)
        warnings=0
        for pat in "${patterns[@]}"; do
          hits=$(ggrep -rnE "\b${pat}\b" shell/ os/ 2>/dev/null \
                 | ggrep -v ':[[:space:]]*#' || true)
          if [[ -n "$hits" ]]; then
            warn "LINT-05: portability hint -- '${pat}' found:"
            echo "$hits" >&2
            warnings=$(( warnings + 1 ))
          fi
        done
        [[ $warnings -gt 0 ]] && warn "LINT-05: $warnings portability hint(s) found (non-blocking; exit 0)"
        exit 0

  # lint-allow: cmds-without-status
  banner-parity:
    desc: "Banner parity check: default:'s cmd block lists every public top-level task (LINT-08 -- D-13)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # The root Taskfile.yml `default:` task is the curated operator surface
        # banner; every non-internal top-level task (no `:` in the name) MUST
        # appear in its cmd block, otherwise operators miss commands rendered
        # by `task --list` but not by bare `task`.
        {{.DOTFILES_MESSAGES}}
        failures=0
        ROOT_TASKFILE="{{.DOTFILEDIR}}/Taskfile.yml"
        public_top_tasks=$(yq '.tasks | to_entries | .[] | select(.value.internal // false | not) | .key | select(test("^[^:]+$"))' "$ROOT_TASKFILE")
        banner_body=$(yq '.tasks.default.cmds[0]' "$ROOT_TASKFILE")
        for task_name in $public_top_tasks; do
          # Skip the `default` task itself -- it cannot reference itself in its own banner.
          [[ "$task_name" == "default" ]] && continue
          if ! echo "$banner_body" | ggrep -qF "$task_name"; then
            cross "LINT-08: 'task $task_name' is public but missing from default:'s banner -- update Taskfile.yml"
            failures=$(( failures + 1 ))
          else
            check "LINT-08: $task_name in banner"
          fi
        done
        exit "$failures"

  # lint-allow: cmds-without-status
  test-fixtures:
    desc: "Self-test the lint suite against fixtures (positive + negative cases)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        {{.DOTFILES_MESSAGES}}
        failures=0
        fixtures_dir="{{.DOTFILEDIR}}/taskfiles/test/lint-fixtures"
        for fix in "$fixtures_dir"/[0-9]*-*/; do
          name=$(basename "$fix")
          expect=$(head -n1 "$fix/expect" | tr -d '[:space:]')
          actual=unknown
          case "$name" in
            02*|03a-*)
              # LINT-02 / LINT-03a: scope to fixture's Taskfile.yml
              lint02_hit=$( (cd "$fix" && yq '.tasks[] | select(.status) | .status' Taskfile.yml 2>/dev/null \
                  | ggrep -nE '\$[A-Za-z_][A-Za-z0-9_]*' \
                  | ggrep -vE '\$\(' \
                  | ggrep -vE '\{\{') || true)
              lint03a_hit=""
              while IFS= read -r task_name; do
                [[ -z "$task_name" ]] && continue
                is_internal=$(cd "$fix" && yq ".tasks.\"$task_name\".internal // false" Taskfile.yml 2>/dev/null || echo false)
                [[ "$is_internal" == "true" ]] && continue
                all_delegations=$(cd "$fix" && yq ".tasks.\"$task_name\".cmds | all(has(\"task\"))" Taskfile.yml 2>/dev/null || echo false)
                [[ "$all_delegations" == "true" ]] && continue
                lint03a_hit="${lint03a_hit}${task_name} "
              done < <(cd "$fix" && yq '.tasks | to_entries | .[] | select(.value | has("cmds")) | select(.value | has("status") | not) | .key' Taskfile.yml 2>/dev/null || true)
              if [[ -n "$lint02_hit" ]] || [[ -n "$lint03a_hit" ]]; then
                actual=fail
              else
                actual=pass
              fi
              ;;
            03b-*)
              # LINT-03b: bare ln -s outside helpers.yml
              file=$(ls "$fix"/*.yml 2>/dev/null | head -1)
              base=$(basename "$file")
              if ggrep -qE '\bln[[:space:]]+-s' "$file" && [[ "$base" != "helpers.yml" ]]; then
                actual=fail
              else
                actual=pass
              fi
              ;;
            04*)
              # LINT-04: executable .zsh missing set -euo pipefail
              file=$(ls "$fix"/*.zsh 2>/dev/null | head -1)
              if [[ -x "$file" ]] && ! head -30 "$file" | ggrep -qE '^set -euo pipefail$'; then
                actual=fail
              else
                actual=pass
              fi
              ;;
            05*)
              # LINT-05: portability pattern (warn-only). actual="warn" if pattern found.
              file=$(ls "$fix"/*.zsh 2>/dev/null | head -1)
              if ggrep -qE '\b(pbcopy|pbpaste|osascript|sw_vers|dscl|PlistBuddy)\b|defaults (read|write)' "$file"; then
                actual=warn
              else
                actual=pass
              fi
              ;;
            07*)
              # LINT-07: zsh -n parse error
              file=$(ls "$fix"/*.zsh 2>/dev/null | head -1)
              if zsh -n "$file" 2>/dev/null; then
                actual=pass
              else
                actual=fail
              fi
              ;;
            08*)
              # LINT-08: banner-parity check against THIS fixture's
              # Taskfile.yml (not the project root). Replicates the
              # banner-parity rule body: extract public top-level tasks (no
              # `:` in name; internal: true excluded), grep each name
              # against default.cmds[0]. fail if any missing.
              file=$(ls "$fix"/Taskfile.yml 2>/dev/null)
              if [[ -z "$file" ]]; then
                actual=unknown
              else
                public_top=$(yq '.tasks | to_entries | .[] | select(.value.internal // false | not) | .key | select(test("^[^:]+$"))' "$file" 2>/dev/null)
                banner_body=$(yq '.tasks.default.cmds[0] // ""' "$file" 2>/dev/null)
                any_miss=0
                for tn in $public_top; do
                  [[ "$tn" == "default" ]] && continue
                  if ! echo "$banner_body" | ggrep -qF "$tn"; then any_miss=1; fi
                done
                if [[ "$any_miss" -eq 1 ]]; then actual=fail; else actual=pass; fi
              fi
              ;;
            *) actual=unknown ;;
          esac
          if [[ "$actual" == "$expect" ]]; then
            check "${name}: expect=${expect} actual=${actual}"
          else
            cross "${name}: expect=${expect} actual=${actual}"
            failures=$((failures + 1))
          fi
        done
        if [[ $failures -gt 0 ]]; then
          error "lint:test-fixtures: $failures fixture(s) failed expected behavior"
        else
          success "lint:test-fixtures: all $(ls -d "$fixtures_dir"/[0-9]*-*/ | wc -l | tr -d ' ') fixtures behaved as expected"
        fi
        exit "$failures"
