version: '3'

# =============================================================================
# taskfiles/lint.yml -- lint suite for v2 dotfiles conventions
#
# Purpose:      Enforce LINT-02..12 structural correctness rules that prevent
#               recurring bug classes (01 and 06 intentionally absent). See
#               CLAUDE.md §Lint rule catalogue for the rule definitions.
# Depends on:   taskfiles/helpers.yml; install/messages.zsh; yq + ggrep.
# Side effects: read-only -- emits check/cross output via messages.zsh.
# =============================================================================

includes:
  _: ./helpers.yml

vars:
  TASKFILE_GLOB: 'taskfiles/*.yml'
  # ZSH_FIND anchors on ROOT_DIR so it works regardless of cwd when task is invoked.
  ZSH_FIND: >-
    find {{.ROOT_DIR}} -name '*.zsh'
    -not -path '{{.ROOT_DIR}}/.git/*'
    -not -path '{{.ROOT_DIR}}/.planning/*'
    -not -path '{{.ROOT_DIR}}/taskfiles/test/*'
    -not -path '{{.ROOT_DIR}}/.claude/*'

tasks:

  # lint-allow: cmds-without-status
  default:
    desc: "Run all lint checks"
    # lint tasks intentionally have no status: block -- they are always
    # re-run. Each sub-check carries ignore_error: true so the aggregator runs
    # every check regardless of prior failures (run-all-aggregate). Without
    # this, one early failure (e.g., a pre-existing LINT-02 baseline) aborts
    # the pipeline and downstream checks like LINT-08 banner-parity never run.
    cmds:
      - task: syntax
        ignore_error: true
      - task: taskfile
        ignore_error: true
      - task: shell-headers
        ignore_error: true
      - task: portability
        ignore_error: true
      - task: banner-parity
        ignore_error: true
      - task: settings-drift
        ignore_error: true
      - task: brew-prefix
        ignore_error: true
      - task: kebab-access
        ignore_error: true
      - task: file-headers
        ignore_error: true

  # lint-allow: cmds-without-status
  syntax:
    desc: "YAML parse + zsh -n syntax checks"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # task --list-all --json exits non-zero on parse errors. Exit-1 with
        # empty task list (all internal: true) is NOT a parse error; detect
        # real failures by checking stderr for "Failed to parse".
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          err=$(task --list-all --json -t "$f" 2>&1 >/dev/null || true)
          if echo "$err" | ggrep -q 'Failed to parse'; then
            cross "yaml-parse: $f -- task --list-all failed"
            echo "$err" >&2
            failures=$(( failures + 1 ))
          else
            check "yaml-parse: $f"
          fi
        done < <(find {{.ROOT_DIR}}/taskfiles -maxdepth 1 -name '*.yml' | sort)
        exit "$failures"
      - |
        # lint-allow: cmds-without-status
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          if zsh -n "$f" 2>&1; then
            check "zsh -n: $f"
          else
            cross "zsh -n: $f"
            failures=$(( failures + 1 ))
          fi
        done < <({{.ZSH_FIND}})
        exit "$failures"

  # lint-allow: cmds-without-status
  taskfile:
    desc: 'Taskfile convention checks: $VAR in status:, cmds: without status:, bare symlink outside helpers'
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # All three checks run in a single block so all produce output even
        # when one fails. The failures counter accumulates across LINT-02,
        # LINT-03b, and LINT-03a; the final exit reports the total count.
        {{.DOTFILES_MESSAGES}}
        {{.DOTFILES_LINT_RULES}}
        failures=0

        # LINT-02: $VAR-style shell vars inside status: blocks. The detector
        # lives in install/lint-rules.zsh (lint02_scan_file) and is called by
        # the self-test harness too, so there is no second copy to keep aligned.
        while IFS= read -r f; do
          out=$(lint02_scan_file "$f")
          if [[ -n "$out" ]]; then
            cross "LINT-02: \$VAR in status: block -- $f"
            printf '%s' "$out" >&2
            failures=$(( failures + 1 ))
          else
            check "LINT-02: $f"
          fi
        done < <(find {{.ROOT_DIR}}/taskfiles -maxdepth 1 -name '*.yml' | sort)

        # LINT-03b: bare ln -s outside taskfiles/helpers.yml.
        # Scope:
        #   --include='*.yml'    -- markdown docs that describe the rule
        #                           (taskfiles/README.md mentions `ln -s`)
        #                           must not trip it.
        #   --exclude-dir='test' -- self-test fixtures intentionally contain
        #                           bare ln -s to verify the rule fires (e.g.
        #                           03b-bare-ln/Taskfile.yml); they belong to
        #                           lint:test-fixtures, not production scan.
        violations=$(ggrep -rn -E '\bln[[:space:]]+-s' \
                      --include='*.yml' --exclude-dir='test' \
                      "{{.ROOT_DIR}}/taskfiles/" \
                      | ggrep -v 'helpers.yml' \
                      | ggrep -v ':[[:space:]]*#' || true)
        if [[ -n "$violations" ]]; then
          cross "LINT-03b: bare 'ln -s' outside helpers.yml"
          echo "$violations" >&2
          failures=$(( failures + 1 ))
        else
          check "LINT-03b: no bare ln -s outside helpers.yml"
        fi

        # LINT-03a: tasks with cmds: but no status: block. The detector lives
        # in install/lint-rules.zsh (lint03a_scan_file) -- shared with the
        # self-test harness. lint.yml itself is skipped (its lint bodies are
        # not real tasks needing status:).
        while IFS= read -r f; do
          [[ "$f" == *"lint.yml" ]] && continue
          while IFS= read -r task_name; do
            [[ -z "$task_name" ]] && continue
            cross "LINT-03a: '$task_name' in $f has cmds: but no status:"
            failures=$(( failures + 1 ))
          done < <(lint03a_scan_file "$f")
        done < <(find {{.ROOT_DIR}}/taskfiles -maxdepth 1 -name '*.yml' | sort)

        exit "$failures"

  # lint-allow: cmds-without-status
  shell-headers:
    desc: "Executable .zsh files have set -euo pipefail"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          if head -30 "$f" | ggrep -qE '^set -euo pipefail$'; then
            check "LINT-04: $f"
          else
            cross "LINT-04: $f missing 'set -euo pipefail' in first 30 lines"
            failures=$(( failures + 1 ))
          fi
        done < <(find {{.ROOT_DIR}} -name '*.zsh' -perm +111 \
                   -not -path '{{.ROOT_DIR}}/.git/*' \
                   -not -path '{{.ROOT_DIR}}/.planning/*' \
                   -not -path '{{.ROOT_DIR}}/taskfiles/test/*' \
                   -not -path '{{.ROOT_DIR}}/.claude/*' \
                   2>/dev/null)
        exit "$failures"

  # lint-allow: cmds-without-status
  portability:
    desc: "Portability hints for platform-specific calls (warn-only, exit 0)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # Scans shell/ and os/ for macOS-only commands. Scoped to .zsh
        # sources so markdown prose describing these commands (e.g.
        # os/README.md) never trips a warning. ggrep tolerates missing
        # directories via 2>/dev/null and || true.
        {{.DOTFILES_MESSAGES}}
        patterns=(pbcopy pbpaste osascript 'defaults read' 'defaults write' sw_vers dscl PlistBuddy)
        warnings=0
        for pat in "${patterns[@]}"; do
          hits=$(ggrep -rnE --include='*.zsh' "\b${pat}\b" shell/ os/ 2>/dev/null \
                 | ggrep -v ':[[:space:]]*#' || true)
          if [[ -n "$hits" ]]; then
            warn "LINT-05: portability hint -- '${pat}' found:"
            echo "$hits" >&2
            warnings=$(( warnings + 1 ))
          fi
        done
        [[ $warnings -gt 0 ]] && warn "LINT-05: $warnings portability hint(s) found (non-blocking; exit 0)"
        exit 0

  # lint-allow: cmds-without-status
  banner-parity:
    desc: "Banner parity check: default:'s cmd block lists every public top-level task"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # The root Taskfile.yml `default:` task is the curated operator surface
        # banner; every non-internal top-level task (no `:` in the name) MUST
        # appear in its cmd block, otherwise operators miss commands rendered
        # by `task --list` but not by bare `task`.
        {{.DOTFILES_MESSAGES}}
        failures=0
        ROOT_TASKFILE="{{.ROOT_DIR}}/Taskfile.yml"
        public_top_tasks=$(yq '.tasks | to_entries | .[] | select(.value.internal // false | not) | .key | select(test("^[^:]+$"))' "$ROOT_TASKFILE")
        banner_body=$(yq '.tasks.default.cmds[0]' "$ROOT_TASKFILE")
        for task_name in $public_top_tasks; do
          # Skip the `default` task itself -- it cannot reference itself in its own banner.
          [[ "$task_name" == "default" ]] && continue
          if ! echo "$banner_body" | ggrep -qF "$task_name"; then
            cross "LINT-08: 'task $task_name' is public but missing from default:'s banner -- update Taskfile.yml"
            failures=$(( failures + 1 ))
          else
            check "LINT-08: $task_name in banner"
          fi
        done
        exit "$failures"

  # lint-allow: cmds-without-status
  settings-drift:
    desc: "LINT-09: claude/settings.json matches composed settings.d fragments"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # The repo owns claude/settings.json as a build artifact composed from
        # claude/settings.d/*.json fragments. If the live file drifts from the
        # composed output (third-party installer wrote keys; manual edit; etc.)
        # this rule fires. Run `task claude:settings-compose` to fix.
        {{.DOTFILES_MESSAGES}}
        # Delegate to claude:audit (settings.json drift detection); internal
        # tasks cannot be invoked from a shell `task` call, so this public
        # command is the supported entry point.
        if task claude:audit >/dev/null 2>&1; then
          check "LINT-09: claude/settings.json matches composed fragments"
        else
          cross "LINT-09: claude/settings.json drift -- run 'task claude:settings-compose'"
          # Re-run visibly so the operator sees the diff.
          task claude:audit 2>&1 || true
          exit 1
        fi

  # lint-allow: cmds-without-status
  brew-prefix:
    desc: "LINT-10: no hardcoded /opt/homebrew or /usr/local outside annotated dispatch sites"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # The Homebrew prefix must be resolved via uname -m dispatch and
        # consumed as $HOMEBREW_PREFIX (shell) / {{"{{"}}.HOMEBREW_PREFIX{{"}}"}} (task).
        # Hardcoded paths break the Apple Silicon / Intel split. The
        # legitimate dispatch sites (Taskfile.yml HOMEBREW_PREFIX resolution,
        # bootstrap.zsh brew shellenv, identity/ssh/cloudflared.zsh arch
        # dispatch, claude/hooks/lib.zsh fallback default) carry a same-line
        # `# lint-allow: hardcoded-prefix` annotation. Comment-only lines are
        # ignored; taskfiles/lint.yml is excluded because this rule body
        # contains the pattern literally.
        {{.DOTFILES_MESSAGES}}
        failures=0
        hits=$(ggrep -rnE '/opt/homebrew|/usr/local' \
                --include='*.zsh' --include='*.yml' \
                --exclude-dir='.git' --exclude-dir='.planning' \
                --exclude-dir='test' --exclude-dir='.claude' \
                "{{.ROOT_DIR}}" 2>/dev/null \
               | ggrep -v 'lint-allow: hardcoded-prefix' \
               | ggrep -v 'taskfiles/lint\.yml:' \
               | ggrep -v ':[[:space:]]*#' || true)
        if [[ -n "$hits" ]]; then
          cross "LINT-10: hardcoded Homebrew prefix -- use \$HOMEBREW_PREFIX or annotate dispatch sites"
          echo "$hits" >&2
          failures=$(( failures + 1 ))
        else
          check "LINT-10: no hardcoded Homebrew prefix outside annotated dispatch sites"
        fi
        exit "$failures"

  # lint-allow: cmds-without-status
  kebab-access:
    desc: "LINT-11: kebab-case feature keys use index form, never template dot-access"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # Go-template dot-access cannot contain `-` -- it fails at task-graph
        # parse time. Kebab-case feature keys must use the index form:
        # `index .MANIFEST.features "one-password-ssh"`. The regex requires a
        # hyphen after the dot-accessed key head, so snake_case and
        # non-hyphenated keys stay legal.
        {{.DOTFILES_MESSAGES}}
        failures=0
        hits=$(ggrep -rnE '\.MANIFEST\.features\.[A-Za-z0-9_]+-' \
                "{{.ROOT_DIR}}/Taskfile.yml" "{{.ROOT_DIR}}"/taskfiles/*.yml 2>/dev/null \
               | ggrep -v ':[[:space:]]*#' || true)
        if [[ -n "$hits" ]]; then
          cross "LINT-11: kebab-case feature key via dot-access -- use the index form"
          echo "$hits" >&2
          failures=$(( failures + 1 ))
        else
          check "LINT-11: no kebab-case feature dot-access in taskfiles"
        fi
        exit "$failures"

  # lint-allow: cmds-without-status
  file-headers:
    desc: "LINT-12: .zsh files carry the Purpose / Depends on / Side effects header banner"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        # Every .zsh file opens with a file-header block: the three labels
        # Purpose / Depends on / Side effects between two `# ===` 77-char
        # rules (79 chars including the leading `# `), within the first 30
        # lines (same window as LINT-04).
        {{.DOTFILES_MESSAGES}}
        failures=0
        while IFS= read -r f; do
          h=$(head -30 "$f")
          rules=$(printf '%s\n' "$h" | ggrep -cE '^# ={77}$' || true)
          ok=1
          [[ "$rules" -ge 2 ]] || ok=0
          printf '%s\n' "$h" | ggrep -qE '^# Purpose:' || ok=0
          printf '%s\n' "$h" | ggrep -qE '^# Depends on:' || ok=0
          printf '%s\n' "$h" | ggrep -qE '^# Side effects:' || ok=0
          if [[ "$ok" -eq 1 ]]; then
            check "LINT-12: $f"
          else
            cross "LINT-12: $f missing header banner (Purpose / Depends on / Side effects between # === rules)"
            failures=$(( failures + 1 ))
          fi
        done < <({{.ZSH_FIND}})
        exit "$failures"

  # lint-allow: cmds-without-status
  test-fixtures:
    desc: "Self-test the lint suite against fixtures (positive + negative cases)"
    internal: true
    cmds:
      - |
        # lint-allow: cmds-without-status
        {{.DOTFILES_MESSAGES}}
        {{.DOTFILES_LINT_RULES}}
        failures=0
        fixtures_dir="{{.ROOT_DIR}}/taskfiles/test/lint-fixtures"
        for fix in "$fixtures_dir"/[0-9]*-*/; do
          name=$(basename "$fix")
          expect=$(head -n1 "$fix/expect" | tr -d '[:space:]')
          actual=unknown
          case "$name" in
            02*|03a-*)
              # LINT-02 / LINT-03a: both detectors live in
              # install/lint-rules.zsh and are called by the production scan
              # too, so there is no separate fixture re-implementation to keep
              # aligned. Fixtures 02d/02e exercise the local-vars allow-list,
              # 02f pins the BSD-awk newline bug (multi-entry allow-list must
              # survive the space-separated -v handoff), 02g the read-var case,
              # and 03a-all-delegations-ok the all-`task:`-delegation exemption.
              lint02_hit=$(lint02_scan_file "$fix/Taskfile.yml")
              lint03a_hit=$(lint03a_scan_file "$fix/Taskfile.yml")
              if [[ -n "$lint02_hit" ]] || [[ -n "$lint03a_hit" ]]; then
                actual=fail
              else
                actual=pass
              fi
              ;;
            03b-*)
              # LINT-03b: bare ln -s outside helpers.yml.
              # Mirror production scope: scan *.yml only (production uses
              # --include='*.yml' --exclude-dir='test'). A fixture with no
              # .yml file (e.g. 03b-readme-ok/README.md) is out of scope and
              # passes by construction -- exactly as the production rule
              # treats taskfiles/README.md.
              # `|| true` is required: under root errexit+pipefail
              # (Taskfile.yml:15), an unmatched glob makes `ls` exit non-zero
              # and pipefail propagates it through `head`, which would abort
              # the script before the case branch runs.
              file=$(ls "$fix"/*.yml 2>/dev/null | head -1 || true)
              if [[ -z "$file" ]]; then
                actual=pass
              else
                base=$(basename "$file")
                if ggrep -qE '\bln[[:space:]]+-s' "$file" && [[ "$base" != "helpers.yml" ]]; then
                  actual=fail
                else
                  actual=pass
                fi
              fi
              ;;
            04*)
              # LINT-04: executable .zsh missing set -euo pipefail
              file=$(ls "$fix"/*.zsh 2>/dev/null | head -1)
              if [[ -x "$file" ]] && ! head -30 "$file" | ggrep -qE '^set -euo pipefail$'; then
                actual=fail
              else
                actual=pass
              fi
              ;;
            05*)
              # LINT-05: portability pattern (warn-only). One fixture per
              # production patterns[] entry. Drift-guard: the slug derived
              # from the fixture name (05X-<slug>-warn) must appear in the
              # production patterns=(...) line at lint.yml ~line 188. If a
              # pattern is dropped from production, the corresponding fixture
              # flips to `actual=fail` and the self-test fails.
              file=$(ls "$fix"/*.zsh 2>/dev/null | head -1)
              pat_slug=$(echo "$name" | sed -E 's/^05[a-z]-//; s/-warn$//')
              case "$pat_slug" in
                defaults-read)  expect_pat='defaults read'  ;;
                defaults-write) expect_pat='defaults write' ;;
                plistbuddy)     expect_pat='PlistBuddy'     ;;
                *)              expect_pat="$pat_slug"      ;;
              esac
              prod_patterns_line=$(ggrep -oE 'patterns=\([^)]+\)' "{{.ROOT_DIR}}/taskfiles/lint.yml" | head -1)
              if ! echo "$prod_patterns_line" | ggrep -qF "$expect_pat"; then
                actual=fail
                echo "    LINT-05 production patterns=(...) does not declare '$expect_pat'" >&2
              elif ggrep -qE "${expect_pat}" "$file"; then
                actual=warn
              else
                actual=pass
              fi
              ;;
            07*)
              # LINT-07: zsh -n parse error OR yaml-parse failure.
              # File extension selects the arm: *.zsh -> `zsh -n`,
              # *.yml -> `task --list-all --json` with stderr 'Failed to parse'.
              if ls "$fix"/*.zsh >/dev/null 2>&1; then
                file=$(ls "$fix"/*.zsh 2>/dev/null | head -1)
                if zsh -n "$file" 2>/dev/null; then
                  actual=pass
                else
                  actual=fail
                fi
              elif ls "$fix"/*.yml >/dev/null 2>&1; then
                file=$(ls "$fix"/*.yml 2>/dev/null | head -1)
                err=$(task --list-all --json -t "$file" 2>&1 >/dev/null || true)
                if echo "$err" | ggrep -q 'Failed to parse'; then
                  actual=fail
                else
                  actual=pass
                fi
              else
                actual=unknown
              fi
              ;;
            08*)
              # LINT-08: banner-parity check against THIS fixture's
              # Taskfile.yml (not the project root). Replicates the
              # banner-parity rule body: extract public top-level tasks (no
              # `:` in name; internal: true excluded), grep each name
              # against default.cmds[0]. fail if any missing.
              file=$(ls "$fix"/Taskfile.yml 2>/dev/null)
              if [[ -z "$file" ]]; then
                actual=unknown
              else
                public_top=$(yq '.tasks | to_entries | .[] | select(.value.internal // false | not) | .key | select(test("^[^:]+$"))' "$file" 2>/dev/null)
                banner_body=$(yq '.tasks.default.cmds[0] // ""' "$file" 2>/dev/null)
                any_miss=0
                for tn in $public_top; do
                  [[ "$tn" == "default" ]] && continue
                  if ! echo "$banner_body" | ggrep -qF "$tn"; then any_miss=1; fi
                done
                if [[ "$any_miss" -eq 1 ]]; then actual=fail; else actual=pass; fi
              fi
              ;;
            10*)
              # LINT-10: hardcoded Homebrew prefix. Mirrors production scope:
              # *.zsh/*.yml files; a same-line `lint-allow: hardcoded-prefix`
              # annotation exempts; comment-only lines ignored.
              hits=$(ggrep -rnE '/opt/homebrew|/usr/local' \
                      --include='*.zsh' --include='*.yml' "$fix" 2>/dev/null \
                     | ggrep -v 'lint-allow: hardcoded-prefix' \
                     | ggrep -v ':[[:space:]]*#' || true)
              if [[ -n "$hits" ]]; then actual=fail; else actual=pass; fi
              ;;
            11*)
              # LINT-11: kebab-case feature key via template dot-access.
              # Mirrors the production regex (hyphen required after the
              # dot-accessed key head).
              file=$(ls "$fix"/*.yml 2>/dev/null | head -1 || true)
              if [[ -n "$file" ]] && ggrep -E '\.MANIFEST\.features\.[A-Za-z0-9_]+-' "$file" | ggrep -qv '^[[:space:]]*#'; then
                actual=fail
              else
                actual=pass
              fi
              ;;
            12*)
              # LINT-12: file-header banner. Mirrors production predicate:
              # two `# ===` 77-char rules + Purpose / Depends on /
              # Side effects labels within the first 30 lines.
              file=$(ls "$fix"/*.zsh 2>/dev/null | head -1 || true)
              if [[ -z "$file" ]]; then
                actual=unknown
              else
                h=$(head -30 "$file")
                rules=$(printf '%s\n' "$h" | ggrep -cE '^# ={77}$' || true)
                hdr_ok=1
                [[ "$rules" -ge 2 ]] || hdr_ok=0
                printf '%s\n' "$h" | ggrep -qE '^# Purpose:' || hdr_ok=0
                printf '%s\n' "$h" | ggrep -qE '^# Depends on:' || hdr_ok=0
                printf '%s\n' "$h" | ggrep -qE '^# Side effects:' || hdr_ok=0
                if [[ "$hdr_ok" -eq 1 ]]; then actual=pass; else actual=fail; fi
              fi
              ;;
            *) actual=unknown ;;
          esac
          if [[ "$actual" == "$expect" ]]; then
            check "${name}: expect=${expect} actual=${actual}"
          else
            cross "${name}: expect=${expect} actual=${actual}"
            failures=$((failures + 1))
          fi
        done
        if [[ $failures -gt 0 ]]; then
          error "lint:test-fixtures: $failures fixture(s) failed expected behavior"
        else
          success "lint:test-fixtures: all $(ls -d "$fixtures_dir"/[0-9]*-*/ | wc -l | tr -d ' ') fixtures behaved as expected"
        fi
        exit "$failures"
