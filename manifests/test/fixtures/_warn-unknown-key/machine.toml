# warning fixture -- resolver passes validation but emits an unknown-key
# warn line to stderr. Guards resolver.zsh:230-283 (emit_unknown_key_warnings):
# a regression that broke the whitelist match or the `paths(scalars)` walk
# would silently let unknown keys slip through without operator-visible
# warning.

schema_version = 1

[meta]
description = "unknown-key warning fixture"

[platform]
os = "darwin"

[features]

[packages.brew]
bundles = ["core"]

[identity]
git = "none"
ssh = "none"

# Unknown section + scalar leaf path: mythical_section.unknown_key. Not
# under any whitelisted prefix (schema_version, meta, platform.os,
# platform.arch, features, packages.brew.*, identity.git, identity.ssh).
[mythical_section]
unknown_key = "value"
