# negative fixture -- identity "personal" declares the one-password-ssh
# capability sentinel, but the machine disables one-password-ssh. Reject.

schema_version = 2

[machine]
description = "identity-without-opssh fixture"
os = "darwin"
identity = "personal"

[features]
enabled = [
  "one-password-signing",
  "claude-marketplace",
  "repo-auto-update",
  "ghostty",
  "jgrid-net",
  "macos-dock",
  "macos-finder",
  "macos-input",
  "macos-spotlight",
  "macos-screenshots",
  "macos-security",
  "macos-appearance",
  "macos-display",
]
disabled = [
  "one-password-ssh",
  "server-include",
]

[packages]
bundles = [
  "dotfiles",
]
