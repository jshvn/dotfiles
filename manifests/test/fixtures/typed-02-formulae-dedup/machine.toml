# typed-02-formulae-dedup -- bare formulae union across a bundle and the
# machine. The shared "dotfiles" bundle declares git + curl; the machine
# re-declares git (dedup) and adds ripgrep. Expected: [curl, git, ripgrep].

schema_version = 2

[machine]
description = "typed-02-formulae-dedup fixture"
os = "darwin"
identity = "none"

[features]
enabled = []
disabled = []

[packages]
bundles = [
  "dotfiles",
]
formulae = [
  "git",
  "ripgrep",
]
