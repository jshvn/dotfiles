# typed-03-casks-mas-dedup -- casks are bare strings unioned across the
# "extras" bundle (iterm2) and the machine (vscode) then wrapped to { name }
# objects on output; mas dedupes by .id with the machine winning (id
# 497799835 resolves to "Xcode-machine", not the bundle's "Xcode-bundle").

schema_version = 2

[machine]
description = "typed-03-casks-mas-dedup fixture"
os = "darwin"
identity = "none"

[features]
enabled = []
disabled = []

[packages]
bundles = [
  "dotfiles",
  "extras",
]
casks = [
  "vscode",
]
mas = [
  { id = 497799835, name = "Xcode-machine" },
]
