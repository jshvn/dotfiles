# typed-04-vscode-union -- packages.vscode unions across the "extbundle"
# bundle (acme.from-bundle, acme.shared-dup) and the machine
# (acme.from-machine, acme.shared-dup), deduped by value. cargo/uv/npm stay
# empty, proving the resolver always materializes every bucket.

schema_version = 2

[machine]
description = "typed-04-vscode-union fixture"
os = "darwin"
identity = "none"

[features]
enabled = []
disabled = []

[packages]
bundles = [
  "dotfiles",
  "extbundle",
]
vscode = [
  "acme.from-machine",
  "acme.shared-dup",
]
