# manifests/claude-addons/superpowers.toml -- Superpowers marketplace plugin
#
# See docs/CLAUDE-ADDONS.md for the schema reference + lifecycle.
# See manifests/claude-addons/README.md for the directory-local quick-reference.

schema_version = 1

[meta]
name        = "superpowers"
description = "Superpowers -- skill/workflow plugin from the official marketplace"
upstream    = "https://github.com/anthropics/claude-plugins-official"

[install]
# Marketplace-style addon: register marketplace then install plugin. The
# claude CLI manages footprint under ~/.config/claude/plugins/ -- no
# scattered files in hooks/agents/skills/commands. The official marketplace
# uses the GitHub owner/repo shorthand.
commands = [
  "claude plugin marketplace add anthropics/claude-plugins-official",
  "claude plugin install superpowers@claude-plugins-official",
]
# false: superpowers does not write hook entries into settings.json that need
# disarm. Its skills and hooks live entirely under the plugin directory the
# claude CLI manages.
self_healing = false

[upgrade]
# Run instead of [install].commands when [verify] already passes -- preserves
# the always-pull-latest behavior of `task install`.
commands = [
  "claude plugin marketplace update",
  "claude plugin update superpowers@claude-plugins-official",
]

[verify]
# Detect installed state via the official CLI's JSON output. Installed iff
# `superpowers@claude-plugins-official` is in the plugin list.
command = "claude plugin list --json | jq -e '.[] | select(.id == \"superpowers@claude-plugins-official\")' >/dev/null"

[footprint]
# Empty: superpowers' files live under ~/.config/claude/plugins/, managed by
# the claude CLI. There is nothing for claude-addons:remove to glob and delete.
file_globs  = []
extra_paths = []

[remove]
# Uninstall the plugin only. The `claude-plugins-official` marketplace is the
# shared Anthropic marketplace (may host other plugins and predates this
# addon) -- do NOT remove the marketplace itself, unlike the ecc case where
# the marketplace is dedicated to a single plugin.
commands = [
  "claude plugin uninstall superpowers@claude-plugins-official",
]
