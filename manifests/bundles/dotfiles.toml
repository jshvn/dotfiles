# manifests/bundles/dotfiles.toml -- packages the dotfiles config directly
# uses, wraps, or configures. Every machine includes this bundle (the
# resolver's validate_manifest rule enforces "dotfiles" presence in
# packages.brew.bundles). The typed buckets below are folded into
# resolved.json packages.brew.extra_packages.{formulae,casks,mas} during
# the resolver's bundle-merge pass.
#
# Schema reference: docs/MANIFEST.md "Bundles" section.
# Merge semantics:  buckets are appended in order
#     [defaults] -> [bundles/<bundle>.toml for each bundle in order] -> [machine]
#   then deduped (machine wins on collision).
#
# Notes:
#   - "antidote" is the zsh plugin manager; see shell/.zshrc and
#     shell/.zsh_plugins.txt for usage.
#   - "libpsl" provides the `psl` CLI used by shell/functions/whois.zsh to
#     reduce a host to its registrable domain (eTLD+1) via the Public Suffix
#     List; without it whois() falls back to querying the host unreduced.
#   - 1password-cli is a binary-only cask (Homebrew ships the op binary
#     to the Homebrew prefix; no /Applications/.app bundle).

[packages]
formulae = [
  "antidote",
  "biome",
  "cloudflared",
  "coreutils",
  "eza",
  "fastfetch",
  "git",
  "git-delta",
  "go-task",
  "grc",
  "grep",
  "highlight",
  "hyperfine",
  "jq",
  "libpsl",
  "mas",
  "ncdu",
  "onefetch",
  "openssh",
  "ruff",
  "shellcheck",
  "shfmt",
  "taplo",
  "tlrc",
  "trippy",
  "whois",
  "yq",
  "zsh",
]

casks = [
  "1password-cli",
]

mas = []
