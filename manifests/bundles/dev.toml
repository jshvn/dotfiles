# manifests/bundles/dev.toml -- developer applications shared by every
# workstation machine (laptops). Headless/hybrid servers do NOT take this
# bundle; they keep miniconda (and other laptop-class casks) as explicit
# extras when they want those individually.
#
# Pure-CLI developer tools that the dotfiles config wires up (biome, ruff,
# hyperfine) live in dotfiles.toml. Universally-installed unwired CLI utilities
# (hugo, bat, fd, etc.) live in cli.toml. This bundle is mostly the GUI half;
# it also carries the few workstation-only CLI tools that servers must skip
# (e.g. `container`, which needs macOS 15+ and so cannot run on older servers).
#
# Schema reference: docs/MANIFEST.md "Bundles" section.

[packages]
# Workstation-only CLI tools. `container` (Apple's container runtime) requires
# macOS 15+, so it must not land on older servers like atium (Sonoma 14.2.1)
# that omit this bundle.
formulae = [
  "container",
]

casks = [
  "claude-code",
  "miniconda",
  "sourcetree",
  "sublime-text",
  "visual-studio-code",
]

mas = []

# VSCode extensions installed on every workstation that takes this bundle.
# Emitted as `vscode '<id>'` Brewfile lines; the visual-studio-code cask above
# provides the `code` CLI they install through. Headless servers omit this
# bundle and therefore receive no extensions.
vscode = [
  "1password.op-vscode",
  "anthropic.claude-code",
  "docker.docker",
  "eamodio.gitlens",
  "esbenp.prettier-vscode",
  "github.vscode-github-actions",
  "mathematic.vscode-pdf",
  "mechatroner.rainbow-csv",
  "ms-azuretools.vscode-containers",
  "ms-azuretools.vscode-docker",
  "ms-kubernetes-tools.vscode-kubernetes-tools",
  "ms-python.debugpy",
  "ms-python.isort",
  "ms-python.python",
  "ms-python.vscode-pylance",
  "ms-python.vscode-python-envs",
  "ms-toolsai.jupyter",
  "ms-toolsai.jupyter-keymap",
  "ms-toolsai.jupyter-renderers",
  "ms-toolsai.vscode-jupyter-cell-tags",
  "ms-toolsai.vscode-jupyter-slideshow",
  "ms-vscode-remote.remote-containers",
  "ms-vscode-remote.remote-ssh",
  "ms-vscode-remote.remote-ssh-edit",
  "ms-vscode.makefile-tools",
  "ms-vscode.remote-explorer",
  "pkief.material-icon-theme",
  "redhat.vscode-yaml",
  "task.vscode-task",
]
