# manifests/machines/personal-laptop.toml -- Josh's personal MacBook.
#
# Daily driver: full GUI + dev + personal feature set; Apple Silicon.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Josh's personal MacBook -- Apple Silicon, primary dev machine"

[platform]
os = "darwin"
arch = "arm64"

[features]
one-password-ssh = true
one-password-signing = true
macos-dock = true
macos-finder = true
macos-input = true
macos-screenshots = true
macos-security = true
claude-marketplace = true
ghostty = true
jgrid-net = true

[packages.brew]
bundles = ["dotfiles", "cli", "gui"]

[packages.brew.extra_packages]
formulae = []  # all CLI lives in core.rb

casks = [
  { name = "alcove" },
  { name = "appcleaner" },
  { name = "cardhop" },
  { name = "claude-code" },
  { name = "cloudflare-warp" },
  { name = "cryptomator" },
  { name = "discord" },
  { name = "docker-desktop" },
  { name = "dropbox" },
  { name = "fantastical" },
  { name = "firefox" },
  { name = "microsoft-excel" },
  { name = "microsoft-powerpoint" },
  { name = "microsoft-word" },
  { name = "miniconda" },
  { name = "nvidia-geforce-now" },
  { name = "proton-drive" },
  { name = "proton-mail" },
  { name = "protonvpn" },
  { name = "raycast" },
  { name = "slack" },
  { name = "sourcetree" },
  { name = "spotify" },
  { name = "standard-notes" },
  { name = "sublime-text" },
  { name = "visual-studio-code" },
  { name = "whatsapp" },
  { name = "zoom" },
]

mas = [
  { id = 441258766, name = "Magnet" },
  { id = 904280696, name = "Things3" },
]

[identity]
git = "personal"
ssh = "personal"
