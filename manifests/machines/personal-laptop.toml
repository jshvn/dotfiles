# manifests/machines/personal-laptop.toml -- Josh's personal MacBook.
#
# Self-contained: every feature this machine has (and every registry flag it
# deliberately lacks) is listed below; nothing is inherited. See
# docs/MANIFEST.md for the schema reference and manifests/features.toml for
# the flag registry.

schema_version = 2

[machine]
description = "Josh's personal MacBook -- Apple Silicon, primary dev machine"
os = "darwin"
arch = "arm64"
identity = "personal"

[features]
enabled = [
  "one-password-ssh",
  "one-password-signing",
  "claude-marketplace",
  "repo-auto-update",
  "ghostty",
  "jgrid-net",
  "macos-dock",
  "macos-finder",
  "macos-input",
  "macos-spotlight",
  "macos-screenshots",
  "macos-security",
  "macos-appearance",
  "macos-display",
]
disabled = [
  "server-include",
]

[packages]
bundles = [
  "dotfiles",
  "cli",
  "dotfiles-gui",
  "dev",
  "productivity",
  "apps",
]
# node: the ecc Claude addon's hooks invoke the `node` binary directly.
formulae = ["node"]
casks = [
  "cloudflare-warp",
  "discord",
  "dropbox",
  "nvidia-geforce-now",
  "proton-drive",
  "proton-mail",
  "protonvpn",
  "whatsapp",
]

[claude]
addons = [
  "ecc",
  "superpowers",
]
