# manifests/machines/personal-laptop.toml -- Josh's personal MacBook.
#
# Daily driver: full GUI + dev + personal feature set; Apple Silicon.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Josh's personal MacBook -- Apple Silicon, primary dev machine"

[platform]
os = "darwin"
arch = "arm64"

[features]
one-password-ssh = true
one-password-signing = true
macos-dock = true
macos-finder = true
macos-input = true
macos-screenshots = true
macos-security = true
macos-appearance = true
macos-display = true
claude-marketplace = true
ghostty = true
jgrid-net = true

[packages.brew]
bundles = ["dotfiles", "cli", "dotfiles-gui", "dev", "productivity", "apps"]

[packages.brew.extra_packages]
# node is installed because the ecc Claude addon's hooks invoke the `node`
# binary directly. The rest of the CLI comes from the dotfiles/cli bundles.
formulae = ["node"]

casks = [
  { name = "cloudflare-warp" },
  { name = "discord" },
  { name = "dropbox" },
  { name = "nvidia-geforce-now" },
  { name = "proton-drive" },
  { name = "proton-mail" },
  { name = "protonvpn" },
  { name = "whatsapp" },
]

mas = []

[identity]
git = "personal"
ssh = "personal"

[claude]
# Replace semantics: list the full set this machine wants (not concat-with-
# defaults). defaults.toml ships an empty addons array; addons are opted in
# per-machine. See docs/CLAUDE-ADDONS.md.
addons = ["ecc", "superpowers"]
