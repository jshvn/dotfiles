# manifests/machines/personal-laptop.toml -- Josh's personal MacBook.
#
# Daily driver: full GUI + dev + personal feature set; Apple Silicon.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Josh's personal MacBook -- Apple Silicon, primary dev machine"

[platform]
os = "darwin"
arch = "arm64"

[features]
one-password-ssh = true
one-password-signing = true
macos-dock = true
macos-finder = true
macos-input = true
macos-screenshots = true
macos-security = true
claude-marketplace = true
ghostty = true
jgrid-net = true

[packages.brew]
bundles = ["dotfiles", "cli", "dotfiles-gui", "dev", "productivity", "apps"]

[packages.brew.extra_packages]
formulae = []  # all CLI comes from the dotfiles/cli bundles

casks = [
  { name = "cloudflare-warp" },
  { name = "cryptomator" },
  { name = "discord" },
  { name = "dropbox" },
  { name = "nvidia-geforce-now" },
  { name = "proton-drive" },
  { name = "proton-mail" },
  { name = "protonvpn" },
  { name = "whatsapp" },
]

mas = []

[identity]
git = "personal"
ssh = "personal"
