# manifests/machines/atium.toml -- Mac atium.
#
# Mostly-headless Mac server: usually headless but occasionally connected
# to a display, so it still takes dotfiles-gui (1Password GUI, ghostty)
# and the cli bundle. Does NOT take dev/productivity/apps -- the few
# laptop-class casks it wants (docker-desktop, miniconda, etc.) live in
# extras.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Mac atium -- mostly-headless Mac server"

[platform]
os = "darwin"

[features]
one-password-ssh = false
claude-marketplace = false
macos-security = true
ghostty = true

[packages.brew]
bundles = ["dotfiles", "cli", "dotfiles-gui"]

[packages.brew.extra_packages]
formulae = []

casks = [
  { name = "appcleaner" },
  { name = "cloudflare-warp" },
  { name = "docker-desktop" },
  { name = "dropbox" },
  { name = "miniconda" },
]

mas = []

[identity]
git = "atium"
ssh = "atium"
