# manifests/machines/atium.toml -- Mac atium (headless ops server).
#
# Headless ops machine, core packages only; no GUI feature flags.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Mac atium -- headless ops machine, core packages only"

[platform]
os = "darwin"

[features]
one-password-ssh = false
claude-marketplace = false
macos-security = true  # P6 D-04: server runs security defaults + shell-registration only
server-include = true  # headless server: materialize ~/.config/git/server-include.config
# macos-dock, macos-finder, macos-input, macos-screenshots absent -> inherited false

[packages.brew]
bundles = ["core"]

[packages.brew.extra_packages]
formulae = []
casks    = []
mas      = []

[identity]
git = "atium"
ssh = "atium"
