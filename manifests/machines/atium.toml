# manifests/machines/atium.toml -- Mac atium, a mostly-headless Mac server.
#
# Usually headless but occasionally connected to a display, so it still takes
# dotfiles-gui (1Password GUI, ghostty) and the cli bundle. It does NOT take
# dev/productivity/apps -- the few laptop-class casks it wants (docker-desktop,
# miniconda, etc.) live inline below. The long disabled list is deliberate: the
# file itself records every flag this server does not want. See docs/MANIFEST.md
# for the schema reference and manifests/features.toml for the flag registry.

schema_version = 2

[machine]
description = "Mac atium -- mostly-headless Mac server"
os = "darwin"
identity = "atium"

[features]
enabled = [
  "repo-auto-update",
  "macos-security",
  "ghostty",
]
disabled = [
  "one-password-ssh",
  "one-password-signing",
  "claude-marketplace",
  "jgrid-net",
  "server-include",
  "macos-dock",
  "macos-finder",
  "macos-input",
  "macos-spotlight",
  "macos-screenshots",
  "macos-appearance",
  "macos-display",
]

[packages]
bundles = [
  "dotfiles",
  "cli",
  "dotfiles-gui",
]
casks = [
  "appcleaner",
  "cloudflare-warp",
  "docker-desktop",
  "dropbox",
  "miniconda",
]
