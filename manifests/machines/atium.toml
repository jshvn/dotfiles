# manifests/machines/atium.toml -- Mac atium.
#
# Headless Mac server.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Mac atium -- headless Mac server"

[platform]
os = "darwin"

[features]
one-password-ssh = false
claude-marketplace = false
macos-security = true
ghostty = true

[packages.brew]
bundles = ["dotfiles", "gui"]

[packages.brew.extra_packages]
formulae = []

casks = [
  { name = "appcleaner" },
  { name = "cloudflare-warp" },
  { name = "docker-desktop" },
  { name = "dropbox" },
  { name = "miniconda" },
]

mas = []

[identity]
git = "atium"
ssh = "atium"
