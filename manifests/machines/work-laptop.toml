# manifests/machines/work-laptop.toml -- Work MacBook.
#
# Self-contained; arch is auto-detected by the resolver. See docs/MANIFEST.md
# for the schema reference and manifests/features.toml for the flag registry.

schema_version = 2

[machine]
description = "Work MacBook -- work identity, GUI + dev environment"
os = "darwin"
identity = "work"

[features]
enabled = [
  "one-password-ssh",
  "one-password-signing",
  "claude-marketplace",
  "repo-auto-update",
  "ghostty",
  "macos-dock",
  "macos-finder",
  "macos-input",
  "macos-screenshots",
  "macos-security",
  "macos-appearance",
  "macos-display",
]
disabled = [
  "jgrid-net",
  "macos-spotlight",
  "server-include",
]

[packages]
bundles = [
  "dotfiles",
  "cli",
  "dotfiles-gui",
  "dev",
  "productivity",
  "apps",
]
