# manifests/machines/work-laptop.toml -- Work MacBook.
#
# Work identity, GUI + dev environment; arch detected by the resolver.
# See docs/MANIFEST.md for the schema reference and field semantics.

schema_version = 1

[meta]
description = "Work MacBook -- work identity, GUI + dev environment"

[platform]
os = "darwin"

[features]
one-password-ssh = true
one-password-signing = true
macos-dock = true
macos-finder = true
macos-input = true
macos-screenshots = true
macos-security = true
claude-marketplace = true
ghostty = true

[packages.brew]
bundles = ["dotfiles", "cli", "dotfiles-gui"]

[packages.brew.extra_packages]
formulae = []

casks = [
  { name = "alcove" },
  { name = "appcleaner" },
  { name = "cardhop" },
  { name = "claude-code" },
  { name = "docker-desktop" },
  { name = "fantastical" },
  { name = "firefox" },
  { name = "microsoft-excel" },
  { name = "microsoft-powerpoint" },
  { name = "microsoft-word" },
  { name = "miniconda" },
  { name = "raycast" },
  { name = "slack" },
  { name = "sourcetree" },
  { name = "spotify" },
  { name = "standard-notes" },
  { name = "sublime-text" },
  { name = "visual-studio-code" },
  { name = "zoom" },
]

mas = [
  { id = 441258766, name = "Magnet" },
  { id = 904280696, name = "Things3" },
]

[identity]
git = "work"
ssh = "work"
